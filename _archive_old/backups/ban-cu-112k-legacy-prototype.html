        isLocalStorageBlocked = true;

    function formatVND(number) {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "-";
      const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : dateStr;
    }

    function addMonthsSafe(date, months) {
      const result = new Date(date);
      const targetMonth = result.getMonth() + months;
      result.setMonth(targetMonth);
      if (result.getMonth() !== (targetMonth % 12 + 12) % 12) {
        result.setDate(0); 
      }
      return result;
    }

    function calculateStandardDays(startDateStr, endDateStr) {
      const start = new Date(startDateStr); const end = new Date(endDateStr);
      if (isNaN(start) || isNaN(end) || end <= start) return 0;
      let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      let tempDate = addMonthsSafe(start, months);
      if (tempDate > end) { months--; tempDate = addMonthsSafe(start, months); }
      const diffTime = end.getTime() - tempDate.getTime();
      return (months * 30) + Math.floor(diffTime / (1000 * 3600 * 24));
    }

    function calculateCapitalSourceDetails(source) {
      const todayStr = new Date().toISOString().split('T')[0];
      const txs = [...(source.LichSuBienDong || [])].sort((a, b) => new Date(a.Ngay) - new Date(b.Ngay));
      let currentCapital = 0; let totalInterestExpense = 0;
      if (txs.length === 0) return { tongVonHienTai: 0, chiPhiLaiTichLuy: 0, lichSu: [] };
      let lastDate = txs[0].Ngay;
      for (let i = 0; i < txs.length; i++) {
        const tx = txs[i];
        const daysElapsed = calculateStandardDays(lastDate, tx.Ngay);
        totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (daysElapsed / 30));
        currentCapital += Number(tx.SoTien);
        lastDate = tx.Ngay;
      }
      totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (calculateStandardDays(lastDate, todayStr) / 30));
      return { tongVonHienTai: Math.max(0, currentCapital), chiPhiLaiTichLuy: totalInterestExpense, lichSu: txs };
    }

    function calculateContractInterest(contract) {
      const today = new Date();
      let endCalculateDate = contract.TrangThai === 'Đã tất toán' && contract.NgayTatToan ? new Date(contract.NgayTatToan) : today;
      const endCalStr = endCalculateDate.toISOString().split('T')[0];
      const soNgayVay = calculateStandardDays(contract.NgayVay, endCalStr);
      const tongLaiPhatSinh = Math.round((contract.SoTienVay / 1000000) * contract.LaiNgayTrenTrieu * soNgayVay);

      const contractPayments = state.payments.filter(p => p.MaHopDong === contract.MaHopDong);
      const laiDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Trả lãi').reduce((sum, p) => sum + Number(p.SoTienTra) + (Number(p.TienKhuyenMai) || 0), 0);
      const gocDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Tất toán').reduce((sum, p) => sum + Number(p.SoTienTra), 0);
      const laiConNo = Math.max(0, tongLaiPhatSinh - laiDaTra);
      const duNoGocHienTai = Math.max(0, contract.SoTienVay - gocDaTra);

      let chiPhiVonLuyKe = 0;
      const lichSuNguon = contract.LichSuNguon || [{ NgayBatDau: contract.NgayVay, NgayKetThuc: null, MaNguon: contract.MaNguon, SoTien: contract.SoTienVay }];
      lichSuNguon.forEach(seg => {
        const segDays = calculateStandardDays(seg.NgayBatDau, seg.NgayKetThuc ? seg.NgayKetThuc : endCalStr);
        const source = state.capitalSources.find(s => s.MaNguon === seg.MaNguon) || { LaiSuatThang: 0 };
        chiPhiVonLuyKe += Math.round(seg.SoTien * (source.LaiSuatThang / 100) * (segDays / 30));
      });

      let chiPhiVonDaTra = 0;
      if (tongLaiPhatSinh > 0) chiPhiVonDaTra = Math.round(laiDaTra * (chiPhiVonLuyKe / tongLaiPhatSinh));
      const activeSeg = lichSuNguon.find(s => s.NgayKetThuc === null) || { MaNguon: contract.MaNguon };
      const activeSource = state.capitalSources.find(s => s.MaNguon === activeSeg.MaNguon) || { TenNguon: "N/A", LaiSuatThang: 0 };

      return { soNgayVay, tongLaiPhatSinh, laiDaTra, gocDaTra, laiConNo, duNoGocHienTai, chiPhiVonLuyKe, chiPhiVonDaTra, laQuaHan: contract.TrangThai === 'Đang vay' && contract.NgayDaoHan && today > new Date(contract.NgayDaoHan), nguonVon: activeSource.TenNguon, laiSuatDauVao: activeSource.LaiSuatThang, activeMaNguon: activeSeg.MaNguon, lichSuNguon };
    }

    function getStats() {
      let stats = { tongVonChoVay: 0, dangVayCount: 0, tatToanCount: 0, quaHanCount: 0, tongLaiConNo: 0, laiThuTrongNgay: 0, tongVonDauVao: 0, tongChiPhiLaiNguon: 0, sourceDetails: {}, tongLaiThucThu: 0, tongLaiKhuyenMai: 0, tongLaiNhanVienGiu: 0, tongGocNhanVienGiu: 0 };

      state.contracts.forEach(contract => {
        const calc = calculateContractInterest(contract);
        if (contract.TrangThai === 'Đang vay') {
          stats.tongVonChoVay += calc.duNoGocHienTai; stats.tongLaiConNo += calc.laiConNo; stats.laiThuTrongNgay += (calc.duNoGocHienTai / 1000000) * contract.LaiNgayTrenTrieu;
          calc.laQuaHan ? stats.quaHanCount++ : stats.dangVayCount++;
        } else if (contract.TrangThai === 'Đã tất toán') { stats.tatToanCount++; }
      });

      state.capitalSources.forEach(src => {
        const details = calculateCapitalSourceDetails(src);
        stats.tongVonDauVao += details.tongVonHienTai; stats.tongChiPhiLaiNguon += details.chiPhiLaiTichLuy;
        let duNoChoVayCuaNguon = 0;
        state.contracts.forEach(c => { if (c.TrangThai === 'Đang vay') { const activeSeg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon); if (activeSeg) duNoChoVayCuaNguon += activeSeg.SoTien; } });

        let laiDaThuCuaNguon = 0;
        state.payments.forEach(p => {
          if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) {
            const c = state.contracts.find(x => x.MaHopDong === p.MaHopDong);
            if (c) {
              const calc = calculateContractInterest(c);
              const targetSeg = (c.LichSuNguon || []).find(seg => seg.MaNguon === src.MaNguon);
              if (targetSeg && calc.chiPhiVonLuyKe > 0) {
                const segDays = calculateStandardDays(targetSeg.NgayBatDau, targetSeg.NgayKetThuc ? targetSeg.NgayKetThuc : new Date().toISOString().split('T')[0]);
                const segCost = Math.round(targetSeg.SoTien * (src.LaiSuatThang / 100) * (segDays / 30));
                laiDaThuCuaNguon += Math.round(p.SoTienTra * (segCost / calc.chiPhiVonLuyKe));
              }
            }
          }
        });
        stats.sourceDetails[src.MaNguon] = { tongVonHienTai: details.tongVonHienTai, chiPhiLaiTichLuy: details.chiPhiLaiTichLuy, duNoChoVay: duNoChoVayCuaNguon, laiDaThuCuaNguon, thieuHut: Math.max(0, details.chiPhiLaiTichLuy - laiDaThuCuaNguon) };
      });

      state.payments.forEach(p => {
        if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) stats.tongLaiThucThu += Number(p.SoTienTra);
        if (p.LoaiThanhToan === 'Trả lãi' && p.TienKhuyenMai) stats.tongLaiKhuyenMai += Number(p.TienKhuyenMai);
        if (p.TrangThaiThu === 'NhanVienGiu') {
          if (p.LoaiThanhToan === 'Trả lãi') stats.tongLaiNhanVienGiu += Number(p.SoTienTra);
          else if (p.LoaiThanhToan === 'Tất toán') stats.tongGocNhanVienGiu += Number(p.SoTienTra);
        }
      });

      stats.tongTienNhanVienGiu = stats.tongLaiNhanVienGiu + stats.tongGocNhanVienGiu;
      stats.loiNhuanRongThucTe = stats.tongLaiThucThu - stats.tongChiPhiLaiNguon;
      stats.tongThieuHutPhaiBu = Object.values(stats.sourceDetails).reduce((sum, item) => sum + item.thieuHut, 0);
      return stats;
    }

    function processCapitalReduction(sourceId, amount, date, description) {
      const source = state.capitalSources.find(s => s.MaNguon === sourceId);
      if (!source) return false;
      const targetCapital = calculateCapitalSourceDetails(source).tongVonHienTai - amount;
      if (targetCapital < 0) { showAlert("Lỗi", "Số tiền rút lớn hơn vốn hiện tại của nguồn."); return false; }

      const activeAlloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
        const seg = (c.LichSuNguon || []).find(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
        return sum + (seg ? seg.SoTien : 0);
      }, 0);

      if (targetCapital < activeAlloc) {
        const overdraft = activeAlloc - targetCapital;
        const otherSources = state.capitalSources.filter(s => s.MaNguon !== sourceId).map(s => {
          const alloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
            const seg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === s.MaNguon);
            return sum + (seg ? seg.SoTien : 0);
          }, 0);
          return { source: s, available: Math.max(0, calculateCapitalSourceDetails(s).tongVonHienTai - alloc) };
        }).filter(i => i.available > 0);

        if (otherSources.reduce((s, i) => s + i.available, 0) < overdraft) {
          showAlert("Quá tải", `Không đủ vốn rảnh rỗi ở các nguồn vốn khác để gánh dư nợ của hợp đồng. Vui lòng nạp thêm vốn!`); return false;
        }

        let remain = overdraft; let logs = [];
        state.contracts.forEach(c => {
          if (c.TrangThai !== 'Đang vay' || remain <= 0) return;
          const segIdx = (c.LichSuNguon || []).findIndex(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
          if (segIdx === -1) return;
          const seg = c.LichSuNguon[segIdx];
          const move = Math.min(remain, seg.SoTien);
          if (move <= 0) return;

          seg.NgayKetThuc = date;
          const newSegs = move < seg.SoTien ? [{ NgayBatDau: date, NgayKetThuc: null, MaNguon: sourceId, SoTien: seg.SoTien - move }] : [];
          
          let amountToMove = move;
          otherSources.forEach(t => {
            if (t.available <= 0 || amountToMove <= 0) return;
            const chunk = Math.min(amountToMove, t.available);
            newSegs.push({ NgayBatDau: date, NgayKetThuc: null, MaNguon: t.source.MaNguon, SoTien: chunk });
            t.available -= chunk; amountToMove -= chunk; remain -= chunk;
            logs.push(`HĐ ${c.MaHopDong}: Chuyển ${formatVND(chunk)} sang nguồn ${t.source.TenNguon}`);
          });

          const updatedC = { ...c, LichSuNguon: [...c.LichSuNguon, ...newSegs] };
          executeSave('contracts', c.MaHopDong, updatedC, () => { state.contracts = state.contracts.map(x => x.MaHopDong === c.MaHopDong ? updatedC : x); });
        });

        const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút giảm vốn và tự điều phối dòng' }] };
        executeSave('capital_sources', sourceId, updatedSrc, () => { state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s); });
        showAlert("Thành công", `Đã tự động rút vốn và điều chuyển hạn mức dư nợ thành công:<br><br>${logs.join('<br>')}`);
        return true;
      }

      const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút bớt vốn nguồn' }] };
      executeSave('capital_sources', sourceId, updatedSrc, () => {
        state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s);
        showNotification("Ghi giảm vốn thành công!");
      });
      return true;
    }

    function handleSaveContract(e) {
      e.preventDefault(); const form = e.target;
      const contractData = {
        MaHopDong: form.MaHopDong.value.toUpperCase(), MaKH: form.MaKH.value, SoTienVay: Number(form.SoTienVay.value), LaiNgayTrenTrieu: Number(form.LaiNgayTrenTrieu.value), NgayVay: form.NgayVay.value, NgayDaoHan: form.NgayDaoHan.value, HinhThucLai: form.HinhThucLai.value, TrangThai: form.TrangThai.value, GhiChu: form.GhiChu.value.trim(), MaNguon: form.MaNguon.value, LoaiTaiSan: form.LoaiTaiSan.value, TenTaiSan: form.TenTaiSan.value.trim(), BienSo: form.BienSo.value.trim(), SoKhung: form.SoKhung.value.trim(), SoMay: form.SoMay.value.trim()
      };
      if (contractData.SoTienVay <= 0) return showAlert("Lỗi", "Số vốn vay không hợp lệ.");

      executeSave('contracts', contractData.MaHopDong, contractData, () => {
        if (state.editingContract) {
          const old = state.contracts.find(c => c.MaHopDong === contractData.MaHopDong);
          if (old && old.MaNguon !== contractData.MaNguon) {
            const hist = [...(old.LichSuNguon || [])]; const active = hist.find(s => s.NgayKetThuc === null);
            if (active) active.NgayKetThuc = new Date().toISOString().split('T')[0];
            hist.push({ NgayBatDau: new Date().toISOString().split('T')[0], NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: old.SoTienVay });
            contractData.LichSuNguon = hist;
          } else { contractData.LichSuNguon = old ? old.LichSuNguon : [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay }]; }
          state.contracts = state.contracts.map(c => c.MaHopDong === contractData.MaHopDong ? contractData : c);
          showNotification("Cập nhật hợp đồng thành công");
        } else {
          if (state.contracts.some(c => c.MaHopDong === contractData.MaHopDong)) return showAlert("Lỗi", "Mã HĐ đã tồn tại!");

    function handleDeleteContract(maHD) {
      if (state.payments.some(p => p.MaHopDong === maHD)) {
        showConfirm("Cảnh báo xóa", "Hợp đồng đã có phiếu thu tiền. Xóa hợp đồng sẽ xóa sạch lịch sử đóng tiền liên quan?", () => {
          const pToDelete = state.payments.filter(p => p.MaHopDong === maHD);
          pToDelete.forEach(p => executeDelete('payments', p.MaThanhToan, () => { state.payments = state.payments.filter(x => x.MaThanhToan !== p.MaThanhToan) }));
          executeDelete('contracts', maHD, () => { state.contracts = state.contracts.filter(c => c.MaHopDong !== maHD); showNotification("Xóa hợp đồng hoàn tất"); });
        });
      } else { showConfirm("Xác nhận xóa", "Xóa hợp đồng vay này khỏi hệ thống?", () => { executeDelete('contracts', maHD, () => { state.contracts = state.contracts.filter(c => c.MaHopDong !== maHD); showNotification("Đã xóa hợp đồng"); }); }); }
    }

    function handleSavePayment(e) {
      e.preventDefault(); const form = e.target;
      const p = { MaThanhToan: Math.random().toString(36).substring(2, 10), MaHopDong: form.MaHopDong.value, NgayThanhToan: form.NgayThanhToan.value, SoTienTra: Number(form.SoTienTra.value), TienKhuyenMai: Number(form.TienKhuyenMai ? form.TienKhuyenMai.value : 0), LoaiThanhToan: form.LoaiThanhToan.value, GhiChu: form.GhiChu.value.trim(), TrangThaiThu: form.TrangThaiThu.value, NguoiThuHo: form.TrangThaiThu === 'NhanVienGiu' ? form.NguoiThuHo.value.trim() : '' };
      if (p.SoTienTra <= 0) return showAlert("Lỗi", "Số tiền đóng không hợp lệ");

      executeSave('payments', p.MaThanhToan, p, () => {
        state.payments.unshift(p);
        if (p.LoaiThanhToan === 'Tất toán') {
          const contract = state.contracts.find(c => c.MaHopDong === p.MaHopDong);
          if (contract) {
            const updatedC = { ...contract, TrangThai: 'Đã tất toán', NgayTatToan: p.NgayThanhToan };
            executeSave('contracts', p.MaHopDong, updatedC, () => { state.contracts = state.contracts.map(c => c.MaHopDong === p.MaHopDong ? updatedC : c); });
          }
        }
        showNotification("Đã lập phiếu thu thành công!");
      });
      closeModal('payment-modal');
    }

    function handleDeletePayment(maTT) {
      showConfirm("Xác nhận xóa", "Xóa phiếu thu giao dịch này?", () => {
        const p = state.payments.find(x => x.MaThanhToan === maTT);
        executeDelete('payments', maTT, () => {
          if (p && p.LoaiThanhToan === 'Tất toán') {
            const contract = state.contracts.find(c => c.MaHopDong === p.MaHopDong);
            if (contract) {
              const updatedC = { ...contract, TrangThai: 'Đang vay', NgayTatToan: null };
              executeSave('contracts', p.MaHopDong, updatedC, () => { state.contracts = state.contracts.map(c => c.MaHopDong === p.MaHopDong ? updatedC : c); });
            }
          }
          state.payments = state.payments.filter(x => x.MaThanhToan !== maTT); showNotification("Đã xóa phiếu thu!");
        });

          if (d.customers && d.contracts && d.payments) {

            saveStateOfflineAndRefresh(true); showNotification("Đồng bộ file dữ liệu thành công!");

    async function handleLogin(e) {
      const form = e.target || document.getElementById('auth-form');
      const email = form.email.value.trim();
      const pass = form.password.value;
      if (!window._firebaseAuth) { alert("Chưa kết nối Firebase. Hãy kích hoạt Cloud Sync trước."); return renderSetupScreen(); }
      try {
        const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
        await signInWithEmailAndPassword(window._firebaseAuth, email, pass);
        // onAuthStateChanged listener will switch from login screen to main app automatically
      } catch (err) {
        console.error(err);
        alert("Đăng nhập thất bại: " + (err.message || err.code || "Sai email/mật khẩu hoặc chưa bật Email/Password provider trong Firebase Console."));
      }
    }

    async function handleRegister(e) {
      const form = e.target || document.getElementById('auth-form');
      const email = form.email.value.trim();
      const pass = form.password.value;
      const confirm = form.confirm ? form.confirm.value : '';
      if (pass !== confirm) { alert("Mật khẩu nhập lại không khớp!"); return; }
      if (!window._firebaseAuth) { alert("Chưa kết nối Firebase. Hãy kích hoạt Cloud Sync trước."); return renderSetupScreen(); }
      try {
        const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
        await createUserWithEmailAndPassword(window._firebaseAuth, email, pass);
        // onAuthStateChanged will switch UI to main app
      } catch (err) {
        console.error(err);
        let msg = err.message || err.code;
        if (err.code === 'auth/email-already-in-use') msg = 'Email này đã được dùng. Hãy đăng nhập hoặc dùng email khác.';
        alert("Đăng ký thất bại: " + msg + "\n\nHãy vào Firebase Console > Authentication > Sign-in method bật 'Email/Password'.");
      }
    }

    async function handleLogout() {
      if (!window._firebaseAuth) return window.location.reload();
      try {
        const { signOut } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
        await signOut(window._firebaseAuth);
        // will trigger onAuthStateChanged -> show login
      } catch(e){ window.location.reload(); }
    }

    function handleSaveUserFirebaseConfig(e) {
      e.preventDefault();
      try {
        let rawInput = e.target.firebaseJson.value.trim();
        let config = null;
        
        try {
          config = JSON.parse(rawInput);
        } catch (jsonErr) {
          try {
            let jsObjectString = rawInput
              .replace(/^(const|let|var|window\.)?\s*(\w+)\s*=\s*/i, '')
              .replace(/;+$/, '')
              .trim();
            
            config = new Function('return (' + jsObjectString + ')')();
          } catch (evalErr) {
            const extractedConfig = {};
            const keys = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId", "measurementId"];
            
            keys.forEach(key => {
              const regex = new RegExp(`${key}\\s*:\\s*['"\`]([^'"\`]+)['"\`]`, 'i');
              const match = rawInput.match(regex);
              if (match && match[1]) {
                extractedConfig[key] = match[1].trim();
              }
            });
            
            if (extractedConfig.apiKey && extractedConfig.projectId) {
              config = extractedConfig;
            } else {
              throw new Error("Không thể bóc tách tham số");
            }
          }
        }
        
        if (!config || !config.apiKey || !config.projectId) {
          throw new Error("Cấu hình thiếu trường bắt buộc");
        }
        
        localStorage.setItem('user_firebase_config', JSON.stringify(config));
        // reload to let module init firebase + show login/register screen
        setTimeout(() => {
          window.location.reload();
        }, 800);
      } catch (err) { 
        alert("Cấu hình không hợp lệ. Vui lòng dán chính xác toàn bộ Code Config của Firebase."); 
      }
    }

    try {

      if (localStorage.getItem('user_firebase_config') && typeof renderLoginScreen === 'function') {

      document.getElementById('app-container').innerHTML = `<div style="padding:20px;color:red;font-weight:bold;">Lỗi nạp cục bộ: ${e.message}</div>`;
    }

    // Safety net for stuck loader (in case top-level init partially failed or race on iOS)
    setTimeout(function(){
      try {
        var c = document.getElementById('app-container');
        if (c && c.innerHTML && c.innerHTML.indexOf('Đang khởi tạo không gian làm việc') !== -1) {

            renderLoginScreen();
          } else if (typeof renderApp === 'function') {
            renderApp();

          }

  <!-- FIREBASE MODULE LOAD (TÍNH NĂNG TẢI TRỰC TUYẾN CHẠY NGẦM BẢO VỆ CHỐNG TREO) -->

      window.userId = userId;
      window.cloudAPI = {
        setDoc: (col, id, data) => setDoc(doc(window.db, 'artifacts', window.appId, 'users', userId, col, id), data),
        deleteDoc: (col, id) => deleteDoc(doc(window.db, 'artifacts', window.appId, 'users', userId, col, id))
      };
    }

    function attachRealtimeListeners(userId) {
      // cleanup old
      unsubscribeFns.forEach(u => { try { u(); } catch(_){} });
      unsubscribeFns = [];
      if (!userId || !window.db || !window.appId) return;

      const userDoc = doc(window.db, 'artifacts', window.appId, 'users', userId);

      unsubscribeFns.push( onSnapshot(collection(userDoc, 'customers'), s => {
        if (!s.empty || (window.state.customers || []).length === 0) {
          window.state.customers = s.docs.map(d => d.data());
        }
        if (window.renderApp) window.renderApp();
      }));
      unsubscribeFns.push( onSnapshot(collection(userDoc, 'contracts'), s => {
        if (!s.empty || (window.state.contracts || []).length === 0) {
          window.state.contracts = s.docs.map(d => d.data());
        }
        if (window.renderApp) window.renderApp();
      }));
      unsubscribeFns.push( onSnapshot(collection(userDoc, 'payments'), s => {
        if (!s.empty || (window.state.payments || []).length === 0) {
          window.state.payments = s.docs.map(d => d.data());
        }
        if (window.renderApp) window.renderApp();
      }));
      unsubscribeFns.push( onSnapshot(collection(userDoc, 'capital_sources'), s => {
        if (!s.empty || (window.state.capitalSources || []).length === 0) {
          window.state.capitalSources = s.docs.map(d => d.data());
        }
        if (window.renderApp) window.renderApp();
      }));
    }

    setTimeout(async () => {
      let config = localStorage.getItem('user_firebase_config') ? JSON.parse(localStorage.getItem('user_firebase_config')) : null;
      if (typeof __firebase_config !== 'undefined' && __firebase_config) { config = JSON.parse(__firebase_config); window.state.isSandbox = true; }
      
      if (config && config.apiKey) {
        try {
          const app = initializeApp(config);
          window.db = getFirestore(app);
          window.appId = typeof __app_id !== 'undefined' ? __app_id : 'loan-vip-cv';
          const auth = getAuth(app);
          window._firebaseAuth = auth;

          // IMPORTANT for iOS Safari persistence (localStorage/IndexedDB under ITP)
          try {
            await setPersistence(auth, browserLocalPersistence);
          } catch (pErr) { console.warn('Persistence set failed (non-fatal on some iOS):', pErr); }

          // Listen for real login state (email/pass). This is what makes "đăng nhập trên iPhone" reliable + cross device.
          onAuthStateChanged(auth, (user) => {
            if (user) {
              window.state.cloudConnected = true;
              setupCloudAPI(user.uid);
              attachRealtimeListeners(user.uid);
              // If we were showing login, switch to main app
              const c = document.getElementById('app-container');
              if (c && c.innerHTML.includes('Đăng nhập') || c && c.innerHTML.includes('Tạo tài khoản')) {
                try { window.renderApp(); } catch(_) {}
              } else {
                // normal case
                if (window.renderApp) window.renderApp();
              }
            } else {
              // logged out or never logged
              window.state.cloudConnected = false;
              window.userId = null;
              window.cloudAPI = null;
              // cleanup listeners
              unsubscribeFns.forEach(u => { try { u(); } catch(_){} });
              unsubscribeFns = [];
              // show login screen (only if we have config)
              if (typeof window.renderLoginScreen === 'function') {
                window.renderLoginScreen();
              } else {
                // fallback
                if (window.renderApp) window.renderApp();
              }
            }
          });

        } catch(e) { 
          console.error("Cloud Connection Failed:", e);
          if (e.code === 'permission-denied') {
             window.showAlert && window.showAlert("Lỗi Phân Quyền Firestore", "Quy tắc Firestore của bạn đang chặn quyền ghi. Hãy đổi Firestore Rules thành:\n\nmatch /artifacts/{appId}/users/{userId}/{document=**} {\n  allow read, write: if request.auth != null && request.auth.uid == userId;\n}");
          }
        }
      } else {
        // no config yet: user can still use offline, or click to setup
        // renderApp already ran, sidebar will offer the button
      }
    }, 120);
  </script>
</body>
</html>
