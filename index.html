  <!-- Service Worker Registration with Update Handling -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('Service Worker registered successfully!', registration.scope);

            // Check for updates periodically
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available, show update prompt
                  if (confirm('Đã có phiên bản mới. Tải lại để cập nhật?')) {
                    window.location.reload();
                  }
                }
              };
            };

            // Check for updates every 60 minutes
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000);
          })
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>

  <script>
    // Early global error catcher - so stuck loading spinner is replaced by useful message
    (function installEarlyErrorHandler(){
      function showFatal(msg) {
        try {
          var c = document.getElementById('app-container');
          if (c) {
            c.innerHTML = '<div style="padding:16px;color:#f87171;background:#0f172a;font:12px/1.5 monospace;white-space:pre-wrap;position:fixed;inset:0;z-index:99999;overflow:auto;">' +
              'FATAL JS ERROR - app failed to start\n\n' + msg + '\n\n' +
              'Please reload the file. If on iPhone, try Add to Home Screen or open in Safari.\n' +
              'Report the error message above to the developer.' +
              '</div>';
          }
        } catch(_) {}
      }
      window.addEventListener('error', function(ev) {
        showFatal( (ev.message || String(ev)) + '\nLocation: ' + (ev.filename || 'inline') + ':' + (ev.lineno || '?') + (ev.error && ev.error.stack ? '\n' + ev.error.stack : '') );
      });
      window.addEventListener('unhandledrejection', function(ev) {
        var r = ev.reason;
        showFatal( 'Unhandled promise rejection: ' + (r && (r.message || r) || r) + (r && r.stack ? '\n' + r.stack : '') );
      });
    })();

    // Ultra early recovery (before heavy DEFAULT/EXACT_DATA parse on slow machines/browsers)
    setTimeout(function(){
      try {
        var c = document.getElementById('app-container');
        if (c && c.innerHTML && (c.innerHTML.indexOf('Đang khởi tạo') !== -1 || c.innerHTML.indexOf('spin 1s linear infinite') !== -1)) {
          if (typeof renderApp === 'function') renderApp();
        }
      } catch(_) {}
    }, 1800);

    // Extra safety recovery (large file + embedded data can be slow to parse on some browsers)
    setTimeout(function(){
      try {
        var c = document.getElementById('app-container');
        if (c && c.innerHTML && (c.innerHTML.indexOf('Đang khởi tạo') !== -1 || c.innerHTML.indexOf('spin 1s linear infinite') !== -1)) {
          if (typeof renderApp === 'function') renderApp();
        }
      } catch(_) {}
    }, 4200);

    // === MÃ HÓA ĐỒNG BỘ RC4-DROP1024 + KEY STRETCHING (PBKDF) ===
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function rc4EncryptDecrypt(key, str) {
      let sKey = key;
      for (let i = 0; i < 5000; i++) {
        sKey = simpleHash(sKey + i);
      }
      let s = [], j = 0, x, res = '';
      for (let i = 0; i < 256; i++) {
        s[i] = i;
      }
      for (let i = 0; i < 256; i++) {
        j = (j + s[i] + sKey.charCodeAt(i % sKey.length)) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
      }
      let i = 0;
      j = 0;
      for (let k = 0; k < 1024; k++) {
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
      }
      for (let y = 0; y < str.length; y++) {
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
        res += String.fromCharCode(str.charCodeAt(y) ^ s[(s[i] + s[j]) % 256]);
      }
      return res;
    }

    function encrypt(password, plaintext) {
      const utf8Str = unescape(encodeURIComponent(plaintext));
      const cipher = rc4EncryptDecrypt(password, utf8Str);
      return btoa(cipher);
    }

    function decrypt(password, ciphertext) {
      const cipher = atob(ciphertext);
      const utf8Str = rc4EncryptDecrypt(password, cipher);
      return decodeURIComponent(escape(utf8Str));
    }

    async function registerBiometrics() {
      try {
        if (!window.PublicKeyCredential) {
          return showAlert("Không hỗ trợ", "Thiết bị hoặc trình duyệt này không hỗ trợ đăng nhập sinh trắc học.");
        }
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!available) {
          return showAlert("Không hỗ trợ", "Thiết bị này không hỗ trợ FaceID / Vân tay cục bộ.");
        }

          return showAlert("Lỗi", "Vui lòng đăng nhập bằng mã PIN trước khi kích hoạt sinh trắc học.");
        }
        
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const userId = new Uint8Array(16);
        window.crypto.getRandomValues(userId);
        
        const publicKey = {
          challenge: challenge,
          rp: { name: "Quản Lý Vốn CV" },
          user: {
            id: userId,
            name: "admin",
            displayName: "Quản trị viên"
          },
          pubKeyCredParams: [{ type: "public-key", alg: -7 }],
          authenticatorSelection: {
            authenticatorAttachment: "platform",
            userVerification: "required"
          },
          timeout: 60000
        };
        
        const credential = await navigator.credentials.create({ publicKey });
        if (credential) {
          const obfuscatedPin = btoa(unescape(encodeURIComponent(state.password)));
          localStorage.setItem('loan_biometric_enabled', 'true');
          localStorage.setItem('loan_biometric_key', obfuscatedPin);
          showNotification("Đã kích hoạt FaceID / Vân tay thành công!");

    }

    async function loginWithBiometrics() {
      try {
        if (!localStorage.getItem('loan_biometric_enabled')) return;
        if (!window.PublicKeyCredential) return;
        
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        
        const publicKey = {
          challenge: challenge,
          rpId: window.location.hostname,
          userVerification: "required",
          timeout: 60000
        };
        
        const credential = await navigator.credentials.get({ publicKey });
        if (credential) {
          const obfuscatedPin = localStorage.getItem('loan_biometric_key');
          if (!obfuscatedPin) return;
          const pin = decodeURIComponent(escape(atob(obfuscatedPin)));
          
          const encrypted = localStorage.getItem('loan_data_encrypted');
          if (encrypted) {
            try {
              const decrypted = decrypt(pin, encrypted);
              const data = JSON.parse(decrypted);
              if (data.customers && data.contracts) {
                state.password = pin;
                state.customers = data.customers;
                state.contracts = data.contracts;
                state.payments = data.payments;

    async function checkGoogleDriveResponse(res, opts = {}) {
      const silent = !!opts.silent;
      if (res.status === 401) {
        state.gdriveToken = null;
        localStorage.removeItem('loan_gdrive_token');
        if (!silent) {
          if (window.renderApp) window.renderApp();
          showConfirm("Kết nối hết hạn", "Phiên làm việc Google Drive đã hết hạn. Bạn có muốn kết nối lại ngay?", () => {
            connectGoogleDrive();
          });
        }
        throw new Error("Phiên làm việc Google Drive đã hết hạn");
      }
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        const errMsg = errData.error && errData.error.message ? errData.error.message : `HTTP status ${res.status}`;
        throw new Error(errMsg);
      }
    }

    async function resolveGDriveBackupFileId(opts = {}) {
      const silent = !!opts.silent;
      const cached = localStorage.getItem('loan_gdrive_file_id');
      if (cached) return cached;

      const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_BACKUP_NAME}' and trashed=false&fields=files(id,name,modifiedTime)`;
      const searchRes = await fetch(searchUrl, {
        headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
      });
      await checkGoogleDriveResponse(searchRes, { silent });
      const searchData = await searchRes.json();

      let fileId = '';
      if (searchData.files && searchData.files.length > 0) {
        fileId = searchData.files[0].id;
      } else {
        const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${state.gdriveToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: GDRIVE_BACKUP_NAME,
            mimeType: 'application/json'
          })
        });
        await checkGoogleDriveResponse(createRes, { silent });
        const createData = await createRes.json();
        fileId = createData.id;
      }
      if (fileId) localStorage.setItem('loan_gdrive_file_id', fileId);
      return fileId;
    }

    async function fetchCloudBackupBundle(opts = {}) {
      const silent = !!opts.silent;
      let fileId = localStorage.getItem('loan_gdrive_file_id');
      if (!fileId) {
        const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_BACKUP_NAME}' and trashed=false&fields=files(id,name,modifiedTime)`;
        const searchRes = await fetch(searchUrl, {
          headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
        });
        await checkGoogleDriveResponse(searchRes, { silent });
        const searchData = await searchRes.json();
        if (!searchData.files || searchData.files.length === 0) return null;
        fileId = searchData.files[0].id;
        localStorage.setItem('loan_gdrive_file_id', fileId);
      }

      const downloadUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
      const downloadRes = await fetch(downloadUrl, {
        headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
      });
      if (downloadRes.status === 404) {
        localStorage.removeItem('loan_gdrive_file_id');
        return null;
      }
      await checkGoogleDriveResponse(downloadRes, { silent });
      const encrypted = await downloadRes.text();
      return { fileId, encrypted };
    }

      if (!state.password) {
        if (!silent) showAlert("Lỗi", "Chưa thiết lập mã PIN bảo mật!");
        return false;
      }
      if (_gdriveSyncInProgress && silent) return false;

      if (!silent) showNotification("Đang sao lưu lên Google Drive...");
      _gdriveSyncInProgress = true;
      try {
        const backupAt = Date.now();
        const encrypted = encrypt(state.password, JSON.stringify(buildAppDataPayload(backupAt)));
        const fileId = await resolveGDriveBackupFileId({ silent });
        if (!fileId) throw new Error("Không thể khởi tạo hoặc tìm thấy ID tệp tin trên Google Drive");

        const uploadUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`;
        const uploadRes = await fetch(uploadUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${state.gdriveToken}`,
            'Content-Type': 'application/json'
          },
          body: encrypted,
          keepalive: keepalive
        });
        await checkGoogleDriveResponse(uploadRes, { silent });

        state.lastLocalChangeAt = Math.max(Number(state.lastLocalChangeAt || 0), backupAt);
        localStorage.setItem('loan_last_local_change', String(state.lastLocalChangeAt));
        localStorage.setItem('loan_last_gdrive_sync', String(backupAt));
        localStorage.setItem('loan_last_cloud_sync', String(Math.max(backupAt, Number(localStorage.getItem('loan_last_cloud_sync') || 0))));
        if (typeof recomputeCloudDirty === 'function') recomputeCloudDirty();
        if (!silent) showNotification("Đã sao lưu lên Google Drive thành công!");
        else console.log('[GDrive] Auto backup OK @', new Date(backupAt).toISOString());
        return true;
      } catch (err) {
        console.error("Lỗi Google Drive Backup:", err);
        if (!silent && err.message !== "Phiên làm việc Google Drive đã hết hạn") {
          showAlert("Lỗi Sao Lưu", "Không thể lưu trữ lên Google Drive: " + err.message);
        }
        return false;
      } finally {
        _gdriveSyncInProgress = false;
      }
    }

    async function restoreFromGoogleDrive(opts = {}) {
      const silent = !!opts.silent;
      if (!state.gdriveToken) {
        if (silent) return false;
        return connectGoogleDrive();
      }
      if (!state.password) {
        if (!silent) showAlert("Lỗi", "Chưa thiết lập mã PIN bảo mật!");
        return false;
      }

      if (!silent) showNotification("Đang khôi phục từ Google Drive...");
      try {
        const bundle = await fetchCloudBackupBundle({ silent });
        if (!bundle) {
          if (!silent) showAlert("Không tìm thấy", `Không tìm thấy tệp sao lưu '${GDRIVE_BACKUP_NAME}' trên tài khoản Google Drive này.`);
          return false;
        }

        try {
          const decrypted = decrypt(state.password, bundle.encrypted);
          const data = JSON.parse(decrypted);
          if (data.customers && data.contracts && data.payments) {
            applyAppDataFromCloud(data, { render: true, provider: 'gdrive' });
            if (!silent) showNotification("Khôi phục dữ liệu từ Google Drive thành công!");
            return true;
          }
          throw new Error("Dữ liệu sao lưu không tương thích!");
        } catch (e) {
          if (e && e.message === "Dữ liệu sao lưu không tương thích!") {
            if (!silent) showAlert("Lỗi", e.message);
          } else if (!silent) {
            showAlert("Lỗi giải mã", "Mã PIN hiện tại không chính xác để mở tệp sao lưu Google Drive này.");
          }
          return false;
        }
      } catch (err) {
        console.error("Lỗi Google Drive Restore:", err);
        if (!silent && err.message !== "Phiên làm việc Google Drive đã hết hạn") {
          showAlert("Lỗi Khôi Phục", "Không thể khôi phục từ Google Drive: " + err.message);
        }
        return false;
      }
    }

    function recomputeCloudDirty() {
      const localAt = Number(state.lastLocalChangeAt || localStorage.getItem('loan_last_local_change') || 0);
      let dirty = false;
      if (state.gdriveToken && isAutoGDriveSyncEnabled()) {
        if (localAt > Number(localStorage.getItem('loan_last_gdrive_sync') || 0)) dirty = true;
      }
      state.dataDirtySinceBackup = dirty;
      return dirty;
    }

    async function autoBackupAllConnected(opts = {}) {
      const jobs = [];
      if (isAutoGDriveSyncEnabled() && state.gdriveToken) {
        jobs.push(backupToGoogleDrive(opts).catch(err => console.warn('[GDrive] backup fail', err)));
      }
      if (!jobs.length) return;
      await Promise.allSettled(jobs);
      recomputeCloudDirty();
    }

    /** Vào app / mở lại tab: lấy bản cloud mới nhất (GDrive), đẩy local nếu local mới hơn */
    async function autoSyncOnAppEnter() {
      if (!state.isUnlocked || !state.password) return;
      if (Date.now() - _lastEnterSyncAt < 4000) return;
      _lastEnterSyncAt = Date.now();

      const localAt = Number(state.lastLocalChangeAt || localStorage.getItem('loan_last_local_change') || 0);
      const candidates = [];

      // --- Google Drive ---
      if (isAutoGDriveSyncEnabled() && state.gdriveToken) {
        try {
          const bundle = await fetchCloudBackupBundle({ silent: true });
          if (!bundle) {
            candidates.push({ provider: 'gdrive', at: 0, missing: true });
          } else {
            try {
              const data = JSON.parse(decrypt(state.password, bundle.encrypted));
              if (data && data.contracts && data.customers) {
                candidates.push({ provider: 'gdrive', at: Number(data.backupAt || 0), data });
              }
            } catch (e) {
              console.warn('[GDrive] Auto sync: không giải mã được bản cloud (PIN khác?)');
            }
          }
        } catch (err) {
          console.warn('[GDrive] Auto sync on enter failed:', err && err.message);
        }
      }

      if (!candidates.length) return;

      const withData = candidates.filter(c => c.data);
      const best = withData.slice().sort((a, b) => b.at - a.at)[0];

      if (best && best.at > localAt) {
        applyAppDataFromCloud(best.data, { render: true, provider: best.provider });
        showNotification(`☁️ Đã tự động đồng bộ dữ liệu mới từ Google Drive`);
        for (const c of candidates) {
          if (c.provider === best.provider) continue;
          if (c.provider === 'gdrive') await backupToGoogleDrive({ silent: true });
        }
      } else if (state.dataDirtySinceBackup || candidates.some(c => c.missing || (c.data && localAt > c.at))) {
        await autoBackupAllConnected({ silent: true });
      } else if (best) {
        localStorage.setItem('loan_last_cloud_sync', String(Math.max(best.at, localAt, Number(localStorage.getItem('loan_last_cloud_sync') || 0))));
      }
      recomputeCloudDirty();
    }

    /** Thoát app / ẩn tab: sao lưu lên mọi cloud đang kết nối */
    async function autoBackupOnAppLeave() {
      if (!state.isUnlocked || !state.password) return;
      if (Date.now() - _lastLeaveBackupAt < 1500) return;
      _lastLeaveBackupAt = Date.now();
      recomputeCloudDirty();
      if (!state.dataDirtySinceBackup) return;

      try {
        await autoBackupAllConnected({ silent: true, keepalive: true });
      } catch (err) {
        console.warn('[Cloud] Auto backup on leave failed:', err && err.message);
      }
    }

    function bindGDriveLifecycleHooks() {
      if (_gdriveLifecycleBound) return;
      _gdriveLifecycleBound = true;

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          autoBackupOnAppLeave();
        } else if (document.visibilityState === 'visible') {
          setTimeout(() => autoSyncOnAppEnter(), 500);
        }
      });

      window.addEventListener('pagehide', () => {
        autoBackupOnAppLeave();
      });

      window.addEventListener('blur', () => {
        if (document.visibilityState === 'hidden') autoBackupOnAppLeave();
      });
    }

    function showNotification(message, type = 'success') {
      if (typeof state !== 'undefined' && state) {
        state.notification = { message, type };
        if (typeof renderApp === 'function') renderApp();
        setTimeout(() => {
          if (typeof state !== 'undefined' && state) { state.notification = null; if (typeof renderApp === 'function') renderApp(); }
        }, 3000);
      } else {
        console.log('NOTIF:', message);
      }
    }

    // === POLYFILL MODALS (fix showAlert/showConfirm not defined) - must before any use and before window assignments ===
    function showAlert(title, message) {
      if (typeof state !== 'undefined' && state && state.customAlert) {
        state.customAlert = { show: true, title: title || 'Thông báo', message: String(message || '') };
        if (typeof renderApp === 'function') renderApp();
      } else {
        try { alert((title ? title + ': ' : '') + message); } catch(_) { console.error(title, message); }
      }
    }
    function showConfirm(title, message, action) {
      if (typeof state !== 'undefined' && state && state.customConfirm) {
        state.customConfirm = { show: true, title: title || 'Xác nhận', message: String(message || ''), action: (typeof action === 'function' ? action : null) };
        if (typeof renderApp === 'function') renderApp();
      } else if (typeof action === 'function') {
        try { if (confirm((title ? title + '\n\n' : '') + message)) action(); } catch(_) { action(); }
      } else {
        try { confirm((title ? title + '\n\n' : '') + message); } catch(_) {}
      }
    }

    function handleUnlock(e) {
      if (e) e.preventDefault();
      const pinInput = document.getElementById('unlock-pin');
      if (!pinInput) return;
      const pin = pinInput.value;
      if (!pin) return;
      
      const encrypted = localStorage.getItem('loan_data_encrypted');
      if (!encrypted) return;
      
      try {
        const decryptedStr = decrypt(pin, encrypted);
        const data = JSON.parse(decryptedStr);
        
        if (data && data.contracts && data.customers) {
          state.customers = data.customers || [];
          state.contracts = data.contracts || [];
          state.payments = data.payments || [];
          state.capitalSources = data.capitalSources || [];
          state.interestWithdrawals = (data.interestWithdrawals || []).filter(w => w.MaRut !== 'RW1');
          state.partnerWithdrawals = data.partnerWithdrawals || [];
          state.paidSourceInterests = data.paidSourceInterests || [];
          state.businessInterestTransfers = data.businessInterestTransfers || [];
          state.customBaseTongLaiThucThu = data.customBaseTongLaiThucThu !== undefined ? data.customBaseTongLaiThucThu : 3763899;
          state.password = pin;
          state.isUnlocked = true;
          state.lastLocalChangeAt = Number(data.backupAt || localStorage.getItem('loan_last_local_change') || Date.now());
          state.dataDirtySinceBackup = Number(state.lastLocalChangeAt) > Number(localStorage.getItem('loan_last_cloud_sync') || 0);
          
          normalizeAllMaHopDong();
          recalculateAllDueDates();
          
          showNotification("Đã mở khóa dữ liệu thành công!");
          renderApp();
          // Tự động đồng bộ Google Drive khi vào app
          setTimeout(() => autoSyncOnAppEnter(), 600);
        } else {
          throw new Error("Invalid database schema");
        }
      } catch(err) {
        console.error("Unlock failed:", err);
        renderLockScreen(true); // show error and shake
      }
    }

    function handleSetupPIN(e, isMigration) {
      if (e) e.preventDefault();
      const pin = document.getElementById('setup-pin').value;
      const confirmPin = document.getElementById('setup-pin-confirm').value;
      
      if (pin.length < 4 || pin.length > 6) {
        return renderSetupScreen(isMigration, "Mã PIN phải có độ dài từ 4 đến 6 số!");
      }
      if (pin !== confirmPin) {
        return renderSetupScreen(isMigration, "Xác nhận mã PIN không trùng khớp!");
      }
      
      state.password = pin;
      state.isUnlocked = true;
      
      if (isMigration) {
        state.customers = safeGetLocal('loan_customers', DEFAULT_CUSTOMERS);
        state.contracts = safeGetLocal('loan_contracts', DEFAULT_CONTRACTS);
        state.payments = safeGetLocal('loan_payments', DEFAULT_PAYMENTS);

    function formatVND(number) {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "-";
      // If already in dd/mm/yyyy or d/m/yyyy, normalize to dd/mm/yyyy
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
        const [d, m, y] = dateStr.split('/');
        return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
      }
      // Handle yyyy-mm-dd or yyyy/m/d etc.
      let parts = dateStr.split(/[-\/]/);
      if (parts.length === 3) {
        // Assume yyyy first if 4 digits
        if (parts[0].length === 4) {
          return `${parts[2].padStart(2,'0')}/${parts[1].padStart(2,'0')}/${parts[0]}`;
        } else {
          // Assume dd/mm/yyyy already or similar
          return `${parts[0].padStart(2,'0')}/${parts[1].padStart(2,'0')}/${parts[2]}`;
        }
      }
      // Fallback: try parse as Date and format as dd/mm/yyyy
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth() + 1).padStart(2,'0');
        const yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
      }
      return dateStr;
    }

    // Helper to convert any date string to yyyy-mm-dd for <input type="date"> value
    function toInputDate(dateStr) {
      if (!dateStr) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
      const formatted = formatDate(dateStr);
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(formatted)) {
        const [d, m, y] = formatted.split('/');
        return `${y}-${m}-${d}`;
      }
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
      return '';
    }

    // Parse dd/mm/yyyy (or d/m/yyyy) to yyyy-mm-dd for storage
    function parseDateToISO(str) {
      if (!str) return '';
      str = str.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
      const parts = str.split(/[-\/]/);
      if (parts.length === 3) {
        let d = parts[0].padStart(2, '0');
        let m = parts[1].padStart(2, '0');
        let y = parts[2];
        if (y.length === 2) y = '20' + y;
        return `${y}-${m}-${d}`;
      }
      return '';
    }

    function addMonthsSafe(date, months) {
      const result = new Date(date);
      const targetMonth = result.getMonth() + months;
      result.setMonth(targetMonth);
      if (result.getMonth() !== (targetMonth % 12 + 12) % 12) {
        result.setDate(0); 
      }
      return result;
    }

    /** Ngày local YYYY-MM-DD (tránh lệch timezone khi dùng toISOString) */
    function todayYMD() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function ymdToLocalDate(dateStr) {
      if (!dateStr) return null;
      const s = String(dateStr).trim();
      let y, m, d;
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        const p = s.slice(0, 10).split('-');
        y = +p[0]; m = +p[1]; d = +p[2];
      } else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
        const p = s.split('/');
        d = +p[0]; m = +p[1]; y = +p[2];
      } else {
        const dt = new Date(s);
        if (isNaN(dt.getTime())) return null;
        return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
      }
      if (!y || !m || !d) return null;
      return new Date(y, m - 1, d);
    }
    function localDateToYMD(date) {
      if (!date || isNaN(date.getTime())) return '';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function calculateStandardDays(startDateStr, endDateStr) {
      const start = ymdToLocalDate(startDateStr);
      const end = ymdToLocalDate(endDateStr);
      if (!start || !end || end <= start) return 0;
      let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      let tempDate = addMonthsSafe(start, months);
      if (tempDate > end) { months--; tempDate = addMonthsSafe(start, months); }
      const diffTime = end.getTime() - tempDate.getTime();
      return (months * 30) + Math.floor(diffTime / (1000 * 3600 * 24));
    }

    function calculateCapitalSourceDetails(source) {
      const todayStr = new Date().toISOString().split('T')[0];
      const txs = [...(source.LichSuBienDong || [])].sort((a, b) => new Date(a.Ngay) - new Date(b.Ngay));
      let currentCapital = 0; let totalInterestExpense = 0;
      if (txs.length === 0) return { tongVonHienTai: 0, chiPhiLaiTichLuy: 0, lichSu: [] };
      let lastDate = txs[0].Ngay;
      for (let i = 0; i < txs.length; i++) {
        const tx = txs[i];
        const daysElapsed = calculateStandardDays(lastDate, tx.Ngay);
        totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (daysElapsed / 30));
        currentCapital += Number(tx.SoTien);
        lastDate = tx.Ngay;
      }
      totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (calculateStandardDays(lastDate, todayStr) / 30));
      return { tongVonHienTai: currentCapital, chiPhiLaiTichLuy: totalInterestExpense, lichSu: txs };
    }

    // === CÁC HÀM TÍNH LÃI MÔ-ĐUN HỢP ĐỒNG ===
    
    // Tính lãi tháng đầu tiên (Bao gồm 1 tháng đầy đủ 30 ngày + các ngày dư từ Ngày bắt đầu vay tới Ngày bắt đầu tính lãi)
    function calculateFirstMonthInterest(contract) {
      if (!contract || !contract.SoTienVay) return 0;
      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        return Number(contract.SoLaiCoDinh || 0);
      }
      const ngayVay = contract.NgayVay;
      const ngayTinhLai = contract.NgayBatDauTinhLai || ngayVay;
      const laiNgay = contract.LaiNgayTrenTrieu || 0;
      const soTienVay = Number(contract.SoTienVay || 0);
      
      const extraDays = calculateStandardDays(ngayVay, ngayTinhLai);
      const extraLai = extraDays > 0 ? Math.round((soTienVay / 1000000) * laiNgay * extraDays) : 0;
      const firstMonthBaseLai = Math.round((soTienVay / 1000000) * laiNgay * 30);
      
      return firstMonthBaseLai + extraLai;
    }

    // Tính lãi cho một kỳ cụ thể (hỗ trợ điều chỉnh ngày đóng lãi)
    // Nếu isFirstPayment=true và kỳ bắt đầu quanh NgayBatDauTinhLai thì + extra (ngày giải ngân đến ngày tính lãi)
    function calculateInterestForPeriod(contract, kyLaiTu, kyLaiDen, isFirstPayment = false) {
      if (!contract || !kyLaiTu || !kyLaiDen) return 0;
      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        return Number(contract.SoLaiCoDinh || 0);
      }
      const soTien = Number(contract.SoTienVay || 0);
      const laiNgay = Number(contract.LaiNgayTrenTrieu || 0);
      const ngayTinhLai = contract.NgayBatDauTinhLai || contract.NgayVay || kyLaiTu;

      const periodDays = calculateStandardDays(kyLaiTu, kyLaiDen);
      let lai = Math.round((soTien / 1000000) * laiNgay * periodDays);

      if (isFirstPayment) {
        const extraDays = calculateStandardDays(contract.NgayVay, ngayTinhLai);
        const extraLai = extraDays > 0 ? Math.round((soTien / 1000000) * laiNgay * extraDays) : 0;
        // Chỉ cộng extra nếu kỳ này là kỳ đầu (từ >= ngày tính lãi hoặc rất sát đầu)
        const daysFromTuToTinh = calculateStandardDays(kyLaiTu, ngayTinhLai);
        if (daysFromTuToTinh <= 1) { // tu gần hoặc sau/sát ngày bắt đầu tính lãi
          lai += extraLai;
        }
      }
      return lai;
    }

    // Gợi ý lãi kỳ hiện tại + kỳ từ/đến cho form thanh toán (dựa trên lịch sử trả trước đó)
    function getCurrentCycleInterestSuggestion(contract) {
      if (!contract) return { amount: 0, kyTu: '', kyDen: '', isFirst: true, note: '' };
      const st = window.state || state;
      const prior = (st.payments || []).filter(p => p.MaHopDong === contract.MaHopDong && p.LoaiThanhToan === 'Trả lãi')
        .sort((a, b) => (b.KyLaiDen || b.NgayThanhToan || '').localeCompare(a.KyLaiDen || a.NgayThanhToan || ''));
      const isFirst = prior.length === 0;
      let kyTu = contract.NgayBatDauTinhLai || contract.NgayVay;
      if (prior.length > 0) {
        kyTu = prior[0].KyLaiDen || prior[0].NgayThanhToan || kyTu;
      }
      let kyDen = contract.NgayDaoHan;
      if (!kyDen) {
        // dự phòng +30 ngày chuẩn từ kyTu
        const d = new Date(kyTu); d.setDate(d.getDate() + 30);
        kyDen = d.toISOString().split('T')[0];
      }
      const amount = calculateInterestForPeriod(contract, kyTu, kyDen, isFirst);
      let note = '';
      if (isFirst) {
        const ngayTinhLai = contract.NgayBatDauTinhLai || contract.NgayVay;
        const ex = calculateStandardDays(contract.NgayVay, ngayTinhLai);
        if (ex > 0) {
          note = `Kỳ đầu (có ${ex} ngày dư từ giải ngân ${formatDate(contract.NgayVay)} → tính lãi ${formatDate(ngayTinhLai)})`;
        } else {
          note = 'Kỳ đầu tiên';
        }
      } else {
        note = 'Kỳ lãi định kỳ (30 ngày chuẩn)';
      }
      return { amount, kyTu, kyDen, isFirst, note };
    }

    // Tính lãi cố định ngắn hạn
    function calculateFixedDailyInterest(contract) {
      return Number((contract && contract.SoLaiCoDinh) || 0);
    }

    // Tính "Ngày vay sau đáo" = Ngày vay (hoặc ngày tính lãi gốc) + số tháng tương ứng với số lần đóng lãi
    function calculateNgayVaySauDao(contract) {
      if (!contract) return '';
      const baseStr = contract.NgayBatDauTinhLai || contract.NgayVay;
      if (!baseStr) return '';

      const contractPayments = (state.payments || []).filter(p => p.MaHopDong === contract.MaHopDong && p.LoaiThanhToan === 'Trả lãi');
      const paidMonths = contractPayments.length;

      if (paidMonths === 0) return baseStr;

      const parts = baseStr.split('-');
      if (parts.length !== 3) return baseStr;

      let y = parseInt(parts[0], 10);
      let m = parseInt(parts[1], 10) - 1; // 0-indexed
      let d = parseInt(parts[2], 10);

      m += paidMonths;
      y += Math.floor(m / 12);
      m = m % 12;

      const maxDays = new Date(y, m + 1, 0).getDate();
      if (d > maxDays) d = maxDays;

      const mm = String(m + 1).padStart(2, '0');
      const dd = String(d).padStart(2, '0');
      return `${y}-${mm}-${dd}`;
    }

    // Tính lãi phát sinh từ "Ngày vay sau đáo" đến Ngày hiện tại (targetDateStr)
    // Quy tắc:
    // - Nếu chưa đủ 1 tháng: Lãi = Số tiền lãi/ngày * Số ngày lẻ trôi qua
    // - Nếu đã đủ hoặc vượt 1 tháng: Lãi = (Số tháng tròn * Lãi 1 tháng 30d) + (Số tiền lãi/ngày * Số ngày lẻ dư)
    function calculateInterestFromNgayVaySauDao(contract, targetDateStr) {
      if (!contract) return { laiConNo: 0, fullMonths: 0, remDays: 0, ngayVaySauDaoStr: '' };
      const ngayVaySauDaoStr = calculateNgayVaySauDao(contract);
      if (!ngayVaySauDaoStr || !targetDateStr) return { laiConNo: 0, fullMonths: 0, remDays: 0, ngayVaySauDaoStr: '' };

      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        const cPayments = (state.payments || []).filter(p => p.MaHopDong === contract.MaHopDong && p.LoaiThanhToan === 'Trả lãi');
        const laiDaTra = cPayments.reduce((sum, p) => sum + Number(p.SoTienTra || 0), 0);
        const fixed = Number(contract.SoLaiCoDinh || 0);
        return { laiConNo: Math.max(0, fixed - laiDaTra), fullMonths: 0, remDays: 0, ngayVaySauDaoStr };
      }

      const soTien = Number(contract.SoTienVay || 0);
      const laiNgay = Number(contract.LaiNgayTrenTrieu || 0);
      const baseMonth30 = Math.round((soTien / 1000000) * laiNgay * 30);
      const dailyInterest = Math.round((soTien / 1000000) * laiNgay);

      const cPayments = (state.payments || []).filter(p => p.MaHopDong === contract.MaHopDong && p.LoaiThanhToan === 'Trả lãi');
      const isFirstCycle = cPayments.length === 0;
      const extraDays = isFirstCycle ? calculateStandardDays(contract.NgayVay, contract.NgayBatDauTinhLai || contract.NgayVay) : 0;
      const extraLai = extraDays > 0 ? extraDays * dailyInterest : 0;

      const startDate = ymdToLocalDate(ngayVaySauDaoStr);
      const endDate = ymdToLocalDate(targetDateStr);
      if (!startDate || !endDate || endDate < startDate) {
        return { laiConNo: Math.max(0, extraLai), fullMonths: 0, remDays: 0, ngayVaySauDaoStr, extraDays, extraLai };
      }

      let y1 = startDate.getFullYear(), m1 = startDate.getMonth(), d1 = startDate.getDate();
      let y2 = endDate.getFullYear(), m2 = endDate.getMonth(), d2 = endDate.getDate();

      let fullMonths = (y2 - y1) * 12 + (m2 - m1);
      
      let anchorDate = new Date(y1, m1 + fullMonths, Math.min(d1, new Date(y1, m1 + fullMonths + 1, 0).getDate()));

      if (endDate < anchorDate) {
        fullMonths -= 1;
        if (fullMonths < 0) fullMonths = 0;
        anchorDate = new Date(y1, m1 + fullMonths, Math.min(d1, new Date(y1, m1 + fullMonths + 1, 0).getDate()));
      }

      const remDays = Math.max(0, calculateStandardDays(localDateToYMD(anchorDate), targetDateStr));
      let laiPhatSinh = 0;
      if (fullMonths <= 0) {
        laiPhatSinh = (remDays * dailyInterest) + extraLai;
      } else {
        laiPhatSinh = (fullMonths * baseMonth30) + (remDays * dailyInterest) + extraLai;
      }
      laiPhatSinh = Math.max(0, Math.round(laiPhatSinh));

      return {
        laiConNo: laiPhatSinh,
        fullMonths,
        remDays,
        ngayVaySauDaoStr,
        extraDays,
        extraLai
      };
    }

    /**
     * Tính lãi khi tất toán / trả gốc
     * mode: 'den_ngay_tra' = lãi đến đúng ngày khách trả
     *       'du_thang'      = làm tròn đủ tháng (có ngày lẻ → tính thêm 1 tháng đầy)
     */
    function calculateSettlementInterest(contract, ngayTraYMD, mode = 'den_ngay_tra') {
      if (!contract) return { lai: 0, laiPhatSinh: 0, laiNoCu: 0, fullMonths: 0, remDays: 0, mode, note: '' };
      const ngayTra = ngayTraYMD || todayYMD();
      const laiNoCu = Math.max(0, Math.round(Number(contract.laiConNo || 0)));
      const soTien = Number(contract.SoTienVay || 0);
      const laiNgay = Number(contract.LaiNgayTrenTrieu || 0);
      const baseMonth30 = Math.round((soTien / 1000000) * laiNgay * 30);
      const dailyInterest = Math.round((soTien / 1000000) * laiNgay);

      // HĐ đã trả gốc, chỉ còn lãi đóng băng
      if (contract.TrangThai === 'Còn lãi' || contract.LaiDongBang) {
        return {
          lai: laiNoCu,
          laiPhatSinh: 0,
          laiNoCu,
          fullMonths: 0,
          remDays: 0,
          mode,
          note: 'Lãi còn lại (đã khóa sau trả gốc)'
        };
      }

      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        const r = calculateInterestFromNgayVaySauDao(contract, ngayTra);
        const laiPhatSinh = Math.max(0, Math.round(Number(r.laiConNo || 0)));
        return {
          lai: laiPhatSinh + laiNoCu,
          laiPhatSinh,
          laiNoCu,
          fullMonths: 0,
          remDays: 0,
          mode,
          note: 'Lãi cố định'
        };
      }

      const r = calculateInterestFromNgayVaySauDao(contract, ngayTra);
      let fullMonths = Math.max(0, Number(r.fullMonths || 0));
      let remDays = Math.max(0, Number(r.remDays || 0));
      let extraLai = Math.max(0, Number(r.extraLai || 0));
      let laiPhatSinh = 0;
      let note = '';

      if (mode === 'du_thang') {
        // Đủ tháng: mỗi tháng tròn 30d; nếu còn ngày lẻ → + thêm 1 tháng đầy đủ
        let monthsCharge = fullMonths;
        if (remDays > 0) monthsCharge += 1;
        // Nếu chưa đủ 1 tháng nhưng đã qua ít nhất 1 ngày → vẫn tính 1 tháng
        if (monthsCharge === 0) {
          const start = r.ngayVaySauDaoStr;
          if (start && calculateStandardDays(start, ngayTra) > 0) monthsCharge = 1;
        }
        laiPhatSinh = monthsCharge * baseMonth30 + extraLai;
        note = `Đủ tháng: ${monthsCharge} tháng × ${formatVND(baseMonth30)}${extraLai ? ` + dư đầu ${formatVND(extraLai)}` : ''}`;
        fullMonths = monthsCharge;
        remDays = 0;
      } else {
        // Đến ngày trả: tính đúng số ngày
        if (fullMonths <= 0) {
          laiPhatSinh = remDays * dailyInterest + extraLai;
        } else {
          laiPhatSinh = fullMonths * baseMonth30 + remDays * dailyInterest + extraLai;
        }
        note = `Đến ngày trả: ${fullMonths}th + ${remDays}d`;
      }

      laiPhatSinh = Math.max(0, Math.round(laiPhatSinh));
      return {
        lai: laiPhatSinh + laiNoCu,
        laiPhatSinh,
        laiNoCu,
        fullMonths,
        remDays,
        mode,
        note,
        ngayVaySauDaoStr: r.ngayVaySauDaoStr
      };
    }

    function calculateContractInterest(contract) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      // Dùng ngày local — không dùng toISOString (lệch UTC)
      const isSettledFull = contract.TrangThai === 'Đã tất toán';
      const isConLai = contract.TrangThai === 'Còn lãi' || !!contract.LaiDongBang;
      const endCalStr = (isSettledFull && contract.NgayTatToan)
        ? (toInputDate(contract.NgayTatToan) || String(contract.NgayTatToan).slice(0, 10))
        : (isConLai && contract.NgayTraGoc)
          ? (toInputDate(contract.NgayTraGoc) || String(contract.NgayTraGoc).slice(0, 10))
          : todayYMD();
      
      let soNgayVay = calculateStandardDays(contract.NgayVay, endCalStr);

      const contractPayments = (state.payments || []).filter(p => p.MaHopDong === contract.MaHopDong);
      const laiPayments = contractPayments.filter(p => p.LoaiThanhToan === 'Trả lãi')
        .sort((a, b) => (b.NgayThanhToan || '').localeCompare(a.NgayThanhToan || ''));
      const isFirstCycle = laiPayments.length === 0;

      const ngayTinhLaiStr = contract.NgayBatDauTinhLai || contract.NgayVay;
      const extraDays = isFirstCycle ? calculateStandardDays(contract.NgayVay, ngayTinhLaiStr) : 0;
      const extraLai = extraDays > 0 ? Math.round((contract.SoTienVay / 1000000) * (contract.LaiNgayTrenTrieu || 0) * extraDays) : 0;
      const baseMonth30 = Math.round((contract.SoTienVay / 1000000) * (contract.LaiNgayTrenTrieu || 0) * 30);

      let laiThangChuan30Ngay = (isFirstCycle && extraDays > 0) ? (baseMonth30 + extraLai) : baseMonth30;
      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        laiThangChuan30Ngay = Number(contract.SoLaiCoDinh || 0);
      }

      const gocDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Tất toán').reduce((sum, p) => sum + Number(p.SoTienTra), 0);
      const duNoGocHienTai = Math.max(0, Number(contract.SoTienVay || 0) - gocDaTra);

      let laiPhatSinh = 0;
      let laiNoCu = Math.max(0, Math.round(Number(contract.laiConNo || 0)));
      let laiConNo = 0;
      let sauDaoResult = { fullMonths: 0, remDays: 0, ngayVaySauDaoStr: ngayTinhLaiStr, extraDays: 0, extraLai: 0 };
      let showExtraDays = extraDays;
      let showExtraLai = extraLai;

      if (isConLai || isSettledFull) {
        // Đã trả gốc / tất toán xong: không còn dư nợ để tính lãi tháng
        // → Lãi 1 tháng (30d) = 0; chỉ còn theo dõi Lãi còn nợ (đóng băng)
        laiPhatSinh = 0;
        laiConNo = isSettledFull ? 0 : laiNoCu;
        laiThangChuan30Ngay = 0;
        showExtraDays = 0;
        showExtraLai = 0;
        sauDaoResult.ngayVaySauDaoStr = contract.NgayTraGoc || contract.NgayTatToan || ngayTinhLaiStr;
      } else {
        sauDaoResult = calculateInterestFromNgayVaySauDao(contract, endCalStr);
        // Lãi còn nợ = lãi phát sinh từ Ngày vay sau đáo → nay + nợ lãi cũ (đóng thiếu)
        laiPhatSinh = Math.max(0, Math.round(Number(sauDaoResult.laiConNo || 0)));
        laiConNo = laiPhatSinh + laiNoCu;
        // Không còn gốc thì không hiển thị lãi tháng chuẩn
        if (duNoGocHienTai <= 0) {
          laiThangChuan30Ngay = 0;
          showExtraDays = 0;
          showExtraLai = 0;
        }
      }
      const tongLaiPhatSinh = laiConNo;
      const ngayVaySauDaoStr = sauDaoResult.ngayVaySauDaoStr || ngayTinhLaiStr;

      const ngayDongLaiGanNhat = laiPayments.length > 0 ? laiPayments[0].NgayThanhToan : null;
      const laiDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Trả lãi').reduce((sum, p) => sum + Number(p.SoTienTra || 0), 0);

      let chiPhiVonLuyKe = 0;
      const lichSuNguon = contract.LichSuNguon || [{ NgayBatDau: contract.NgayVay, NgayKetThuc: null, MaNguon: contract.MaNguon, SoTien: contract.SoTienVay }];
      lichSuNguon.forEach(seg => {
        const segDays = calculateStandardDays(seg.NgayBatDau, seg.NgayKetThuc ? seg.NgayKetThuc : endCalStr);
        const source = (state.capitalSources || []).find(s => s.MaNguon === seg.MaNguon) || { LaiSuatThang: 0 };
        chiPhiVonLuyKe += Math.round(seg.SoTien * (source.LaiSuatThang / 100) * (segDays / 30));
      });

      let chiPhiVonDaTra = 0;
      if (tongLaiPhatSinh > 0) chiPhiVonDaTra = Math.round(laiDaTra * (chiPhiVonLuyKe / tongLaiPhatSinh));
      const activeSeg = lichSuNguon.find(s => s.NgayKetThuc === null) || { MaNguon: contract.MaNguon };
      const activeSource = (state.capitalSources || []).find(s => s.MaNguon === activeSeg.MaNguon) || { TenNguon: "N/A", LaiSuatThang: 0 };

      const daoHanDate = contract.NgayDaoHan ? ymdToLocalDate(contract.NgayDaoHan) : null;

      return {
        soNgayVay,
        tongLaiPhatSinh,
        laiDaTra,
        gocDaTra,
        laiConNo,
        laiPhatSinh,
        laiNoCu,
        duNoGocHienTai,
        chiPhiVonLuyKe,
        chiPhiVonDaTra,
        laQuaHan: (contract.TrangThai === 'Đang vay' || contract.TrangThai === 'Còn lãi') && daoHanDate && today > daoHanDate,
        isConLai: contract.TrangThai === 'Còn lãi' || !!contract.LaiDongBang,
        nguonVon: activeSource.TenNguon,
        laiSuatDauVao: activeSource.LaiSuatThang,
        activeMaNguon: activeSeg.MaNguon,
        lichSuNguon,
        laiThangChuan30Ngay,
        ngayDongLaiGanNhat,
        ngayVaySauDaoStr,
        extraDays: showExtraDays,
        extraLai: showExtraLai,
        fullMonths: sauDaoResult.fullMonths,
        remDays: sauDaoResult.remDays
      };
    }

    function calculateAvailableCapital(sourceId = null, editingContractId = null) {
      const activeContracts = state.contracts.filter(c => c.TrangThai === 'Đang vay' && c.MaHopDong !== editingContractId);
      
      if (sourceId) {
        const src = state.capitalSources.find(s => s.MaNguon === sourceId);
        if (!src || isNonLendingSource(src)) return 0; // Nguồn ngoài hệ thống / KD khác: không cho vay
        const details = calculateCapitalSourceDetails(src);
        let alreadyAllocated = 0;
        activeContracts.forEach(c => {
          (c.LichSuNguon || []).forEach(seg => {
            if (seg.NgayKetThuc === null && seg.MaNguon === sourceId) {
              alreadyAllocated += Number(seg.SoTien || 0);
            }
          });
        });
        return details.tongVonHienTai - alreadyAllocated;
      } else {
        let totalAvailable = 0;
        state.capitalSources.forEach(src => {
          if (isNonLendingSource(src)) return;
          const details = calculateCapitalSourceDetails(src);
          let alreadyAllocated = 0;
          activeContracts.forEach(c => {
            (c.LichSuNguon || []).forEach(seg => {
              if (seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon) {
                alreadyAllocated += Number(seg.SoTien || 0);
              }
            });
          });
          totalAvailable += Math.max(0, details.tongVonHienTai - alreadyAllocated);
        });
        return totalAvailable;
      }
    }


    // === TỰ ĐỘNG PHÂN BỔ NGUỒN VỐN (ưu tiên lãi suất thấp nhất trước) ===
    function autoAllocateSources(soTienVay, startDateStr) {
      if (!soTienVay || soTienVay <= 0) return [];
      const todayStr = new Date().toISOString().split('T')[0];
      const editingId = (state.editingContract && state.editingContract.MaHopDong) || null;
      const activeContracts = state.contracts.filter(c => c.TrangThai === 'Đang vay' && c.MaHopDong !== editingId);
      // sort sources by LaiSuatThang ascending (lowest cost first) — bỏ nguồn không cho vay (KD khác)
      const sortedSources = [...state.capitalSources]
        .filter(s => !isNonLendingSource(s))
        .sort((a, b) => (a.LaiSuatThang || 0) - (b.LaiSuatThang || 0));
      let remaining = Number(soTienVay);
      const allocation = [];
      for (const src of sortedSources) {
        if (remaining <= 0) break;
        const details = calculateCapitalSourceDetails(src);
        let alreadyAllocated = 0;
        activeContracts.forEach(c => {
          (c.LichSuNguon || []).forEach(seg => {
            if (seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon) alreadyAllocated += Number(seg.SoTien || 0);
          });
        });
        const available = Math.max(0, details.tongVonHienTai - alreadyAllocated);
        if (available <= 0) continue;
        const take = Math.min(remaining, available);
        if (take > 0) {
          allocation.push({ MaNguon: src.MaNguon, SoTien: take });
          remaining -= take;
        }
      }
      if (remaining > 0 && allocation.length > 0) {
        // spill the rest to the cheapest (first) source anyway
        allocation[0].SoTien += remaining;
      } else if (remaining > 0 && sortedSources.length > 0) {
        allocation.push({ MaNguon: sortedSources[0].MaNguon, SoTien: remaining });
      }
      return allocation;
    }

    function getContractWarningStatus(contract) {
      if (contract.TrangThai !== 'Đang vay') return { type: 'normal', label: '', cls: '', daysDiff: null, absDays: 0 };
      const today = new Date();
      today.setHours(0,0,0,0);
      if (!contract.NgayDaoHan) return { type: 'normal', label: '', cls: '', daysDiff: null, absDays: 0 };
      const dao = new Date(contract.NgayDaoHan);
      dao.setHours(0,0,0,0);
      const diff = Math.ceil((dao - today) / (1000*3600*24));
      const absDays = Math.abs(diff);
      if (diff < 0) {
        return { type: 'overdue', label: `Quá hạn ${absDays} ngày`, cls: 'bg-rose-100 text-rose-800 font-semibold', daysDiff: diff, absDays: absDays };
      }
      if (diff === 0) {
        return { type: 'due_today', label: 'Đến hạn hôm nay', cls: 'bg-orange-100 text-orange-800 font-semibold', daysDiff: 0, absDays: 0 };
      }
      if (diff <= 3) {
        return { type: 'due_soon', label: `Còn ${diff} ngày`, cls: 'bg-amber-100 text-amber-800 font-semibold', daysDiff: diff, absDays: absDays };
      }
      // For normal upcoming, no big badge in MÃ HĐ (to avoid clutter), but daysDiff is available for the ĐẾN HẠN column
      return { type: 'normal', label: '', cls: '', daysDiff: diff, absDays: absDays };
    }

    // === TỰ ĐỘNG MÃ HỢP ĐỒNG HDVT0001, HDVT0002... ===
    function normalizeAllMaHopDong() {
      const oldToNew = {};
      let changed = false;
      state.contracts.forEach(c => {
        if (c.laiConNo === undefined || c.laiConNo === null) {
          c.laiConNo = 0;
        }
        if (!c.MaHopDong) return;
        const m = /^HDVT(\d+)$/.exec(c.MaHopDong);
        if (m) {
          const num = parseInt(m[1], 10);
          const newCode = 'HDVT' + String(num).padStart(4, '0');
          if (c.MaHopDong !== newCode) {
            oldToNew[c.MaHopDong] = newCode;
            c.MaHopDong = newCode;
            changed = true;
          }
        }
      });
      if (changed) {
        // fix payments references
        state.payments.forEach(p => {
          if (p.MaHopDong && oldToNew[p.MaHopDong]) {
            p.MaHopDong = oldToNew[p.MaHopDong];
          }
        });
        console.log('Đã chuẩn hóa mã hợp đồng sang dạng HDVT0001');
      }
    }

    function sanitizeDuplicateKmPayments() {
      if (!state.payments || !Array.isArray(state.payments)) return;
      let changed = false;
      state.payments.forEach(p => {
        if (p.LoaiThanhToan === 'Trả lãi' && Number(p.TienKhuyenMai) > 0) {
          const tra = Number(p.SoTienTra || 0);
          const km = Number(p.TienKhuyenMai || 0);
          if (tra >= km) {
            p.TienKhuyenMai = 0;
            changed = true;
          }
        }
      });
      return changed;
    }

    // === TỰ ĐỘNG TÍNH LẠI HẠN ĐỒNG BỘ THEO LỊCH SỬ DỰA TRÊN CÁC LẦN ĐÓNG LÃI ===
    function recalculateAllDueDates() {
      let changed = false;
      state.contracts.forEach(c => {
        if (c.TrangThai !== 'Đang vay') return;
        if (c.NgayDaoHanManual) return; // Bỏ qua nếu người dùng đã tự sửa ngày đáo hạn thủ công

        // Tìm các giao dịch trả lãi của hợp đồng này, sắp xếp từ cũ nhất đến mới nhất theo KyLaiDen hoặc NgayThanhToan
        const cPayments = (state.payments || [])
          .filter(p => p.MaHopDong === c.MaHopDong && p.LoaiThanhToan === 'Trả lãi')
          .sort((a, b) => (a.KyLaiDen || a.NgayThanhToan || '').localeCompare(b.KyLaiDen || b.NgayThanhToan || ''));

        if (cPayments.length === 0) {
          // Nếu chưa có giao dịch trả lãi nào, giữ nguyên ngày đáo hạn nếu đã có, chỉ điền mặc định nếu trống
          if (!c.NgayDaoHan && c.NgayVay) {
            const start = ymdToLocalDate(c.NgayVay) || new Date(c.NgayVay);
            start.setDate(start.getDate() + 30);
            c.NgayDaoHan = localDateToYMD(start);
            changed = true;
          }
          return;
        }

        // Lấy giao dịch trả lãi mới nhất (kỳ đóng gần nhất)
        const latestPay = cPayments[cPayments.length - 1];
        const closeDateStr = toInputDate(latestPay.KyLaiDen || latestPay.NgayThanhToan) || latestPay.KyLaiDen || latestPay.NgayThanhToan;
        let baseDate = ymdToLocalDate(closeDateStr) || new Date(closeDateStr);
        if (isNaN(baseDate.getTime())) {
          baseDate = ymdToLocalDate(latestPay.NgayThanhToan) || new Date(latestPay.NgayThanhToan);
        }

        // Ngày đáo hạn tiếp theo = Kỳ đóng gần nhất + 30 ngày
        baseDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + 30);

        // Nếu ngày thực nộp sau hạn đó, tịnh tiến thêm các chu kỳ 30 ngày
        const payDate = ymdToLocalDate(latestPay.NgayThanhToan);
        if (payDate && !isNaN(payDate.getTime())) {
          while (baseDate < payDate) {
            baseDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + 30);
          }
        }

        const calculatedNgayDaoHan = localDateToYMD(baseDate);
        const currentIso = toInputDate(c.NgayDaoHan) || c.NgayDaoHan;
        if (currentIso !== calculatedNgayDaoHan) {
          c.NgayDaoHan = calculatedNgayDaoHan;
          changed = true;
        }
      });
      return changed;
    }

    function getNextHopDongMa() {
      let max = 0;
      state.contracts.forEach(c => {
        const m = /^HDVT(\d+)$/.exec(c.MaHopDong || '');
        if (m) {
          const n = parseInt(m[1], 10);
          if (n > max) max = n;
        }
      });
      const next = max + 1;
      return 'HDVT' + String(next).padStart(4, '0');
    }

    function buildLichSuNguonFromAllocation(allocation, ngayVay) {
      return (allocation || []).map(a => ({
        NgayBatDau: ngayVay,
        NgayKetThuc: null,
        MaNguon: a.MaNguon,
        SoTien: a.SoTien
      }));
    }

    function getStats() {
      let stats = { tongVonChoVay: 0, dangVayCount: 0, tatToanCount: 0, quaHanCount: 0, tongLaiConNo: 0, laiThuTrongNgay: 0, tongVonDauVao: 0, tongChiPhiLaiNguon: 0, sourceDetails: {}, tongLaiThucThu: 0, tongLaiKhuyenMai: 0, tongLaiNhanVienGiu: 0, tongGocNhanVienGiu: 0 };

      const todayStr = todayYMD();
      state.contracts.forEach(contract => {
        const calc = calculateContractInterest(contract);
        if (contract.TrangThai === 'Đang vay') {
          stats.tongVonChoVay += calc.duNoGocHienTai;
          
          // CHỈ TÍNH CÁC HỢP ĐỒNG ĐÃ ĐẾN HẠN HOẶC QUÁ HẠN ĐÓNG LÃI MÀ CHƯA NỘP
          const isDue = !contract.NgayDaoHan || todayStr >= contract.NgayDaoHan;
          if (isDue) {
            stats.tongLaiConNo += calc.laiConNo;
          }

          stats.laiThuTrongNgay += (calc.duNoGocHienTai / 1000000) * contract.LaiNgayTrenTrieu;
          calc.laQuaHan ? stats.quaHanCount++ : stats.dangVayCount++;
        } else if (contract.TrangThai === 'Còn lãi') {
          // Đã trả gốc, còn lãi chưa thu — vẫn cộng vào lãi cần thu, không tính dư nợ gốc
          stats.tongLaiConNo += calc.laiConNo;
        } else if (contract.TrangThai === 'Đã tất toán') { stats.tatToanCount++; }
      });

      state.capitalSources.forEach(src => {
        const details = calculateCapitalSourceDetails(src);
        // Nguồn KD khác (ngoài cho vay): vẫn hiện chi tiết nhưng không cộng vào tổng vốn cho vay
        if (!isNonLendingSource(src)) {
          stats.tongVonDauVao += details.tongVonHienTai;
          stats.tongChiPhiLaiNguon += details.chiPhiLaiTichLuy;
        }
        let duNoChoVayCuaNguon = 0;
        state.contracts.forEach(c => { if (c.TrangThai === 'Đang vay') { const activeSeg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon); if (activeSeg) duNoChoVayCuaNguon += activeSeg.SoTien; } });

        let laiDaThuCuaNguon = 0;
        state.payments.forEach(p => {
          if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) {
            const c = state.contracts.find(x => x.MaHopDong === p.MaHopDong);
            if (c) {
              const calc = calculateContractInterest(c);
              const targetSeg = (c.LichSuNguon || []).find(seg => seg.MaNguon === src.MaNguon);
              if (targetSeg && calc.chiPhiVonLuyKe > 0) {
                const segDays = calculateStandardDays(targetSeg.NgayBatDau, targetSeg.NgayKetThuc ? targetSeg.NgayKetThuc : new Date().toISOString().split('T')[0]);
                const segCost = Math.round(targetSeg.SoTien * (src.LaiSuatThang / 100) * (segDays / 30));
                laiDaThuCuaNguon += Math.round(p.SoTienTra * (segCost / calc.chiPhiVonLuyKe));
              }
            }
          }
        });
        stats.sourceDetails[src.MaNguon] = { tongVonHienTai: details.tongVonHienTai, chiPhiLaiTichLuy: details.chiPhiLaiTichLuy, duNoChoVay: duNoChoVayCuaNguon, laiDaThuCuaNguon, thieuHut: Math.max(0, details.chiPhiLaiTichLuy - laiDaThuCuaNguon) };
      });

      state.payments.forEach(p => {
        if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) stats.tongLaiThucThu += Number(p.SoTienTra);
        if (p.LoaiThanhToan === 'Trả lãi' && p.TienKhuyenMai) stats.tongLaiKhuyenMai += Number(p.TienKhuyenMai);
        if (p.TrangThaiThu === 'NhanVienGiu') {
          if (p.LoaiThanhToan === 'Trả lãi') stats.tongLaiNhanVienGiu += Number(p.SoTienTra);
          else if (p.LoaiThanhToan === 'Tất toán') stats.tongGocNhanVienGiu += Number(p.SoTienTra);
        }
      });

      // Tổng Lãi Đã Thu: trừ điều chỉnh lãi kỳ đầu (tính sai) LAI_KY_DAU_DIEU_CHINH
      const actualPaymentsSum = stats.tongLaiThucThu;
      stats.laiKyDauDieuChinh = LAI_KY_DAU_DIEU_CHINH;
      if (state.customBaseTongLaiThucThu !== undefined && state.customBaseTongLaiThucThu !== null && state.customBaseTongLaiThucThu !== 3763899) {
        stats.tongLaiThucThuGoc = Number(state.customBaseTongLaiThucThu);
        stats.tongLaiThucThu = Math.max(0, stats.tongLaiThucThuGoc - LAI_KY_DAU_DIEU_CHINH);
      } else {
        if (actualPaymentsSum > 0) {
          stats.tongLaiThucThuGoc = actualPaymentsSum;
          stats.tongLaiThucThu = Math.max(0, actualPaymentsSum - LAI_KY_DAU_DIEU_CHINH);
        } else {
          stats.tongLaiThucThuGoc = 3763899;
          stats.tongLaiThucThu = Math.max(0, 3763899 - LAI_KY_DAU_DIEU_CHINH);
        }
      }

      stats.tongTienNhanVienGiu = stats.tongLaiNhanVienGiu + stats.tongGocNhanVienGiu;

      // Chi Phí Lãi Nguồn / tháng = TỔNG VỐN HIỆN CÓ của mỗi nguồn × % lãi/tháng
      // (kể cả tiền nhàn rỗi chưa cho vay — vẫn phải trả lãi cho nguồn vốn đó)
      // Nguồn "Tiền KD khác (từ lãi)" lãi 0% / không cho vay → bỏ qua
      let chiPhiNguon1Thang = 0;
      state.capitalSources.forEach(src => {
        if (isNonLendingSource(src)) return;
        const details = calculateCapitalSourceDetails(src);
        const von = Number(details.tongVonHienTai || 0);
        const rate = Number(src.LaiSuatThang || 0);
        if (von > 0 && rate > 0) {
          chiPhiNguon1Thang += Math.round(von * (rate / 100));
        }
      });

      const today = new Date();
      const daysPassed = Math.max(1, today.getDate());
      const laiDaTraNguon = Math.round((chiPhiNguon1Thang / 30) * daysPassed);
      stats.laiDaTraNguonDuyTinh = laiDaTraNguon;
      stats.chiPhiNguon1Thang = chiPhiNguon1Thang;

      // Tổng lãi đã đóng cho nguồn vốn (theo lịch sử bấm "Đã thanh toán")
      stats.tongLaiDaTraNguonThucTe = (state.paidSourceInterests || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      stats.tongLaiDaDongNguonLichSu = stats.tongLaiDaTraNguonThucTe;
      stats.conNoLaiNguon = Math.max(0, laiDaTraNguon - stats.tongLaiDaTraNguonThucTe);

      // Lãi Thực Đã Thu = Tổng Lãi Đã Thu - Thực tế đã trả nguồn vốn
      stats.loiNhuanRongThucTe = stats.tongLaiThucThu - stats.tongLaiDaTraNguonThucTe;
      stats.tongThieuHutPhaiBu = Object.values(stats.sourceDetails).reduce((sum, item) => sum + item.thieuHut, 0);

      // === THỨ TỰ: Lãi ròng → trừ chuyển KD khác → rồi mới chia Đối tác / Chủ sở hữu ===
      stats.soLaiChuyenKD = getBusinessInterestTransferNet();
      stats.soLaiChuyenKDDaRut = (state.businessInterestTransfers || [])
        .filter(t => t.Loai === 'RutSangKD')
        .reduce((s, t) => s + Number(t.SoTien || 0), 0);
      stats.soLaiChuyenKDDaTra = (state.businessInterestTransfers || [])
        .filter(t => t.Loai === 'TraLaiHeThong')
        .reduce((s, t) => s + Number(t.SoTien || 0), 0);

      // Pool còn lại sau khi mượn lãi sang KD khác
      const poolSauChuyenKD = Math.max(0, stats.loiNhuanRongThucTe - stats.soLaiChuyenKD);
      stats.poolLaiSauChuyenKD = poolSauChuyenKD;

      let partnerSrc = state.capitalSources.find(s => s.MaNguon === 'GOP_VON' || s.MaNguon === 'TIEN_DOI_TAC' || (s.TenNguon || '').toLowerCase().includes('đối tác')) || state.capitalSources.find(s => s.PhanTramChiaLai !== undefined);
      const phanTramChia = (partnerSrc && partnerSrc.PhanTramChiaLai !== undefined && partnerSrc.PhanTramChiaLai !== null) ? Number(partnerSrc.PhanTramChiaLai) : 50;
      const phamViChia = (partnerSrc && partnerSrc.PhamViChiaLai) ? partnerSrc.PhamViChiaLai : 'TatCa';
      const loaiTruList = (partnerSrc && Array.isArray(partnerSrc.HopDongLoaiTru)) ? partnerSrc.HopDongLoaiTru : [];

      stats.phanTramChiaLaiDoiTac = phanTramChia;
      stats.phamViChiaLaiDoiTac = phamViChia;
      stats.danhSachLoaiTruDoiTac = loaiTruList;
      stats.tongLaiThucThuDoiTac = stats.tongLaiThucThu;
      stats.loiNhuanRongDoiTac = poolSauChuyenKD;

      // Chia pool còn lại → Đối tác % / Chủ sở hữu
      stats.laiDoiTac = Math.round(poolSauChuyenKD * (phanTramChia / 100));
      stats.laiThucTe = poolSauChuyenKD - stats.laiDoiTac;

      stats.soLaiDoiTacDaRut = (state.partnerWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      stats.soLaiDoiTacConLai = stats.laiDoiTac - stats.soLaiDoiTacDaRut;

      stats.soLaiOwnerDaRut = (state.interestWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      stats.soLaiOwnerConLai = stats.laiThucTe - stats.soLaiOwnerDaRut;

      // Lãi Thực Còn Lại = pool sau chuyển KD − đã rút đối tác − đã rút chủ
      // (= soLaiDoiTacConLai + soLaiOwnerConLai). Rút sang KD trừ TRƯỚC khi chia 2 bên.
      stats.laiThucConLai = Math.max(0, poolSauChuyenKD - stats.soLaiDoiTacDaRut - stats.soLaiOwnerDaRut);

      return stats;
    }

    const MA_NGUON_KD_KHAC = 'TIEN_KD_KHAC';

    function isNonLendingSource(src) {
      if (!src) return false;
      return src.KhongChoVay === true || src.LoaiNguon === 'NgoaiHeThong' || src.MaNguon === MA_NGUON_KD_KHAC;
    }

    /** Ròng lãi đã chuyển sang KD khác (rút − trả lại) */
    function getBusinessInterestTransferNet() {
      return (state.businessInterestTransfers || []).reduce((sum, t) => {
        const amt = Number(t.SoTien || 0);
        if (t.Loai === 'RutSangKD') return sum + amt;
        if (t.Loai === 'TraLaiHeThong') return sum - amt;
        return sum;
      }, 0);
    }

    function ensureBusinessCapitalSource() {
      let src = state.capitalSources.find(s => s.MaNguon === MA_NGUON_KD_KHAC);
      if (!src) {
        src = {
          MaNguon: MA_NGUON_KD_KHAC,
          TenNguon: 'Tiền KD khác (từ lãi)',
          LaiSuatThang: 0,
          KhongChoVay: true,
          LoaiNguon: 'NgoaiHeThong',
          GhiChu: 'Tiền lãi rút sang kinh doanh khác — không dùng cho vay trong hệ thống',
          LichSuBienDong: []
        };
        state.capitalSources.push(src);
      } else {
        src.KhongChoVay = true;
        src.LoaiNguon = 'NgoaiHeThong';
        if (!src.LichSuBienDong) src.LichSuBienDong = [];
      }
      return src;
    }

    // === AI CREDIT RISK SCORING FOR CUSTOMERS ===
    function calculateCustomerRisk(cust) {
      if (!cust || !state.contracts) return { level: 'vip', label: '🟢 KH VIP', badge: '<span class="bg-emerald-100 text-emerald-800 border border-emerald-200 px-2 py-0.5 rounded-md text-[10px] font-bold">🟢 KH VIP</span>' };
      const custContracts = state.contracts.filter(c => c.MaKH === cust.MaKH && c.TrangThai === 'Đang vay');
      let hasOverdue = false;
      let hasDueTodayOrSoon = false;
      custContracts.forEach(contract => {
        const status = getContractWarningStatus(contract);
        if (status.type === 'overdue') hasOverdue = true;
        if (status.type === 'due_today' || status.type === 'due_soon') hasDueTodayOrSoon = true;
      });
      if (hasOverdue) {
        return { level: 'high', label: '🔴 Rủi ro cao', badge: '<span class="bg-rose-100 text-rose-800 border border-rose-200 px-2 py-0.5 rounded-md text-[10px] font-bold">🔴 Rủi ro cao</span>' };
      }
      if (hasDueTodayOrSoon) {
        return { level: 'medium', label: '🟡 Cần lưu ý', badge: '<span class="bg-amber-100 text-amber-800 border border-amber-200 px-2 py-0.5 rounded-md text-[10px] font-bold">🟡 Cần lưu ý</span>' };
      }
      return { level: 'vip', label: '🟢 KH VIP', badge: '<span class="bg-emerald-100 text-emerald-800 border border-emerald-200 px-2 py-0.5 rounded-md text-[10px] font-bold">🟢 KH VIP</span>' };
    }
    window.calculateCustomerRisk = calculateCustomerRisk;

    // === SMART CAPITAL ALLOCATION AI RECOMMENDATION ===
    function getSmartCapitalAllocationSuggestion(soTienVay = 0) {
      if (!soTienVay || soTienVay <= 0) return null;
      const statsObj = getStats();
      let candidates = (state.capitalSources || []).map(src => {
        const det = statsObj.sourceDetails[src.MaNguon] || { tongVonHienTai: 0, duNoChoVay: 0 };
        const vonGoc = det.tongVonHienTai;
        const vonDaDung = det.duNoChoVay || 0;
        const conDu = vonGoc - vonDaDung;
        const partnerPercent = src.PhanTramChiaLai !== undefined ? src.PhanTramChiaLai : (src.MaNguon === 'GOP_VON' ? 50 : 0);
        return { src, conDu, partnerPercent };
      });
      candidates.sort((a, b) => {
        if (a.conDu > 0 && b.conDu <= 0) return -1;
        if (b.conDu > 0 && a.conDu <= 0) return 1;
        return a.partnerPercent - b.partnerPercent;
      });

      const best = candidates.find(c => c.conDu >= soTienVay) || candidates[0];
      if (!best) return null;
      
      if (best.partnerPercent === 0) {
        return {
          source: best.src,
          text: `💡 AI Gợi ý: Ưu tiên rút từ <b>${best.src.TenNguon}</b> (Chi phí 0%) để giữ 100% tiền lãi bỏ túi.`
        };
      } else {
        return {
          source: best.src,
          text: `💡 AI Gợi ý: Nguồn <b>${best.src.TenNguon}</b> còn dư ${formatVND(best.conDu)} (Chia lãi ${best.partnerPercent}%).`
        };
      }
    }
    window.getSmartCapitalAllocationSuggestion = getSmartCapitalAllocationSuggestion;

    // === DASHBOARD VISUAL CHARTS (Chart.js) ===
    function renderDashboardCharts() {
      if (state.activeTab !== 'dashboard') return;
      const stats = getStats();
      
      // Chart 1: Donut Chart - Dư Nợ Theo Nguồn Vốn
      const ctx1 = document.getElementById('chart-capital-allocation');

        if (window._chart1) window._chart1.destroy();
        const labels = [];
        const dataVals = [];
        const bgColors = ['#10b981', '#6366f1', '#f59e0b', '#ec4899', '#8b5cf6', '#3b82f6'];
        
        (state.capitalSources || []).forEach(src => {
          const det = stats.sourceDetails[src.MaNguon] || { duNoChoVay: 0 };
          labels.push(src.TenNguon);
          dataVals.push(det.duNoChoVay || 0);
        });
        
        window._chart1 = new Chart(ctx1, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              data: dataVals,
              backgroundColor: bgColors.slice(0, labels.length),
              borderWidth: 2,
              borderColor: state.theme === 'dark' ? '#0f172a' : '#ffffff'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
              tooltip: {
                callbacks: {
                  label: function(context) { return context.label + ': ' + formatVND(context.raw); }
                }
              }
            }
          }
        });
      }

      // Chart 2: Bar Chart - Doanh Thu Lãi Đã Thu Theo Tháng
      const ctx2 = document.getElementById('chart-monthly-revenue');
      if (ctx2 && typeof Chart !== 'undefined') {
        if (window._chart2) window._chart2.destroy();
        
        const monthMap = {};
        const months = [];
        const now = new Date();
        for (let i = 5; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          const label = 'Thg ' + (d.getMonth() + 1);
          monthMap[key] = { label: label, amount: 0 };
          months.push(key);
        }
        
        (state.payments || []).forEach(p => {
          if (p.LoaiThanhToan === 'Trả lãi' && p.NgayThanhToan) {
            const key = p.NgayThanhToan.substring(0, 7);
            if (monthMap[key]) {
              monthMap[key].amount += (Number(p.SoTienTra) || 0) + (Number(p.TienKhuyenMai) || 0);
            }
          }
        });
        
        window._chart2 = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: months.map(k => monthMap[k].label),
            datasets: [{
              label: 'Lãi đã thu (VNĐ)',
              data: months.map(k => monthMap[k].amount),
              backgroundColor: '#10b981',
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) { return 'Lãi thu: ' + formatVND(context.raw); }
                }
              }
            },
            scales: {
              y: {
                ticks: {
                  callback: function(val) { return (val / 1000000) + 'M'; }
                }
              }
            }
          }
        });
      }
    }

        raw += key;
      }
      const num = Number(raw) || 0;
      inp.value = formatVND(num);
    }

    function processCapitalReduction(sourceId, amount, date, description) {
      const source = state.capitalSources.find(s => s.MaNguon === sourceId);
      if (!source) return false;
      const targetCapital = calculateCapitalSourceDetails(source).tongVonHienTai - amount;
      if (targetCapital < 0) { showAlert("Lỗi", "Số tiền rút lớn hơn vốn hiện tại của nguồn."); return false; }

      const activeAlloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
        const seg = (c.LichSuNguon || []).find(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
        return sum + (seg ? seg.SoTien : 0);
      }, 0);

      if (targetCapital < activeAlloc) {
        const overdraft = activeAlloc - targetCapital;
        const otherSources = state.capitalSources.filter(s => s.MaNguon !== sourceId).map(s => {
          const alloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
            const seg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === s.MaNguon);
            return sum + (seg ? seg.SoTien : 0);
          }, 0);
          return { source: s, available: Math.max(0, calculateCapitalSourceDetails(s).tongVonHienTai - alloc) };
        }).filter(i => i.available > 0);

        if (otherSources.reduce((s, i) => s + i.available, 0) < overdraft) {
          showAlert("Quá tải", `Không đủ vốn rảnh rỗi ở các nguồn vốn khác để gánh dư nợ của hợp đồng. Vui lòng nạp thêm vốn!`); return false;
        }

        let remain = overdraft; let logs = [];
        state.contracts.forEach(c => {
          if (c.TrangThai !== 'Đang vay' || remain <= 0) return;
          const segIdx = (c.LichSuNguon || []).findIndex(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
          if (segIdx === -1) return;
          const seg = c.LichSuNguon[segIdx];
          const move = Math.min(remain, seg.SoTien);
          if (move <= 0) return;

          seg.NgayKetThuc = date;
          const newSegs = move < seg.SoTien ? [{ NgayBatDau: date, NgayKetThuc: null, MaNguon: sourceId, SoTien: seg.SoTien - move }] : [];
          
          let amountToMove = move;
          otherSources.forEach(t => {
            if (t.available <= 0 || amountToMove <= 0) return;
            const chunk = Math.min(amountToMove, t.available);
            newSegs.push({ NgayBatDau: date, NgayKetThuc: null, MaNguon: t.source.MaNguon, SoTien: chunk });
            t.available -= chunk; amountToMove -= chunk; remain -= chunk;
            logs.push(`HĐ ${c.MaHopDong}: Chuyển ${formatVND(chunk)} sang nguồn ${t.source.TenNguon}`);
          });

          const updatedC = { ...c, LichSuNguon: [...c.LichSuNguon, ...newSegs] };
          executeSave('contracts', c.MaHopDong, updatedC, () => { state.contracts = state.contracts.map(x => x.MaHopDong === c.MaHopDong ? updatedC : x); });
        });

        const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút giảm vốn và tự điều phối dòng' }] };
        executeSave('capital_sources', sourceId, updatedSrc, () => { state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s); });
        showAlert("Thành công", `Đã tự động rút vốn và điều chuyển hạn mức dư nợ thành công:<br><br>${logs.join('<br>')}`);
        return true;
      }

      const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút bớt vốn nguồn' }] };
      executeSave('capital_sources', sourceId, updatedSrc, () => {
        state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s);
        showNotification("Ghi giảm vốn thành công!");
      });
      return true;
    }
