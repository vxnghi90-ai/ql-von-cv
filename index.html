  <!-- Service Worker Registration with Update Handling -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('Service Worker registered successfully!', registration.scope);

            // Check for updates periodically
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available, show update prompt
                  if (confirm('Đã có phiên bản mới. Tải lại để cập nhật?')) {
                    window.location.reload();
                  }
                }
              };
            };

            // Check for updates every 60 minutes
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000);
          })
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>

  <script>
    // Early global error catcher - so stuck loading spinner is replaced by useful message
    (function installEarlyErrorHandler(){
      function showFatal(msg) {
        try {
          var c = document.getElementById('app-container');
          if (c) {
            c.innerHTML = '<div style="padding:16px;color:#f87171;background:#0f172a;font:12px/1.5 monospace;white-space:pre-wrap;position:fixed;inset:0;z-index:99999;overflow:auto;">' +
              'FATAL JS ERROR - app failed to start\n\n' + msg + '\n\n' +
              'Please reload the file. If on iPhone, try Add to Home Screen or open in Safari.\n' +
              'Report the error message above to the developer.' +
              '</div>';
          }
        } catch(_) {}
      }
      window.addEventListener('error', function(ev) {
        showFatal( (ev.message || String(ev)) + '\nLocation: ' + (ev.filename || 'inline') + ':' + (ev.lineno || '?') + (ev.error && ev.error.stack ? '\n' + ev.error.stack : '') );
      });
      window.addEventListener('unhandledrejection', function(ev) {
        var r = ev.reason;
        showFatal( 'Unhandled promise rejection: ' + (r && (r.message || r) || r) + (r && r.stack ? '\n' + r.stack : '') );
      });
    })();

    // Ultra early recovery (before heavy DEFAULT/EXACT_DATA parse on slow machines/browsers)
    setTimeout(function(){
      try {
        var c = document.getElementById('app-container');
        if (c && c.innerHTML && (c.innerHTML.indexOf('Đang khởi tạo') !== -1 || c.innerHTML.indexOf('spin 1s linear infinite') !== -1)) {
          if (typeof renderApp === 'function') renderApp();
        }
      } catch(_) {}
    }, 1800);

    // Extra safety recovery (large file + embedded data can be slow to parse on some browsers)
    setTimeout(function(){
      try {
        var c = document.getElementById('app-container');
        if (c && c.innerHTML && (c.innerHTML.indexOf('Đang khởi tạo') !== -1 || c.innerHTML.indexOf('spin 1s linear infinite') !== -1)) {
          if (typeof renderApp === 'function') renderApp();
        }
      } catch(_) {}
    }, 4200);

    // === MÃ HÓA ĐỒNG BỘ RC4-DROP1024 + KEY STRETCHING (PBKDF) ===
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function rc4EncryptDecrypt(key, str) {
      let sKey = key;
      for (let i = 0; i < 5000; i++) {
        sKey = simpleHash(sKey + i);
      }
      let s = [], j = 0, x, res = '';
      for (let i = 0; i < 256; i++) {
        s[i] = i;
      }
      for (let i = 0; i < 256; i++) {
        j = (j + s[i] + sKey.charCodeAt(i % sKey.length)) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
      }
      let i = 0;
      j = 0;
      for (let k = 0; k < 1024; k++) {
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
      }
      for (let y = 0; y < str.length; y++) {
        i = (i + 1) % 256;
        j = (j + s[i]) % 256;
        x = s[i]; s[i] = s[j]; s[j] = x;
        res += String.fromCharCode(str.charCodeAt(y) ^ s[(s[i] + s[j]) % 256]);
      }
      return res;
    }

    function encrypt(password, plaintext) {
      const utf8Str = unescape(encodeURIComponent(plaintext));
      const cipher = rc4EncryptDecrypt(password, utf8Str);
      return btoa(cipher);
    }

    function decrypt(password, ciphertext) {
      const cipher = atob(ciphertext);
      const utf8Str = rc4EncryptDecrypt(password, cipher);
      return decodeURIComponent(escape(utf8Str));
    }

    async function registerBiometrics() {
      try {
        if (!window.PublicKeyCredential) {
          return showAlert("Không hỗ trợ", "Thiết bị hoặc trình duyệt này không hỗ trợ đăng nhập sinh trắc học.");
        }
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!available) {
          return showAlert("Không hỗ trợ", "Thiết bị này không hỗ trợ FaceID / Vân tay cục bộ.");
        }
        if (!state.password) {
          return showAlert("Lỗi", "Vui lòng đăng nhập bằng mã PIN trước khi kích hoạt sinh trắc học.");
        }
        
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const userId = new Uint8Array(16);
        window.crypto.getRandomValues(userId);
        
        const publicKey = {
          challenge: challenge,
          rp: { name: "Quản Lý Vốn CV" },
          user: {
            id: userId,
            name: "admin",
            displayName: "Quản trị viên"
          },
          pubKeyCredParams: [{ type: "public-key", alg: -7 }],
          authenticatorSelection: {
            authenticatorAttachment: "platform",
            userVerification: "required"
          },
          timeout: 60000
        };
        
        const credential = await navigator.credentials.create({ publicKey });
        if (credential) {
          const obfuscatedPin = btoa(unescape(encodeURIComponent(state.password)));
          localStorage.setItem('loan_biometric_enabled', 'true');
          localStorage.setItem('loan_biometric_key', obfuscatedPin);
          showNotification("Đã kích hoạt FaceID / Vân tay thành công!");
          if (window.renderApp) window.renderApp();
        }
      } catch (err) {
        console.error("Lỗi thiết lập sinh trắc học:", err);
        showAlert("Lỗi thiết lập", "Kích hoạt FaceID / Vân tay không thành công hoặc bị hủy.");
      }
    }

    async function loginWithBiometrics() {
      try {
        if (!localStorage.getItem('loan_biometric_enabled')) return;
        if (!window.PublicKeyCredential) return;
        
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        
        const publicKey = {
          challenge: challenge,
          rpId: window.location.hostname,
          userVerification: "required",
          timeout: 60000
        };
        
        const credential = await navigator.credentials.get({ publicKey });
        if (credential) {
          const obfuscatedPin = localStorage.getItem('loan_biometric_key');
          if (!obfuscatedPin) return;
          const pin = decodeURIComponent(escape(atob(obfuscatedPin)));
          
          const encrypted = localStorage.getItem('loan_data_encrypted');
          if (encrypted) {
            try {
              const decrypted = decrypt(pin, encrypted);
              const data = JSON.parse(decrypted);
              if (data.customers && data.contracts) {
                state.password = pin;
                state.customers = data.customers;
                state.contracts = data.contracts;
                state.payments = data.payments;
                state.capitalSources = data.capitalSources || DEFAULT_CAPITAL_SOURCES;
                state.interestWithdrawals = data.interestWithdrawals || [];
                state.isUnlocked = true;
                showNotification("Đăng nhập bằng FaceID / Vân tay thành công!");
                if (window.renderApp) window.renderApp();
                return;
              }
            } catch (e) {
              console.error(e);
            }
          }
          showAlert("Lỗi", "Không thể giải mã dữ liệu bằng FaceID/Vân tay. Vui lòng nhập mã PIN.");
        }
      } catch (err) {
        console.error("Lỗi xác thực sinh trắc học:", err);
      }
    }

    function deactivateBiometrics() {
      localStorage.removeItem('loan_biometric_enabled');
      localStorage.removeItem('loan_biometric_key');
      showNotification("Đã tắt FaceID / Vân tay!");
      if (window.renderApp) window.renderApp();
    }

    let tokenClient;
    function initGoogleAuth() {
      if (typeof google === 'undefined') {
        console.warn("Google API Client library not loaded yet.");
        return;
      }
      const clientId = localStorage.getItem('loan_gdrive_client_id') || '1047714881858-j9o1h0h5n54286786.apps.googleusercontent.com';
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: (response) => {
          if (response.error !== undefined) {
            return showAlert("Lỗi Google", "Không thể xác thực: " + response.error);
          }
          state.gdriveToken = response.access_token;
          localStorage.setItem('loan_gdrive_token', response.access_token);
          showNotification("Đã kết nối với Google Drive!");
          if (window.renderApp) window.renderApp();
        },
      });
    }

    function connectGoogleDrive() {
      if (!tokenClient) {
        initGoogleAuth();
      }
      if (!tokenClient) {
        return showAlert("Lỗi kết nối", "Thư viện Google API chưa được tải xong. Vui lòng thử lại sau vài giây!");
      }
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    function disconnectGoogleDrive() {
      state.gdriveToken = null;
      localStorage.removeItem('loan_gdrive_token');
      showNotification("Đã ngắt kết nối Google Drive!");
      if (window.renderApp) window.renderApp();
    }

    async function backupToGoogleDrive() {
      if (!state.gdriveToken) {
        return connectGoogleDrive();
      }
      if (!state.password) {
        return showAlert("Lỗi", "Chưa thiết lập mã PIN bảo mật!");
      }
      
      showNotification("Đang sao lưu lên Google Drive...");
      try {
        const rawData = JSON.stringify({
          customers: state.customers,
          contracts: state.contracts,
          payments: state.payments,
          capitalSources: state.capitalSources,
          interestWithdrawals: state.interestWithdrawals
        });
        const encrypted = encrypt(state.password, rawData);
        
        const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='QuanLyVayTien_Backup.enc.json' and trashed=false`;
        const searchRes = await fetch(searchUrl, {
          headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
        });
        const searchData = await searchRes.json();
        
        let fileId = '';
        if (searchData.files && searchData.files.length > 0) {
          fileId = searchData.files[0].id;
        } else {
          const createUrl = 'https://www.googleapis.com/drive/v3/files';
          const createRes = await fetch(createUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.gdriveToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: 'QuanLyVayTien_Backup.enc.json',
              mimeType: 'application/json'
            })
          });
          const createData = await createRes.json();
          fileId = createData.id;
        }
        
        if (!fileId) throw new Error("Không thể khởi tạo tệp tin trên Google Drive");
        
        const uploadUrl = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`;
        const uploadRes = await fetch(uploadUrl, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${state.gdriveToken}`,
            'Content-Type': 'application/json'
          },
          body: encrypted
        });
        
        if (uploadRes.status === 200) {
          showNotification("Đã sao lưu lên Google Drive thành công!");
        } else {
          throw new Error("Lỗi khi tải dữ liệu lên: Status " + uploadRes.status);
        }
      } catch (err) {
        console.error("Lỗi Google Drive Backup:", err);
        showAlert("Lỗi Sao Lưu", "Không thể lưu trữ lên Google Drive: " + err.message);
      }
    }

    async function restoreFromGoogleDrive() {
      if (!state.gdriveToken) {
        return connectGoogleDrive();
      }
      if (!state.password) {
        return showAlert("Lỗi", "Chưa thiết lập mã PIN bảo mật!");
      }
      
      showNotification("Đang khôi phục từ Google Drive...");
      try {
        const searchUrl = `https://www.googleapis.com/drive/v3/files?q=name='QuanLyVayTien_Backup.enc.json' and trashed=false`;
        const searchRes = await fetch(searchUrl, {
          headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
        });
        const searchData = await searchRes.json();
        
        if (!searchData.files || searchData.files.length === 0) {
          return showAlert("Không tìm thấy", "Không tìm thấy tệp sao lưu 'QuanLyVayTien_Backup.enc.json' trên tài khoản Google Drive này.");
        }
        
        const fileId = searchData.files[0].id;
        const downloadUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
        const downloadRes = await fetch(downloadUrl, {
          headers: { 'Authorization': `Bearer ${state.gdriveToken}` }
        });
        const encrypted = await downloadRes.text();
        
        try {
          const decrypted = decrypt(state.password, encrypted);
          const data = JSON.parse(decrypted);
          if (data.customers && data.contracts && data.payments) {
            state.customers = data.customers;
            state.contracts = data.contracts;
            state.payments = data.payments;
            state.capitalSources = data.capitalSources || DEFAULT_CAPITAL_SOURCES;
            state.interestWithdrawals = data.interestWithdrawals || [];
            normalizeAllMaHopDong();
            recalculateAllDueDates();
            saveStateOfflineAndRefresh(true);
            showNotification("Khôi phục dữ liệu từ Google Drive thành công!");
          } else {
            throw new Error("Dữ liệu sao lưu không tương thích!");
          }
        } catch (e) {
          showAlert("Lỗi giải mã", "Mã PIN hiện tại không chính xác để mở tệp sao lưu Google Drive này.");
        }
      } catch (err) {
        console.error("Lỗi Google Drive Restore:", err);
        showAlert("Lỗi Khôi Phục", "Không thể khôi phục từ Google Drive: " + err.message);
      }
    }

    function safeGetLocal(key, defaultValue) {
      try {
        const val = window.localStorage.getItem(key);
        if (val) return JSON.parse(val);
      } catch (e) {
        console.warn("LocalStorage blocked by browser privacy settings:", e);
        isLocalStorageBlocked = true;
      }
      return defaultValue;
    }

    function safeSetLocal(key, value) {
      try {
        window.localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {
        console.warn("LocalStorage write blocked by browser privacy settings:", e);
        isLocalStorageBlocked = true;
      }
    }

    function formatVND(number) {
      return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "-";
      // If already in dd/mm/yyyy or d/m/yyyy, normalize to dd/mm/yyyy
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
        const [d, m, y] = dateStr.split('/');
        return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
      }
      // Handle yyyy-mm-dd or yyyy/m/d etc.
      let parts = dateStr.split(/[-\/]/);
      if (parts.length === 3) {
        // Assume yyyy first if 4 digits
        if (parts[0].length === 4) {
          return `${parts[2].padStart(2,'0')}/${parts[1].padStart(2,'0')}/${parts[0]}`;
        } else {
          // Assume dd/mm/yyyy already or similar
          return `${parts[0].padStart(2,'0')}/${parts[1].padStart(2,'0')}/${parts[2]}`;
        }
      }
      // Fallback: try parse as Date and format as dd/mm/yyyy
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth() + 1).padStart(2,'0');
        const yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
      }
      return dateStr;
    }

    // Helper to convert any date string to yyyy-mm-dd for <input type="date"> value
    function toInputDate(dateStr) {
      if (!dateStr) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
      const formatted = formatDate(dateStr);
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(formatted)) {
        const [d, m, y] = formatted.split('/');
        return `${y}-${m}-${d}`;
      }
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
      return '';
    }

    // Parse dd/mm/yyyy (or d/m/yyyy) to yyyy-mm-dd for storage
    function parseDateToISO(str) {
      if (!str) return '';
      str = str.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
      const parts = str.split(/[-\/]/);
      if (parts.length === 3) {
        let d = parts[0].padStart(2, '0');
        let m = parts[1].padStart(2, '0');
        let y = parts[2];
        if (y.length === 2) y = '20' + y;
        return `${y}-${m}-${d}`;
      }
      return '';
    }

    function addMonthsSafe(date, months) {
      const result = new Date(date);
      const targetMonth = result.getMonth() + months;
      result.setMonth(targetMonth);
      if (result.getMonth() !== (targetMonth % 12 + 12) % 12) {
        result.setDate(0); 
      }
      return result;
    }

    function calculateStandardDays(startDateStr, endDateStr) {
      const start = new Date(startDateStr); const end = new Date(endDateStr);
      if (isNaN(start) || isNaN(end) || end <= start) return 0;
      let months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      let tempDate = addMonthsSafe(start, months);
      if (tempDate > end) { months--; tempDate = addMonthsSafe(start, months); }
      const diffTime = end.getTime() - tempDate.getTime();
      return (months * 30) + Math.floor(diffTime / (1000 * 3600 * 24));
    }

    function calculateCapitalSourceDetails(source) {
      const todayStr = new Date().toISOString().split('T')[0];
      const txs = [...(source.LichSuBienDong || [])].sort((a, b) => new Date(a.Ngay) - new Date(b.Ngay));
      let currentCapital = 0; let totalInterestExpense = 0;
      if (txs.length === 0) return { tongVonHienTai: 0, chiPhiLaiTichLuy: 0, lichSu: [] };
      let lastDate = txs[0].Ngay;
      for (let i = 0; i < txs.length; i++) {
        const tx = txs[i];
        const daysElapsed = calculateStandardDays(lastDate, tx.Ngay);
        totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (daysElapsed / 30));
        currentCapital += Number(tx.SoTien);
        lastDate = tx.Ngay;
      }
      totalInterestExpense += Math.round(currentCapital * (source.LaiSuatThang / 100) * (calculateStandardDays(lastDate, todayStr) / 30));
      return { tongVonHienTai: currentCapital, chiPhiLaiTichLuy: totalInterestExpense, lichSu: txs };
    }

    // === CÁC HÀM TÍNH LÃI MÔ-ĐUN HỢP ĐỒNG ===
    
    // Tính lãi tháng đầu tiên (Bao gồm 1 tháng đầy đủ 30 ngày + các ngày dư từ Ngày bắt đầu vay tới Ngày bắt đầu tính lãi)
    function calculateFirstMonthInterest(contract) {
      if (!contract || !contract.SoTienVay) return 0;
      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        return Number(contract.SoLaiCoDinh || 0);
      }
      const ngayVay = contract.NgayVay;
      const ngayTinhLai = contract.NgayBatDauTinhLai || ngayVay;
      const laiNgay = contract.LaiNgayTrenTrieu || 0;
      const soTienVay = Number(contract.SoTienVay || 0);
      
      const extraDays = calculateStandardDays(ngayVay, ngayTinhLai);
      const extraLai = extraDays > 0 ? Math.round((soTienVay / 1000000) * laiNgay * extraDays) : 0;
      const firstMonthBaseLai = Math.round((soTienVay / 1000000) * laiNgay * 30);
      
      return firstMonthBaseLai + extraLai;
    }

    // Tính lãi cho một kỳ cụ thể (hỗ trợ điều chỉnh ngày đóng lãi)
    // Nếu isFirstPayment=true và kỳ bắt đầu quanh NgayBatDauTinhLai thì + extra (ngày giải ngân đến ngày tính lãi)
    function calculateInterestForPeriod(contract, kyLaiTu, kyLaiDen, isFirstPayment = false) {
      if (!contract || !kyLaiTu || !kyLaiDen) return 0;
      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        return Number(contract.SoLaiCoDinh || 0);
      }
      const soTien = Number(contract.SoTienVay || 0);
      const laiNgay = Number(contract.LaiNgayTrenTrieu || 0);
      const ngayTinhLai = contract.NgayBatDauTinhLai || contract.NgayVay || kyLaiTu;

      const periodDays = calculateStandardDays(kyLaiTu, kyLaiDen);
      let lai = Math.round((soTien / 1000000) * laiNgay * periodDays);

      if (isFirstPayment) {
        const extraDays = calculateStandardDays(contract.NgayVay, ngayTinhLai);
        const extraLai = extraDays > 0 ? Math.round((soTien / 1000000) * laiNgay * extraDays) : 0;
        // Chỉ cộng extra nếu kỳ này là kỳ đầu (từ >= ngày tính lãi hoặc rất sát đầu)
        const daysFromTuToTinh = calculateStandardDays(kyLaiTu, ngayTinhLai);
        if (daysFromTuToTinh <= 1) { // tu gần hoặc sau/sát ngày bắt đầu tính lãi
          lai += extraLai;
        }
      }
      return lai;
    }

    // Gợi ý lãi kỳ hiện tại + kỳ từ/đến cho form thanh toán (dựa trên lịch sử trả trước đó)
    function getCurrentCycleInterestSuggestion(contract) {
      if (!contract) return { amount: 0, kyTu: '', kyDen: '', isFirst: true, note: '' };
      const st = window.state || state;
      const prior = (st.payments || []).filter(p => p.MaHopDong === contract.MaHopDong && p.LoaiThanhToan === 'Trả lãi')
        .sort((a, b) => (b.KyLaiDen || b.NgayThanhToan || '').localeCompare(a.KyLaiDen || a.NgayThanhToan || ''));
      const isFirst = prior.length === 0;
      let kyTu = contract.NgayBatDauTinhLai || contract.NgayVay;
      if (prior.length > 0) {
        kyTu = prior[0].KyLaiDen || prior[0].NgayThanhToan || kyTu;
      }
      let kyDen = contract.NgayDaoHan;
      if (!kyDen) {
        // dự phòng +30 ngày chuẩn từ kyTu
        const d = new Date(kyTu); d.setDate(d.getDate() + 30);
        kyDen = d.toISOString().split('T')[0];
      }
      const amount = calculateInterestForPeriod(contract, kyTu, kyDen, isFirst);
      let note = '';
      if (isFirst) {
        const ngayTinhLai = contract.NgayBatDauTinhLai || contract.NgayVay;
        const ex = calculateStandardDays(contract.NgayVay, ngayTinhLai);
        if (ex > 0) {
          note = `Kỳ đầu (có ${ex} ngày dư từ giải ngân ${formatDate(contract.NgayVay)} → tính lãi ${formatDate(ngayTinhLai)})`;
        } else {
          note = 'Kỳ đầu tiên';
        }
      } else {
        note = 'Kỳ lãi định kỳ (30 ngày chuẩn)';
      }
      return { amount, kyTu, kyDen, isFirst, note };
    }

    // Tính lãi cố định ngắn hạn
    function calculateFixedDailyInterest(contract) {
      return Number((contract && contract.SoLaiCoDinh) || 0);
    }

    function calculateContractInterest(contract) {
      const today = new Date();
      let endCalculateDate = contract.TrangThai === 'Đã tất toán' && contract.NgayTatToan ? new Date(contract.NgayTatToan) : today;
      const endCalStr = endCalculateDate.toISOString().split('T')[0];
      
      let soNgayVay = calculateStandardDays(contract.NgayVay, endCalStr);
      let tongLaiPhatSinh = 0;

      if (contract.LoaiHopDong === 'LaiCoDinhNgay') {
        tongLaiPhatSinh = Number(contract.SoLaiCoDinh || 0);
      } else {
        const ngayTinhLaiStr = contract.NgayBatDauTinhLai || contract.NgayVay;
        const extraDays = calculateStandardDays(contract.NgayVay, ngayTinhLaiStr);
        const extraLai = extraDays > 0 ? Math.round((contract.SoTienVay / 1000000) * contract.LaiNgayTrenTrieu * extraDays) : 0;
        const daysFromTinhLai = calculateStandardDays(ngayTinhLaiStr, endCalStr);
        const regularLai = Math.round((contract.SoTienVay / 1000000) * contract.LaiNgayTrenTrieu * daysFromTinhLai);
        tongLaiPhatSinh = regularLai + extraLai;
      }

      const contractPayments = state.payments.filter(p => p.MaHopDong === contract.MaHopDong);
      const laiDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Trả lãi').reduce((sum, p) => sum + Number(p.SoTienTra) + (Number(p.TienKhuyenMai) || 0), 0);
      const gocDaTra = contractPayments.filter(p => p.LoaiThanhToan === 'Tất toán').reduce((sum, p) => sum + Number(p.SoTienTra), 0);
      const laiConNo = Math.max(0, tongLaiPhatSinh - laiDaTra);
      const duNoGocHienTai = Math.max(0, contract.SoTienVay - gocDaTra);

      let chiPhiVonLuyKe = 0;
      const lichSuNguon = contract.LichSuNguon || [{ NgayBatDau: contract.NgayVay, NgayKetThuc: null, MaNguon: contract.MaNguon, SoTien: contract.SoTienVay }];
      lichSuNguon.forEach(seg => {
        const segDays = calculateStandardDays(seg.NgayBatDau, seg.NgayKetThuc ? seg.NgayKetThuc : endCalStr);
        const source = state.capitalSources.find(s => s.MaNguon === seg.MaNguon) || { LaiSuatThang: 0 };
        chiPhiVonLuyKe += Math.round(seg.SoTien * (source.LaiSuatThang / 100) * (segDays / 30));
      });

      let chiPhiVonDaTra = 0;
      if (tongLaiPhatSinh > 0) chiPhiVonDaTra = Math.round(laiDaTra * (chiPhiVonLuyKe / tongLaiPhatSinh));
      const activeSeg = lichSuNguon.find(s => s.NgayKetThuc === null) || { MaNguon: contract.MaNguon };
      const activeSource = state.capitalSources.find(s => s.MaNguon === activeSeg.MaNguon) || { TenNguon: "N/A", LaiSuatThang: 0 };

      return { soNgayVay, tongLaiPhatSinh, laiDaTra, gocDaTra, laiConNo, duNoGocHienTai, chiPhiVonLuyKe, chiPhiVonDaTra, laQuaHan: contract.TrangThai === 'Đang vay' && contract.NgayDaoHan && today > new Date(contract.NgayDaoHan), nguonVon: activeSource.TenNguon, laiSuatDauVao: activeSource.LaiSuatThang, activeMaNguon: activeSeg.MaNguon, lichSuNguon };
    }

    function calculateAvailableCapital(sourceId = null, editingContractId = null) {
      const activeContracts = state.contracts.filter(c => c.TrangThai === 'Đang vay' && c.MaHopDong !== editingContractId);
      
      if (sourceId) {
        const src = state.capitalSources.find(s => s.MaNguon === sourceId);
        if (!src) return 0;
        const details = calculateCapitalSourceDetails(src);
        let alreadyAllocated = 0;
        activeContracts.forEach(c => {
          (c.LichSuNguon || []).forEach(seg => {
            if (seg.NgayKetThuc === null && seg.MaNguon === sourceId) {
              alreadyAllocated += Number(seg.SoTien || 0);
            }
          });
        });
        return details.tongVonHienTai - alreadyAllocated;
      } else {
        let totalAvailable = 0;
        state.capitalSources.forEach(src => {
          const details = calculateCapitalSourceDetails(src);
          let alreadyAllocated = 0;
          activeContracts.forEach(c => {
            (c.LichSuNguon || []).forEach(seg => {
              if (seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon) {
                alreadyAllocated += Number(seg.SoTien || 0);
              }
            });
          });
          totalAvailable += Math.max(0, details.tongVonHienTai - alreadyAllocated);
        });
        return totalAvailable;
      }
    }


    // === TỰ ĐỘNG PHÂN BỔ NGUỒN VỐN (ưu tiên lãi suất thấp nhất trước) ===
    function autoAllocateSources(soTienVay, startDateStr) {
      if (!soTienVay || soTienVay <= 0) return [];
      const todayStr = new Date().toISOString().split('T')[0];
      const editingId = (state.editingContract && state.editingContract.MaHopDong) || null;
      const activeContracts = state.contracts.filter(c => c.TrangThai === 'Đang vay' && c.MaHopDong !== editingId);
      // sort sources by LaiSuatThang ascending (lowest cost first)
      const sortedSources = [...state.capitalSources].sort((a, b) => (a.LaiSuatThang || 0) - (b.LaiSuatThang || 0));
      let remaining = Number(soTienVay);
      const allocation = [];
      for (const src of sortedSources) {
        if (remaining <= 0) break;
        const details = calculateCapitalSourceDetails(src);
        let alreadyAllocated = 0;
        activeContracts.forEach(c => {
          (c.LichSuNguon || []).forEach(seg => {
            if (seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon) alreadyAllocated += Number(seg.SoTien || 0);
          });
        });
        const available = Math.max(0, details.tongVonHienTai - alreadyAllocated);
        if (available <= 0) continue;
        const take = Math.min(remaining, available);
        if (take > 0) {
          allocation.push({ MaNguon: src.MaNguon, SoTien: take });
          remaining -= take;
        }
      }
      if (remaining > 0 && allocation.length > 0) {
        // spill the rest to the cheapest (first) source anyway
        allocation[0].SoTien += remaining;
      } else if (remaining > 0 && sortedSources.length > 0) {
        allocation.push({ MaNguon: sortedSources[0].MaNguon, SoTien: remaining });
      }
      return allocation;
    }

    function getContractWarningStatus(contract) {
      if (contract.TrangThai !== 'Đang vay') return { type: 'normal', label: '', cls: '', daysDiff: null };
      const today = new Date();
      today.setHours(0,0,0,0);
      if (!contract.NgayDaoHan) return { type: 'normal', label: '', cls: '', daysDiff: null };
      const dao = new Date(contract.NgayDaoHan);
      dao.setHours(0,0,0,0);
      const diff = Math.ceil((dao - today) / (1000*3600*24));
      if (diff < 0) {
        return { type: 'overdue', label: `Quá hạn ${Math.abs(diff)} ngày`, cls: 'bg-rose-100 text-rose-800 font-semibold', daysDiff: diff };
      }
      if (diff === 0) {
        return { type: 'due', label: 'Đến hạn hôm nay', cls: 'bg-orange-100 text-orange-800 font-semibold', daysDiff: 0 };
      }
      if (diff <= 3) {
        return { type: 'soon', label: `Còn ${diff} ngày`, cls: 'bg-amber-100 text-amber-800 font-semibold', daysDiff: diff };
      }
      // For normal upcoming, no big badge in MÃ HĐ (to avoid clutter), but daysDiff is available for the ĐẾN HẠN column
      return { type: 'normal', label: '', cls: '', daysDiff: diff };
    }

    // === TỰ ĐỘNG MÃ HỢP ĐỒNG HDVT0001, HDVT0002... ===
    function normalizeAllMaHopDong() {
      const oldToNew = {};
      let changed = false;
      state.contracts.forEach(c => {
        if (!c.MaHopDong) return;
        const m = /^HDVT(\d+)$/.exec(c.MaHopDong);
        if (m) {
          const num = parseInt(m[1], 10);
          const newCode = 'HDVT' + String(num).padStart(4, '0');
          if (c.MaHopDong !== newCode) {
            oldToNew[c.MaHopDong] = newCode;
            c.MaHopDong = newCode;
            changed = true;
          }
        }
      });
      if (changed) {
        // fix payments references
        state.payments.forEach(p => {
          if (p.MaHopDong && oldToNew[p.MaHopDong]) {
            p.MaHopDong = oldToNew[p.MaHopDong];
          }
        });
        console.log('Đã chuẩn hóa mã hợp đồng sang dạng HDVT0001');
      }
    }

    // === TỰ ĐỘNG TÍNH LẠI HẠN ĐỒNG BỘ THEO LỊCH SỬ DỰA TRÊN CÁC LẦN ĐÓNG LÃI ===
    function recalculateAllDueDates() {
      let changed = false;
      state.contracts.forEach(c => {
        if (c.TrangThai !== 'Đang vay') return;

        // Tìm các giao dịch trả lãi của hợp đồng này, sắp xếp từ cũ nhất đến mới nhất
        const cPayments = state.payments
          .filter(p => p.MaHopDong === c.MaHopDong && p.LoaiThanhToan === 'Trả lãi')
          .sort((a, b) => a.NgayThanhToan.localeCompare(b.NgayThanhToan));

        if (cPayments.length === 0) {
          // Nếu chưa có giao dịch trả lãi nào, kỳ hạn đáo hạn ban đầu phải là Ngày Vay + 30 ngày
          if (c.NgayVay) {
            const start = new Date(c.NgayVay);
            start.setDate(start.getDate() + 30);
            const expectedDaoHan = start.toISOString().split('T')[0];
            if (c.NgayDaoHan !== expectedDaoHan && !c.NgayDaoHan) {
              c.NgayDaoHan = expectedDaoHan;
              changed = true;
            }
          }
          return;
        }

        // Bắt đầu tính từ ngày vay gốc
        let baseDate = new Date(c.NgayVay);
        if (isNaN(baseDate.getTime())) return;

        cPayments.forEach(p => {
          // Ưu tiên dùng KyLaiDen (ngày đóng lãi đã điều chỉnh) nếu có, fallback NgayThanhToan
          const closeStr = p.KyLaiDen || p.NgayThanhToan;
          // Luôn tiến thêm 30 ngày cho mỗi giao dịch trả lãi (từ close của kỳ)
          baseDate.setDate(baseDate.getDate() + 30);

          // Nếu ngày đóng tiền muộn hơn kỳ hạn, tiếp tục tịnh tiến các chu kỳ 30 ngày
          const payDate = new Date(closeStr || p.NgayThanhToan);
          if (!isNaN(payDate.getTime())) {
            payDate.setHours(0, 0, 0, 0);
            while (baseDate < payDate) {
              baseDate.setDate(baseDate.getDate() + 30);
            }
          }
        });

        const calculatedNgayDaoHan = baseDate.toISOString().split('T')[0];
        if (c.NgayDaoHan !== calculatedNgayDaoHan) {
          c.NgayDaoHan = calculatedNgayDaoHan;
          changed = true;
        }
      });
      return changed;
    }

    function getNextHopDongMa() {
      let max = 0;
      state.contracts.forEach(c => {
        const m = /^HDVT(\d+)$/.exec(c.MaHopDong || '');
        if (m) {
          const n = parseInt(m[1], 10);
          if (n > max) max = n;
        }
      });
      const next = max + 1;
      return 'HDVT' + String(next).padStart(4, '0');
    }

        MaNguon: a.MaNguon,
        SoTien: a.SoTien
      }));
    }

    function getStats() {
      let stats = { tongVonChoVay: 0, dangVayCount: 0, tatToanCount: 0, quaHanCount: 0, tongLaiConNo: 0, laiThuTrongNgay: 0, tongVonDauVao: 0, tongChiPhiLaiNguon: 0, sourceDetails: {}, tongLaiThucThu: 0, tongLaiKhuyenMai: 0, tongLaiNhanVienGiu: 0, tongGocNhanVienGiu: 0 };

      const todayStr = new Date().toISOString().split('T')[0];
      state.contracts.forEach(contract => {
        const calc = calculateContractInterest(contract);
        if (contract.TrangThai === 'Đang vay') {
          stats.tongVonChoVay += calc.duNoGocHienTai;
          
          // CHỈ TÍNH CÁC HỢP ĐỒNG ĐÃ ĐẾN HẠN HOẶC QUÁ HẠN ĐÓNG LÃI MÀ CHƯA NỘP
          const isDue = !contract.NgayDaoHan || todayStr >= contract.NgayDaoHan;
          if (isDue) {
            stats.tongLaiConNo += calc.laiConNo;
          }

          stats.laiThuTrongNgay += (calc.duNoGocHienTai / 1000000) * contract.LaiNgayTrenTrieu;
          calc.laQuaHan ? stats.quaHanCount++ : stats.dangVayCount++;
        } else if (contract.TrangThai === 'Đã tất toán') { stats.tatToanCount++; }
      });

      state.capitalSources.forEach(src => {
        const details = calculateCapitalSourceDetails(src);
        stats.tongVonDauVao += details.tongVonHienTai; stats.tongChiPhiLaiNguon += details.chiPhiLaiTichLuy;
        let duNoChoVayCuaNguon = 0;
        state.contracts.forEach(c => { if (c.TrangThai === 'Đang vay') { const activeSeg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === src.MaNguon); if (activeSeg) duNoChoVayCuaNguon += activeSeg.SoTien; } });

        let laiDaThuCuaNguon = 0;
        state.payments.forEach(p => {
          if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) {
            const c = state.contracts.find(x => x.MaHopDong === p.MaHopDong);
            if (c) {
              const calc = calculateContractInterest(c);
              const targetSeg = (c.LichSuNguon || []).find(seg => seg.MaNguon === src.MaNguon);
              if (targetSeg && calc.chiPhiVonLuyKe > 0) {
                const segDays = calculateStandardDays(targetSeg.NgayBatDau, targetSeg.NgayKetThuc ? targetSeg.NgayKetThuc : new Date().toISOString().split('T')[0]);
                const segCost = Math.round(targetSeg.SoTien * (src.LaiSuatThang / 100) * (segDays / 30));
                laiDaThuCuaNguon += Math.round(p.SoTienTra * (segCost / calc.chiPhiVonLuyKe));
              }
            }
          }
        });
        stats.sourceDetails[src.MaNguon] = { tongVonHienTai: details.tongVonHienTai, chiPhiLaiTichLuy: details.chiPhiLaiTichLuy, duNoChoVay: duNoChoVayCuaNguon, laiDaThuCuaNguon, thieuHut: Math.max(0, details.chiPhiLaiTichLuy - laiDaThuCuaNguon) };
      });

      state.payments.forEach(p => {
        if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) stats.tongLaiThucThu += Number(p.SoTienTra);
        if (p.LoaiThanhToan === 'Trả lãi' && p.TienKhuyenMai) stats.tongLaiKhuyenMai += Number(p.TienKhuyenMai);
        if (p.TrangThaiThu === 'NhanVienGiu') {
          if (p.LoaiThanhToan === 'Trả lãi') stats.tongLaiNhanVienGiu += Number(p.SoTienTra);
          else if (p.LoaiThanhToan === 'Tất toán') stats.tongGocNhanVienGiu += Number(p.SoTienTra);
        }
      });

      if (state.customBaseTongLaiThucThu !== undefined && state.customBaseTongLaiThucThu !== null) {
        stats.tongLaiThucThu = Number(state.customBaseTongLaiThucThu);
      } else {
        stats.tongLaiThucThu = 3763899;
      }

      stats.tongTienNhanVienGiu = stats.tongLaiNhanVienGiu + stats.tongGocNhanVienGiu;
      stats.loiNhuanRongThucTe = stats.tongLaiThucThu - stats.tongChiPhiLaiNguon;
      stats.tongThieuHutPhaiBu = Object.values(stats.sourceDetails).reduce((sum, item) => sum + item.thieuHut, 0);

      // TÍNH LÃI ĐỐI TÁC THEO TỈ LỆ VÀ PHẠM VI HỢP ĐỒNG CỦA NGUỒN VỐN "TIỀN ĐỐI TÁC"
      let partnerSrc = state.capitalSources.find(s => s.MaNguon === 'GOP_VON' || s.MaNguon === 'TIEN_DOI_TAC' || (s.TenNguon || '').toLowerCase().includes('đối tác')) || state.capitalSources.find(s => s.PhanTramChiaLai !== undefined);

      const phanTramChia = (partnerSrc && partnerSrc.PhanTramChiaLai !== undefined && partnerSrc.PhanTramChiaLai !== null) ? Number(partnerSrc.PhanTramChiaLai) : 50;
      const phamViChia = (partnerSrc && partnerSrc.PhamViChiaLai) ? partnerSrc.PhamViChiaLai : 'TatCa';
      const loaiTruList = (partnerSrc && Array.isArray(partnerSrc.HopDongLoaiTru)) ? partnerSrc.HopDongLoaiTru : [];

      let tongLaiThucThuDoiTac = 0;
      if (phamViChia === 'LoaiTru' && loaiTruList.length > 0) {
        state.payments.forEach(p => {
          if (p.LoaiThanhToan === 'Trả lãi' && (p.TrangThaiThu === 'DaNop' || !p.TrangThaiThu)) {
            if (!loaiTruList.includes(p.MaHopDong)) {
              tongLaiThucThuDoiTac += Number(p.SoTienTra || 0);
            }
          }
        });
      } else {
        tongLaiThucThuDoiTac = stats.tongLaiThucThu;
      }

      const loiNhuanRongDoiTac = Math.max(0, tongLaiThucThuDoiTac - stats.tongChiPhiLaiNguon);

      stats.phanTramChiaLaiDoiTac = phanTramChia;
      stats.phamViChiaLaiDoiTac = phamViChia;
      stats.danhSachLoaiTruDoiTac = loaiTruList;
      stats.tongLaiThucThuDoiTac = tongLaiThucThuDoiTac;
      stats.loiNhuanRongDoiTac = loiNhuanRongDoiTac;

      stats.laiDoiTac = Math.round(loiNhuanRongDoiTac * (phanTramChia / 100));
      stats.soLaiDoiTacDaRut = (state.partnerWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      stats.soLaiDoiTacConLai = stats.laiDoiTac - stats.soLaiDoiTacDaRut;

      return stats;
    }

    function processCapitalReduction(sourceId, amount, date, description) {
      const source = state.capitalSources.find(s => s.MaNguon === sourceId);
      if (!source) return false;
      const targetCapital = calculateCapitalSourceDetails(source).tongVonHienTai - amount;
      if (targetCapital < 0) { showAlert("Lỗi", "Số tiền rút lớn hơn vốn hiện tại của nguồn."); return false; }

      const activeAlloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
        const seg = (c.LichSuNguon || []).find(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
        return sum + (seg ? seg.SoTien : 0);
      }, 0);

      if (targetCapital < activeAlloc) {
        const overdraft = activeAlloc - targetCapital;
        const otherSources = state.capitalSources.filter(s => s.MaNguon !== sourceId).map(s => {
          const alloc = state.contracts.filter(c => c.TrangThai === 'Đang vay').reduce((sum, c) => {
            const seg = (c.LichSuNguon || []).find(seg => seg.NgayKetThuc === null && seg.MaNguon === s.MaNguon);
            return sum + (seg ? seg.SoTien : 0);
          }, 0);
          return { source: s, available: Math.max(0, calculateCapitalSourceDetails(s).tongVonHienTai - alloc) };
        }).filter(i => i.available > 0);

        if (otherSources.reduce((s, i) => s + i.available, 0) < overdraft) {
          showAlert("Quá tải", `Không đủ vốn rảnh rỗi ở các nguồn vốn khác để gánh dư nợ của hợp đồng. Vui lòng nạp thêm vốn!`); return false;
        }

        let remain = overdraft; let logs = [];
        state.contracts.forEach(c => {
          if (c.TrangThai !== 'Đang vay' || remain <= 0) return;
          const segIdx = (c.LichSuNguon || []).findIndex(s => s.NgayKetThuc === null && s.MaNguon === sourceId);
          if (segIdx === -1) return;
          const seg = c.LichSuNguon[segIdx];
          const move = Math.min(remain, seg.SoTien);
          if (move <= 0) return;

          seg.NgayKetThuc = date;
          const newSegs = move < seg.SoTien ? [{ NgayBatDau: date, NgayKetThuc: null, MaNguon: sourceId, SoTien: seg.SoTien - move }] : [];
          
          let amountToMove = move;
          otherSources.forEach(t => {
            if (t.available <= 0 || amountToMove <= 0) return;
            const chunk = Math.min(amountToMove, t.available);
            newSegs.push({ NgayBatDau: date, NgayKetThuc: null, MaNguon: t.source.MaNguon, SoTien: chunk });
            t.available -= chunk; amountToMove -= chunk; remain -= chunk;
            logs.push(`HĐ ${c.MaHopDong}: Chuyển ${formatVND(chunk)} sang nguồn ${t.source.TenNguon}`);
          });

          const updatedC = { ...c, LichSuNguon: [...c.LichSuNguon, ...newSegs] };
          executeSave('contracts', c.MaHopDong, updatedC, () => { state.contracts = state.contracts.map(x => x.MaHopDong === c.MaHopDong ? updatedC : x); });
        });

        const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút giảm vốn và tự điều phối dòng' }] };
        executeSave('capital_sources', sourceId, updatedSrc, () => { state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s); });
        showAlert("Thành công", `Đã tự động rút vốn và điều chuyển hạn mức dư nợ thành công:<br><br>${logs.join('<br>')}`);
        return true;
      }

      const updatedSrc = { ...source, LichSuBienDong: [...source.LichSuBienDong, { Ngay: date, SoTien: -amount, NoiDung: description || 'Rút bớt vốn nguồn' }] };
      executeSave('capital_sources', sourceId, updatedSrc, () => {
        state.capitalSources = state.capitalSources.map(s => s.MaNguon === sourceId ? updatedSrc : s);
        showNotification("Ghi giảm vốn thành công!");
      });
      return true;
    }

    function handleSaveContract(e) {
      e.preventDefault(); const form = e.target;
      const contractData = {
        MaHopDong: form.MaHopDong.value.toUpperCase().trim(),
        MaKH: form.MaKH.value,
        LoaiHopDong: form.LoaiHopDong ? form.LoaiHopDong.value : 'VayThuong',
        SoTienVay: Number(form.SoTienVay.value),
        LaiNgayTrenTrieu: Number(form.LaiNgayTrenTrieu ? form.LaiNgayTrenTrieu.value : 0),
        SoLaiCoDinh: Number(form.SoLaiCoDinh ? form.SoLaiCoDinh.value : 0),
        NgayVay: parseDateToISO(form.NgayVay.value),
        NgayBatDauTinhLai: parseDateToISO(form.NgayBatDauTinhLai ? form.NgayBatDauTinhLai.value : form.NgayVay.value) || parseDateToISO(form.NgayVay.value),
        NgayDaoHan: parseDateToISO(form.NgayDaoHan.value),
        HinhThucLai: form.HinhThucLai ? form.HinhThucLai.value : 'Lãi cố định',
        TrangThai: form.TrangThai.value,
        GhiChu: form.GhiChu.value.trim(),
        MaNguon: form.MaNguon.value,
        LoaiTaiSan: form.LoaiTaiSan.value,
        TenTaiSan: form.TenTaiSan.value.trim(),
        BienSo: form.BienSo.value.trim(),
        SoKhung: form.SoKhung.value.trim(),
        SoMay: form.SoMay.value.trim()
      };

      // Validation
      if (!contractData.MaHopDong) return showAlert("Lỗi nhập liệu", "Vui lòng nhập Mã Hợp Đồng!");
      if (!contractData.MaKH) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Khách Hàng vay!");
      if (!contractData.SoTienVay || contractData.SoTienVay <= 0) return showAlert("Lỗi nhập liệu", "Số vốn cho vay phải lớn hơn 0!");
      if (!contractData.LoaiTaiSan) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Loại Tài Sản!");
      if (!contractData.TenTaiSan) return showAlert("Lỗi nhập liệu", "Vui lòng nhập Tên Dòng Xe / Tài Sản cầm cố!");
      if (!contractData.NgayVay) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Ngày Bắt Đầu Vay!");

      if (contractData.LoaiHopDong === 'VayThuong') {
        if (!contractData.NgayBatDauTinhLai) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Ngày Bắt Đầu Tính Lãi!");
        if (contractData.NgayBatDauTinhLai < contractData.NgayVay) {
          return showAlert("Lỗi logic ngày", "Ngày Bắt Đầu Tính Lãi không được trước Ngày Bắt Đầu Vay (ngày giải ngân)!");
        }
      } else if (contractData.LoaiHopDong === 'LaiCoDinhNgay') {
        if (!contractData.SoLaiCoDinh || contractData.SoLaiCoDinh <= 0) {
          return showAlert("Lỗi nhập liệu", "Vui lòng nhập Số Lãi Cố Định hợp lệ (lớn hơn 0)!");
        }
      }

      // Check capital sufficiency
      // QUAN TRỌNG: Chỉ kiểm tra khi TẠO MỚI hoặc EDIT làm TĂNG vốn / ĐỔI nguồn.
      // Chỉnh ngày bắt đầu tính lãi / đóng lãi (như yêu cầu khách lùi ngày) trên cùng nguồn + cùng hoặc giảm số vốn → bỏ qua hoàn toàn.
      const editingId = (state.editingContract && state.editingContract.MaHopDong) || null;
      const oldC = editingId ? state.contracts.find(c => c.MaHopDong === editingId) : null;
      let skipCapitalCheck = false;
      let requiredCheckAmount = contractData.SoTienVay;
      if (oldC) {
        const newSrc = contractData.MaNguon || 'NGUON_TU_CO';
        const oldSrc = oldC.MaNguon || 'NGUON_TU_CO';
        const oldAmt = Number(oldC.SoTienVay || 0);
        const sameSource = newSrc === oldSrc;
        const notIncreased = contractData.SoTienVay <= oldAmt;
        if (sameSource && notIncreased) {
          skipCapitalCheck = true;
        } else if (sameSource && contractData.SoTienVay > oldAmt) {
          // Tăng vốn cùng nguồn: chỉ cần kiểm tra phần tăng thêm so với spare hiện tại
          requiredCheckAmount = contractData.SoTienVay - oldAmt;
        }
        // Nếu đổi nguồn: requiredCheckAmount vẫn = full (phải đủ trên nguồn mới)
      }

      let usedAutoAlloc = false;
      if (!skipCapitalCheck) {
        if (window._pendingContractAllocation && window._pendingContractAllocation.length > 0) {
          usedAutoAlloc = true;
        } else if (!state.editingContract) {
          const autoAlloc = autoAllocateSources(contractData.SoTienVay, contractData.NgayVay);
          usedAutoAlloc = autoAlloc && autoAlloc.length > 0;
        }
        
        if (usedAutoAlloc) {
          const totalAvailable = calculateAvailableCapital(null, editingId);
          if (requiredCheckAmount > totalAvailable) {
            return showAlert("Lỗi nguồn vốn", `Tổng nguồn vốn thực tế không đủ để lập hợp đồng này!\nTổng nguồn vốn còn dư: ${formatVND(totalAvailable)}\nSố tiền yêu cầu: ${formatVND(requiredCheckAmount)}${requiredCheckAmount < contractData.SoTienVay ? ' (phần tăng thêm)' : ''}`);
          }
        } else {
          const targetSourceId = contractData.MaNguon || 'NGUON_TU_CO';
          const sourceAvailable = calculateAvailableCapital(targetSourceId, editingId);
          const srcObj = state.capitalSources.find(s => s.MaNguon === targetSourceId);
          const sourceName = srcObj ? srcObj.TenNguon : targetSourceId;
          
          if (requiredCheckAmount > sourceAvailable) {
            const extraNote = (requiredCheckAmount < contractData.SoTienVay) ? ' (chỉ cần đủ phần vốn tăng thêm)' : '';
            return showAlert("Lỗi nguồn vốn", `Nguồn vốn "${sourceName}" không đủ tiền mặt khả dụng!\nSố tiền còn dư của nguồn: ${formatVND(sourceAvailable)}\nSố tiền yêu cầu: ${formatVND(requiredCheckAmount)}${extraNote}\n\nVui lòng tăng thêm vốn cho nguồn này hoặc sử dụng nút "Tự động phân bổ nguồn vốn".`);
          }
        }
      }

      // Sử dụng phân bổ tự động nếu user bấm nút trong modal, hoặc cho HĐ mới (luôn tự chia ưu tiên lãi thấp)
      if (window._pendingContractAllocation && window._pendingContractAllocation.length > 0) {
        contractData.LichSuNguon = buildLichSuNguonFromAllocation(window._pendingContractAllocation, contractData.NgayVay);
        contractData.MaNguon = window._pendingContractAllocation[0].MaNguon;
        window._pendingContractAllocation = null;
      } else if (!state.editingContract) {
        const autoAlloc = autoAllocateSources(contractData.SoTienVay, contractData.NgayVay);
        if (autoAlloc && autoAlloc.length) {
          contractData.LichSuNguon = buildLichSuNguonFromAllocation(autoAlloc, contractData.NgayVay);
          contractData.MaNguon = autoAlloc[0].MaNguon;
        } else {
          contractData.LichSuNguon = [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon || 'NGUON_TU_CO', SoTien: contractData.SoTienVay }];
        }
      }

      executeSave('contracts', contractData.MaHopDong, contractData, () => {
        if (state.editingContract) {
          const old = state.contracts.find(c => c.MaHopDong === contractData.MaHopDong);
          const usedMultiAuto = !!(contractData.LichSuNguon && contractData.LichSuNguon.length > 1);
          if (old && old.MaNguon !== contractData.MaNguon && !usedMultiAuto) {
            const hist = [...(old.LichSuNguon || [])]; const active = hist.find(s => s.NgayKetThuc === null);
            if (active) active.NgayKetThuc = new Date().toISOString().split('T')[0];
            hist.push({ NgayBatDau: new Date().toISOString().split('T')[0], NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay });
            contractData.LichSuNguon = hist;
          } else if (!contractData.LichSuNguon || contractData.LichSuNguon.length === 0) {
            contractData.LichSuNguon = old ? JSON.parse(JSON.stringify(old.LichSuNguon)) : [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay }];
            if (old && old.SoTienVay !== contractData.SoTienVay) {
              const active = contractData.LichSuNguon.find(s => s.NgayKetThuc === null);
              if (active) active.SoTien = contractData.SoTienVay;
            }
          }
          state.contracts = state.contracts.map(c => c.MaHopDong === contractData.MaHopDong ? contractData : c);
          showNotification("Cập nhật hợp đồng thành công");
        } else {
          if (state.contracts.some(c => c.MaHopDong === contractData.MaHopDong)) return showAlert("Lỗi", "Mã HĐ đã tồn tại!");
          if (!contractData.LichSuNguon || contractData.LichSuNguon.length === 0) {
            contractData.LichSuNguon = [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay }];
          }
          state.contracts.push(contractData); showNotification("Mở hợp đồng thành công");
        }
      });
      state.editingContract = null; closeModal('contract-modal');
    }

    function handleSavePayment(e) {
      e.preventDefault(); const form = e.target;
      const p = { 
        MaThanhToan: Math.random().toString(36).substring(2, 10), 
        MaHopDong: form.MaHopDong.value, 
        NgayThanhToan: form.NgayThanhToan.value, 
        SoTienTra: Number(form.SoTienTra.value), 
        TienKhuyenMai: Number(form.TienKhuyenMai ? form.TienKhuyenMai.value : 0), 
        LoaiThanhToan: form.LoaiThanhToan.value, 
        GhiChu: form.GhiChu.value.trim(), 
        TrangThaiThu: form.TrangThaiThu.value, 
        NguoiThuHo: form.TrangThaiThu === 'NhanVienGiu' ? form.NguoiThuHo.value.trim() : '',
        KyLaiTu: form.KyLaiTu ? parseDateToISO(form.KyLaiTu.value) : '',
        KyLaiDen: form.KyLaiDen ? parseDateToISO(form.KyLaiDen.value) : ''
      };
      if (p.SoTienTra <= 0) return showAlert("Lỗi", "Số tiền đóng không hợp lệ");

      // Add payment record
      state.payments.unshift(p);

      // Recalculate contract rollover
      const contract = state.contracts.find(c => c.MaHopDong === p.MaHopDong);
      if (contract) {
        if (p.LoaiThanhToan === 'Tất toán') {
          const updatedC = { ...contract, TrangThai: 'Đã tất toán', NgayTatToan: p.NgayThanhToan };
          state.contracts = state.contracts.map(c => c.MaHopDong === p.MaHopDong ? updatedC : c);
        } else if (p.LoaiThanhToan === 'Trả lãi' && contract.TrangThai === 'Đang vay') {
          // Rollover: dùng Kỳ lãi đến (ngày đóng lãi đã điều chỉnh) + 30 ngày làm ngày đáo hạn mới
          const closeDateStr = p.KyLaiDen || p.NgayThanhToan;
          let baseDate = new Date(closeDateStr);
          if (isNaN(baseDate.getTime())) {
            baseDate = new Date(p.NgayThanhToan);
          }
          
          // +30 ngày chuẩn cho kỳ tiếp
          baseDate.setDate(baseDate.getDate() + 30);
          
          // Nếu vẫn còn quá hạn so với ngày nộp thực, tiếp tục +30
          const payDate = new Date(p.NgayThanhToan);
          payDate.setHours(0,0,0,0);
          while (baseDate < payDate) {
            baseDate.setDate(baseDate.getDate() + 30);
          }
          
          const newNgayDaoHan = baseDate.toISOString().split('T')[0];
          const updatedC = { ...contract, NgayDaoHan: newNgayDaoHan };

    function handleSaveWithdrawInterest(e) {
      e.preventDefault(); const form = e.target;
      const amount = Number(form.SoTien.value);
      if (amount <= 0) return showAlert("Lỗi", "Số tiền rút không hợp lệ");
      
      const statsObj = getStats();
      const tongRutLai = (state.interestWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      const tienLaiThuc = statsObj.loiNhuanRongThucTe;
      const laiDoiTac = statsObj.laiDoiTac || 0;
      const tongLaiConThucTe = tienLaiThuc - laiDoiTac - tongRutLai;
      
      if (amount > tongLaiConThucTe) {
        return showAlert("Lỗi", "Số tiền rút vượt quá số lãi còn thực tế khả dụng!");
      }
      
      const maRut = Math.random().toString(36).substring(2, 10).toUpperCase();
      const w = {
        MaRut: maRut,
        Ngay: form.Ngay.value,
        SoTien: amount,
        KieuRut: form.KieuRut.value,
        GhiChu: form.GhiChu.value.trim()
      };
      
      if (!state.interestWithdrawals) state.interestWithdrawals = [];
      state.interestWithdrawals.unshift(w);
      
      if (w.KieuRut === 'NapVonTuCo') {
        const tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');
        if (tuCo) {
          if (!tuCo.LichSuBienDong) tuCo.LichSuBienDong = [];
          tuCo.LichSuBienDong.push({
            Ngay: w.Ngay,
            SoTien: w.SoTien,
            NoiDung: `Nạp vốn từ Tiền Lãi Thực tế (${w.GhiChu})`,
            MaRut: maRut
          });
        }
      }
      
      saveStateOfflineAndRefresh(true);
      showNotification("Đã thực hiện rút lãi thành công!");
      closeModal('withdraw-interest-modal');
    }

    // Live update preview lãi kỳ (hỗ trợ điều chỉnh ngày, tính lại với chênh lệch ngày)
    function updatePaymentInterestPreview(forceSetAmount = false) {
      const st = window.state || state;
      const maHD = document.getElementById('pm-MaHopDong') ? document.getElementById('pm-MaHopDong').value : '';
      const c = (st.contracts || []).find(x => x.MaHopDong === maHD);
      const preview = document.getElementById('pm-interest-preview');
      const noteEl = document.getElementById('pm-first-note');
      if (!c || !preview) return;
      const tuEl = document.getElementById('pm-KyLaiTu');
      const denEl = document.getElementById('pm-KyLaiDen');
      const typeSel = document.querySelector('#payment-modal select[name="LoaiThanhToan"]') || document.querySelector('select[name="LoaiThanhToan"]');
      if (!typeSel || typeSel.value !== 'Trả lãi') return;

      let kyTu = (tuEl && tuEl.value) ? parseDateToISO(tuEl.value) : (c.NgayBatDauTinhLai || c.NgayVay);
      let kyDen = (denEl && denEl.value) ? parseDateToISO(denEl.value) : (c.NgayDaoHan || kyTu);

      // Nếu chưa có, set gợi ý chuẩn
      if (!kyTu || !kyDen) {
        const sug0 = getCurrentCycleInterestSuggestion(c);
        kyTu = kyTu || sug0.kyTu;
        kyDen = kyDen || sug0.kyDen;
        if (tuEl && !tuEl.value) tuEl.value = formatDate(kyTu);
        if (denEl && !denEl.value) denEl.value = formatDate(kyDen);
      }

      const priorCount = (st.payments || []).filter(p => p.MaHopDong === maHD && p.LoaiThanhToan === 'Trả lãi').length;
      const isFirst = priorCount === 0;
      const amt = calculateInterestForPeriod(c, kyTu, kyDen, isFirst);

      const daily = (c.SoTienVay / 1000000) * (c.LaiNgayTrenTrieu || 0);
      const std30 = Math.round(daily * 30);
      const actualDays = calculateStandardDays(kyTu, kyDen);
      const diffDays = actualDays - 30;
      const diffLai = Math.round(daily * diffDays);

      preview.innerHTML = `Lãi kỳ: <b>${formatVND(amt)}</b> (ngày: ${actualDays}${diffDays!==0 ? ' , chênh '+diffDays+'d = '+formatVND(diffLai) : ''})`;
      if (noteEl) {
        const ngayTL = c.NgayBatDauTinhLai || c.NgayVay;
        if (isFirst && calculateStandardDays(c.NgayVay, ngayTL) > 0) {
          noteEl.textContent = `KỲ ĐẦU: +${calculateStandardDays(c.NgayVay, ngayTL)} ngày dư từ giải ngân → tính lãi. Tổng = 30d + dư.`;
        } else {
          noteEl.textContent = isFirst ? 'Kỳ đầu' : 'Kỳ thường';
        }
      }
      if (forceSetAmount || (document.getElementById('pm-SoTienTra') && !document.getElementById('pm-SoTienTra').value)) {
        const si = document.getElementById('pm-SoTienTra');
        if (si) si.value = amt;
      }
    }
    window.updatePaymentInterestPreview = updatePaymentInterestPreview;

    function handleExportJSON() {
      if (!state.password) {
        return showAlert("Lỗi", "Chưa thiết lập mật mã bảo mật!");
      }
      const rawData = JSON.stringify({
        customers: state.customers,
        contracts: state.contracts,
        payments: state.payments,
        capitalSources: state.capitalSources,
        interestWithdrawals: state.interestWithdrawals,
        partnerWithdrawals: state.partnerWithdrawals || []
      });
      const encrypted = encrypt(state.password, rawData);
      const backupObj = {
        type: "loan_manager_encrypted_backup",
        payload: encrypted
      };
      
      const a = document.createElement('a');
      a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupObj));
      a.download = `SaoLuu_BaoMat_ChoVay_${new Date().toISOString().split('T')[0]}.json`;

      showNotification("Đã tải tệp sao lưu mã hóa bảo mật!");

    function handleImportJSON(e) {
      const r = new FileReader(); r.readAsText(e.target.files[0], "UTF-8");
      r.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          if (d.type === "loan_manager_encrypted_backup" && d.payload) {
            localStorage.setItem('loan_data_encrypted', d.payload);
            showNotification("Đã nhập tệp sao lưu. Vui lòng nhập mã PIN để mở khóa!");
            state.isUnlocked = false;
            renderLockScreen();
          } else if (d.customers && d.contracts && d.payments) {
            if (!state.password) {
              return showAlert("Lỗi", "Vui lòng thiết lập mã PIN bảo mật trước khi nhập dữ liệu!");
            }
            state.customers = d.customers;
            state.contracts = d.contracts;
            state.payments = d.payments;
            state.capitalSources = d.capitalSources || DEFAULT_CAPITAL_SOURCES;
            state.interestWithdrawals = d.interestWithdrawals || [];
            state.partnerWithdrawals = d.partnerWithdrawals || [];
            normalizeAllMaHopDong();
            recalculateAllDueDates();
            saveStateOfflineAndRefresh(true);
            showNotification("Đồng bộ dữ liệu thô thành công!");
          } else {
            showAlert("Lỗi", "Tệp sao lưu không đúng định dạng!");
          }
        } catch (err) {
          showAlert("Lỗi", "Định dạng file không tương thích!");
        }
      };
    }

        const tienLaiThuc = statsObj.loiNhuanRongThucTe;

        const tongLaiConThucTe = tienLaiThuc - laiDoiTac - tongRutLai;

        // Calendar computation for due dates - placed early so it can be referenced in the dashboard HTML string higher up
        const calSection = (() => {
            const dueMap = {};
            const today = new Date();
            today.setHours(0,0,0,0);
            const todayStr = today.toISOString().split('T')[0];
            state.contracts.filter(c => c.TrangThai === 'Đang vay' && c.NgayDaoHan).forEach(c => {
              const key = c.NgayDaoHan;

              dueMap[key].count++;
              dueMap[key].totalVay += (calc.duNoGocHienTai || c.SoTienVay);
              dueMap[key].totalLai += lai;

            const monthStats = {};
            Object.keys(dueMap).forEach(k => {
              const mkey = k.substring(0,7);
              if (!monthStats[mkey]) monthStats[mkey] = {count:0};
              monthStats[mkey].count += dueMap[k].count;
            });
            const sortedMonths = Object.keys(monthStats).sort();
            let selectedMonth = state.dashboardDueCalendarMonth || '';
            if (!selectedMonth || !monthStats[selectedMonth]) {
              selectedMonth = sortedMonths.reduce((best, m) => (monthStats[m].count > (monthStats[best]||{count:0}).count ? m : best), sortedMonths[sortedMonths.length-1] || '2026-07');
            }
            state.dashboardDueCalendarMonth = selectedMonth;

            const currentIdx = sortedMonths.indexOf(selectedMonth);
            const prevM = currentIdx > 0 ? sortedMonths[currentIdx-1] : null;
            const nextM = currentIdx < sortedMonths.length-1 ? sortedMonths[currentIdx+1] : null;

            const [yStr, mStr] = selectedMonth.split('-');
            const calYear = parseInt(yStr,10);
            const calMonth = parseInt(mStr,10) - 1;

            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const firstDow = new Date(calYear, calMonth, 1).getDay();
            const leadingEmpty = (firstDow + 6) % 7;

            const dayHeaders = ['Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy','Chủ nhật'];
            let grid = dayHeaders.map(h => `<div class="text-center font-bold bg-slate-100 text-xs p-1 border">${h}</div>`).join('');

            for (let i=0; i<leadingEmpty; i++) grid += `<div class="p-0.5 bg-slate-50 border"></div>`;

            const fmtShort = (n) => {
              n = Number(n)||0;
              if (n>=1e9) return (n/1e9).toFixed(1)+'T';
              if (n>=1e6) return (n/1e6).toFixed(1)+'M';
              if (n>=1e3) return Math.round(n/1e3)+'k';
              return n;
            };

            for (let d=1; d<=daysInMonth; d++) {
              const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const info = dueMap[ds] || {count:0, totalVay:0, totalLai:0};
              const cellD = new Date(calYear, calMonth, d);
              const dow = cellD.getDay();
              const weekend = dow===0 || dow===6;
              const has = info.count > 0;
              const bg = has ? 'bg-amber-50' : (weekend ? 'bg-red-50/40' : 'bg-white');
              const txt = weekend && !has ? 'text-rose-600' : (has ? '' : 'text-slate-300');
              let inner = `<div class="text-lg font-extrabold leading-none">${d}</div>`;
              if (has) {
                inner += `<div class="text-sm leading-tight mt-1 font-bold">
                  <div>${info.count} HĐ</div>
                  <div>${fmtShort(info.totalVay)}</div>
                  <div class="text-emerald-800">${fmtShort(info.totalLai)}</div>

        let sourcesHTML = '';

        // Compute monthly expected interest from current contracts and source costs (for top cards)

        let allActiveContracts = state.contracts.filter(c => c.TrangThai === 'Đang vay').map(c => {

          const st = getContractWarningStatus(c);
          const cu = state.customers.find(x => x.MaKH === c.MaKH);
          // Sử dụng gợi ý kỳ hiện tại (có xử lý tháng đầu có ngày tính lãi sau giải ngân)
          const sug = getCurrentCycleInterestSuggestion(c);
          const cycleLai = sug.amount || Math.round((calc.duNoGocHienTai / 1000000) * c.LaiNgayTrenTrieu * 30);
          const backlog = Math.max(0, calc.laiConNo - cycleLai);
          const soLaiCanDong = c.LoaiHopDong === 'LaiCoDinhNgay' ? calc.laiConNo : (cycleLai + backlog);
          let daysDiff = 0;
          if (c.NgayDaoHan) {
            const dao = new Date(c.NgayDaoHan); dao.setHours(0,0,0,0);
            daysDiff = Math.ceil((dao - todayObj) / (1000*3600*24));
          }
          return { c, calc, st, cu, soLaiCanDong, daysDiff, cycleLai, isFirstCycle: sug.isFirst };
        });

        if (searchKeyword) {
          allActiveContracts = allActiveContracts.filter(x => 
            x.c.MaHopDong.toLowerCase().includes(searchKeyword) ||
            (x.cu && x.cu.TenKhachHang.toLowerCase().includes(searchKeyword)) ||
            (x.c.TenTaiSan && x.c.TenTaiSan.toLowerCase().includes(searchKeyword))
          );

        const countOverdue = allActiveContracts.filter(x => x.st.type === 'overdue' || x.daysDiff < 0).length;
        const countDue = allActiveContracts.filter(x => (x.daysDiff >= 0 && x.daysDiff <= 3) || x.st.type === 'due' || x.st.type === 'soon').length;
        const countActive = allActiveContracts.filter(x => x.daysDiff > 3 && x.st.type !== 'overdue').length;

        let filteredActionList = [];

          filteredActionList = allActiveContracts.filter(x => (x.daysDiff >= 0 && x.daysDiff <= 3) || x.st.type === 'due' || x.st.type === 'soon');
        } else {
          filteredActionList = allActiveContracts.filter(x => x.daysDiff > 3 && x.st.type !== 'overdue');
        }

        // Mobile-friendly card list for action required (better than table on small screens)
        let actionCardsHTML = filteredActionList.map(w => {
          const loaiHDSummary = w.c.LoaiHopDong === 'LaiCoDinhNgay' 
            ? `<span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded text-[10px] font-bold">Lãi cố định: ${formatVND(w.c.SoLaiCoDinh)}</span>`
            : `<span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[10px] font-semibold">${w.c.LaiNgayTrenTrieu}đ/triệu</span>`;
          
          const badgeCls = w.daysDiff < 0 ? 'bg-rose-100 text-rose-800' : (w.daysDiff <= 3 ? 'bg-amber-100 text-amber-900' : 'bg-emerald-100 text-emerald-800');
          const daysIcon = w.daysDiff < 0 ? '🔴' : (w.daysDiff <= 3 ? '🟠' : '🟢');

    // Helper to build rows HTML for customers (used by both full render and targeted update)
    function buildCustomersRowsHTML(term = '') {
      term = (term || '').toLowerCase().trim();
      const filtered = state.customers.filter(c => 
        (c.TenKhachHang || '').toLowerCase().includes(term) || 
        (c.MaKH || '').toLowerCase().includes(term) ||
        (c.SoDienThoai || '').toLowerCase().includes(term) ||
        (c.DiaChi || '').toLowerCase().includes(term)
      );
      let rows = '';
      filtered.forEach(cust => {
        // Aggregate financials for this customer
        const custContracts = state.contracts.filter(c => c.MaKH === cust.MaKH && c.TrangThai === 'Đang vay');
        let tongVay = 0;
        let tongLaiThang = 0;
        custContracts.forEach(contract => {
          const calc = calculateContractInterest(contract);
          tongVay += calc.duNoGocHienTai || 0;
          const sug = getCurrentCycleInterestSuggestion(contract);
          tongLaiThang += sug.amount || Math.round((contract.SoTienVay / 1000000) * contract.LaiNgayTrenTrieu * 30);
        });
        const custPays = state.payments.filter(p => {
          const c = state.contracts.find(cc => cc.MaHopDong === p.MaHopDong);
          return c && c.MaKH === cust.MaKH && p.LoaiThanhToan === 'Trả lãi';
        });
        let tongLaiDaDong = custPays.reduce((sum, p) => sum + Number(p.SoTienTra || 0) + Number(p.TienKhuyenMai || 0), 0);

        rows += `<tr class="border-t hover:bg-slate-50">
          <td class="p-4 font-bold text-slate-700">${cust.MaKH}</td>
          <td class="p-4 font-semibold text-slate-900">${cust.TenKhachHang}</td>
          <td class="p-4 text-slate-600">${cust.SoDienThoai}</td>
          <td class="p-4 text-slate-500">${cust.DiaChi}</td>
          <td class="p-4 text-right font-bold">${formatVND(tongVay)}</td>
          <td class="p-4 text-right font-bold text-emerald-700">${formatVND(tongLaiThang)}</td>
          <td class="p-4 text-right font-bold text-amber-700">${formatVND(tongLaiDaDong)}</td>

    function handleDeletePartnerWithdrawal(maRut) {
      if (!confirm("Bạn có chắc chắn muốn xóa / hoàn tác giao dịch rút lãi đối tác này?")) return;
      const idx = (state.partnerWithdrawals || []).findIndex(w => w.MaRut === maRut);

        const item = state.partnerWithdrawals[idx];
        if (item.KieuRut === 'NapVaoHeThong') {
          const src = state.capitalSources.find(s => s.MaNguon === 'TIEN_DOI_TAC');

        }
        state.partnerWithdrawals.splice(idx, 1);
        saveStateOfflineAndRefresh(true);
        showNotification("Đã hoàn tác giao dịch rút lãi đối tác!");
      }

    // === CHỨC NĂNG EXPORT BÁO CÁO EXCEL ===
    function exportDataToExcel(filename, sheetName, headers, rows) {
      let tableHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>${sheetName}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
      <body>
        <table border="1">
          <thead>
            <tr style="background-color:#1e293b;color:#ffffff;font-weight:bold;">
              ${headers.map(h => `<th style="padding:8px;border:1px solid #cbd5e1;">${h}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `<tr>${row.map(cell => `<td style="padding:6px;border:1px solid #e2e8f0;">${cell !== null && cell !== undefined ? cell : ''}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </body>
      </html>`;

      const blob = new Blob(['\uFEFF' + tableHTML], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename.endsWith('.xls') ? filename : filename + '.xls';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportContractsReport(filterType = 'All', filterStatus = 'All', startDate = '', endDate = '') {
      let list = [...state.contracts];
      if (filterType !== 'All') list = list.filter(c => (c.LoaiHopDong || 'VayThuong') === filterType);
      if (filterStatus !== 'All') list = list.filter(c => c.TrangThai === filterStatus);
      if (startDate) list = list.filter(c => c.NgayVay >= startDate);
      if (endDate) list = list.filter(c => c.NgayVay <= endDate);

      const headers = [
        "STT", "Mã HĐ", "Khách Hàng", "SĐT", "Loại Hợp Đồng", "Số Vốn Vay (VNĐ)",
        "Lãi Ngày/1M hoặc Lãi Cố Định", "Ngày Bắt Đầu Vay", "Ngày Bắt Đầu Tính Lãi",
        "Ngày Đáo Hạn", "Nguồn Vốn", "Loại Tài Sản", "Tên Tài Sản", "Biển Số",
        "Trạng Thái", "Tổng Lãi Phát Sinh", "Lãi Đã Trả", "Lãi Còn Nợ"
      ];

      const rows = list.map((c, idx) => {
        const cust = state.customers.find(x => x.MaKH === c.MaKH);

        const laiText = c.LoaiHopDong === 'LaiCoDinhNgay' ? formatVND(c.SoLaiCoDinh) : (c.LaiNgayTrenTrieu + ' đ/triệu');

        return [
          idx + 1,
          c.MaHopDong,
          cust ? cust.TenKhachHang : 'N/A',
          cust ? cust.SoDienThoai : '',
          loaiHDText,
          c.SoTienVay,
          laiText,
          c.NgayVay,
          c.NgayBatDauTinhLai || c.NgayVay,
          c.NgayDaoHan || '',
          calc.nguonVon || '',
          c.LoaiTaiSan || '',
          c.TenTaiSan || '',
          c.BienSo || '',
          c.TrangThai,
          calc.tongLaiPhatSinh,
          calc.laiDaTra,
          calc.laiConNo
        ];
      });

      exportDataToExcel(`BaoCao_DanhSach_HopDong_${new Date().toISOString().split('T')[0]}.xls`, "DanhSachHopDong", headers, rows);

    function onContractTypeChange(type) {
      const isFixed = type === 'LaiCoDinhNgay';
      const fixedBox = document.getElementById('cm-fixed-interest-container');
      const rateBox = document.getElementById('cm-rate-container');
      const tinhLaiBox = document.getElementById('cm-tinh-lai-container');
      
      if (fixedBox) fixedBox.classList.toggle('hidden', !isFixed);
      if (rateBox) rateBox.classList.toggle('hidden', isFixed);
      if (tinhLaiBox) tinhLaiBox.classList.toggle('hidden', isFixed);
    }
    window.onContractTypeChange = onContractTypeChange;

    function renderPaymentModalHTML() {
      let contOpts = state.contracts.filter(c=>c.TrangThai==='Đang vay').map(c => {
         const cu = state.customers.find(x=>x.MaKH===c.MaKH);
         return `<option value="${c.MaHopDong}">${c.MaHopDong} - ${cu?cu.TenKhachHang:''} (${formatVND(c.SoTienVay)})</option>`;

" class="w-full border p-1 text-xs rounded" placeholder="dd/mm/yyyy" onchange="window.updatePaymentInterestPreview&&window.updatePaymentInterestPreview()" /></div><div><label class="block text-[9px] text-slate-600">Kỳ lãi đến (ngày đóng lãi)</label><input type="text" id="pm-KyLaiDen" name="KyLaiDen" class="w-full border p-1 text-xs rounded font-bold" placeholder="dd/mm/yyyy" onchange="window.updatePaymentInterestPreview&&window.updatePaymentInterestPreview()" /></div></div><div class="mt-1 flex gap-2 items-center"><button type="button" onclick="window.updatePaymentInterestPreview&&window.updatePaymentInterestPreview(true)" class="px-2 py-0.5 bg-indigo-700 text-white rounded text-[10px] font-bold">Tính lãi kỳ</button><span id="pm-interest-preview" class="font-extrabold text-emerald-700 text-xs"></span></div><div id="pm-first-note" class="text-[9px] text-indigo-600 mt-0.5"></div></div><input type="number" id="pm-SoTienTra" name="SoTienTra" class="w-full border p-2.5 text-sm rounded-xl focus:outline-none font-extrabold text-lg bg-slate-50" placeholder="Số tiền mặt nhận được..." required /><div id="pm-discount-container"><input type="number" name="TienKhuyenMai" class="w-full border p-2.5 text-sm rounded-xl focus:outline-none text-rose-600 font-bold" placeholder="Tiền ưu đãi khuyến mại..." value="0" /></div><input type="date" name="NgayThanhToan" value="${new Date().toISOString().split('T')[0]}" class="w-full border p-2.5 text-sm rounded-xl focus:outline-none" required /><input name="GhiChu" class="w-full border p-2.5 text-sm rounded-xl focus:outline-none" placeholder="Diễn giải nội dung thu tiền..." /></div><div class="flex justify-end gap-2"><button type="button" onclick="window.closeModal && window.closeModal('payment-modal')" class="px-4 py-2 bg-slate-100 text-slate-600 font-semibold text-sm rounded-xl">Hủy</button><button type="submit" class="px-4 py-2 bg-slate-900 text-white font-semibold text-sm rounded-xl">Xác nhận lập phiếu</button></div></form></div></div>`;
