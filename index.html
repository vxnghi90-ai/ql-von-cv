    function handleSaveContract(e) {
      e.preventDefault(); const form = e.target;
      const contractData = {
        MaHopDong: form.MaHopDong.value.toUpperCase().trim(),
        MaKH: form.MaKH.value,
        LoaiHopDong: form.LoaiHopDong ? form.LoaiHopDong.value : 'VayThuong',
        SoTienVay: Number(form.SoTienVay.value),
        LaiNgayTrenTrieu: Number(form.LaiNgayTrenTrieu ? form.LaiNgayTrenTrieu.value : 0),
        SoLaiCoDinh: Number(form.SoLaiCoDinh ? form.SoLaiCoDinh.value : 0),
        NgayVay: parseDateToISO(form.NgayVay.value),
        NgayBatDauTinhLai: parseDateToISO(form.NgayBatDauTinhLai ? form.NgayBatDauTinhLai.value : form.NgayVay.value) || parseDateToISO(form.NgayVay.value),
        NgayDaoHan: parseDateToISO(form.NgayDaoHan.value),
        HinhThucLai: form.HinhThucLai ? form.HinhThucLai.value : 'Lãi cố định',
        TrangThai: form.TrangThai.value,
        GhiChu: form.GhiChu.value.trim(),
        MaNguon: form.MaNguon.value,
        LoaiTaiSan: form.LoaiTaiSan.value,
        TenTaiSan: form.TenTaiSan.value.trim(),
        BienSo: form.BienSo.value.trim(),
        SoKhung: form.SoKhung.value.trim(),
        SoMay: form.SoMay.value.trim()
      };

      // Validation
      if (!contractData.MaHopDong) return showAlert("Lỗi nhập liệu", "Vui lòng nhập Mã Hợp Đồng!");
      if (!contractData.MaKH) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Khách Hàng vay!");
      if (!contractData.SoTienVay || contractData.SoTienVay <= 0) return showAlert("Lỗi nhập liệu", "Số vốn cho vay phải lớn hơn 0!");
      if (!contractData.LoaiTaiSan) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Loại Tài Sản!");
      if (!contractData.TenTaiSan) return showAlert("Lỗi nhập liệu", "Vui lòng nhập Tên Dòng Xe / Tài Sản cầm cố!");
      if (!contractData.NgayVay) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Ngày Bắt Đầu Vay!");

      if (contractData.LoaiHopDong === 'VayThuong') {
        if (!contractData.NgayBatDauTinhLai) return showAlert("Lỗi nhập liệu", "Vui lòng chọn Ngày Bắt Đầu Tính Lãi!");
        if (contractData.NgayBatDauTinhLai < contractData.NgayVay) {
          return showAlert("Lỗi logic ngày", "Ngày Bắt Đầu Tính Lãi không được trước Ngày Bắt Đầu Vay (ngày giải ngân)!");
        }
      } else if (contractData.LoaiHopDong === 'LaiCoDinhNgay') {
        if (!contractData.SoLaiCoDinh || contractData.SoLaiCoDinh <= 0) {
          return showAlert("Lỗi nhập liệu", "Vui lòng nhập Số Lãi Cố Định hợp lệ (lớn hơn 0)!");
        }
      }

      // Check capital sufficiency
      // QUAN TRỌNG: Chỉ kiểm tra khi TẠO MỚI hoặc EDIT làm TĂNG vốn / ĐỔI nguồn.
      // Chỉnh ngày bắt đầu tính lãi / đóng lãi (như yêu cầu khách lùi ngày) trên cùng nguồn + cùng hoặc giảm số vốn → bỏ qua hoàn toàn.
      const editingId = (state.editingContract && state.editingContract.MaHopDong) || null;
      const oldC = editingId ? state.contracts.find(c => c.MaHopDong === editingId) : null;
      contractData.laiConNo = oldC ? (Number(oldC.laiConNo) || 0) : 0;
      let skipCapitalCheck = false;
      let requiredCheckAmount = contractData.SoTienVay;
      if (oldC) {
        const newSrc = contractData.MaNguon || 'NGUON_TU_CO';
        const oldSrc = oldC.MaNguon || 'NGUON_TU_CO';
        const oldAmt = Number(oldC.SoTienVay || 0);
        const sameSource = newSrc === oldSrc;
        const notIncreased = contractData.SoTienVay <= oldAmt;
        if (sameSource && notIncreased) {
          skipCapitalCheck = true;
        } else if (sameSource && contractData.SoTienVay > oldAmt) {
          // Tăng vốn cùng nguồn: chỉ cần kiểm tra phần tăng thêm so với spare hiện tại
          requiredCheckAmount = contractData.SoTienVay - oldAmt;
        }
        // Nếu đổi nguồn: requiredCheckAmount vẫn = full (phải đủ trên nguồn mới)
      }

      let usedAutoAlloc = false;
      if (!skipCapitalCheck) {
        if (window._pendingContractAllocation && window._pendingContractAllocation.length > 0) {
          usedAutoAlloc = true;
        } else if (!state.editingContract) {
          const autoAlloc = autoAllocateSources(contractData.SoTienVay, contractData.NgayVay);
          usedAutoAlloc = autoAlloc && autoAlloc.length > 0;
        }
        
        if (usedAutoAlloc) {
          const totalAvailable = calculateAvailableCapital(null, editingId);
          if (requiredCheckAmount > totalAvailable) {
            return showAlert("Lỗi nguồn vốn", `Tổng nguồn vốn thực tế không đủ để lập hợp đồng này!\nTổng nguồn vốn còn dư: ${formatVND(totalAvailable)}\nSố tiền yêu cầu: ${formatVND(requiredCheckAmount)}${requiredCheckAmount < contractData.SoTienVay ? ' (phần tăng thêm)' : ''}`);
          }
        } else {
          const targetSourceId = contractData.MaNguon || 'NGUON_TU_CO';
          const sourceAvailable = calculateAvailableCapital(targetSourceId, editingId);
          const srcObj = state.capitalSources.find(s => s.MaNguon === targetSourceId);
          const sourceName = srcObj ? srcObj.TenNguon : targetSourceId;
          
          if (requiredCheckAmount > sourceAvailable) {
            const extraNote = (requiredCheckAmount < contractData.SoTienVay) ? ' (chỉ cần đủ phần vốn tăng thêm)' : '';
            return showAlert("Lỗi nguồn vốn", `Nguồn vốn "${sourceName}" không đủ tiền mặt khả dụng!\nSố tiền còn dư của nguồn: ${formatVND(sourceAvailable)}\nSố tiền yêu cầu: ${formatVND(requiredCheckAmount)}${extraNote}\n\nVui lòng tăng thêm vốn cho nguồn này hoặc sử dụng nút "Tự động phân bổ nguồn vốn".`);
          }
        }
      }

      // Sử dụng phân bổ tự động nếu user bấm nút trong modal, hoặc cho HĐ mới (luôn tự chia ưu tiên lãi thấp)
      if (window._pendingContractAllocation && window._pendingContractAllocation.length > 0) {
        contractData.LichSuNguon = buildLichSuNguonFromAllocation(window._pendingContractAllocation, contractData.NgayVay);
        contractData.MaNguon = window._pendingContractAllocation[0].MaNguon;
        window._pendingContractAllocation = null;
      } else if (!state.editingContract) {
        const autoAlloc = autoAllocateSources(contractData.SoTienVay, contractData.NgayVay);
        if (autoAlloc && autoAlloc.length) {
          contractData.LichSuNguon = buildLichSuNguonFromAllocation(autoAlloc, contractData.NgayVay);
          contractData.MaNguon = autoAlloc[0].MaNguon;
        } else {
          contractData.LichSuNguon = [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon || 'NGUON_TU_CO', SoTien: contractData.SoTienVay }];
        }
      }

      // Check if user manually changed NgayDaoHan
      if (oldC) {
        if (contractData.NgayDaoHan !== oldC.NgayDaoHan) {
          contractData.NgayDaoHanManual = true;
        } else if (oldC.NgayDaoHanManual) {
          contractData.NgayDaoHanManual = true;
        }
      } else {
        contractData.NgayDaoHanManual = true;
      }

      executeSave('contracts', contractData.MaHopDong, contractData, () => {
        if (state.editingContract) {
          const old = state.contracts.find(c => c.MaHopDong === contractData.MaHopDong);
          const usedMultiAuto = !!(contractData.LichSuNguon && contractData.LichSuNguon.length > 1);
          if (old && old.MaNguon !== contractData.MaNguon && !usedMultiAuto) {
            const hist = [...(old.LichSuNguon || [])]; const active = hist.find(s => s.NgayKetThuc === null);
            if (active) active.NgayKetThuc = new Date().toISOString().split('T')[0];
            hist.push({ NgayBatDau: new Date().toISOString().split('T')[0], NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay });
            contractData.LichSuNguon = hist;
          } else if (!contractData.LichSuNguon || contractData.LichSuNguon.length === 0) {
            contractData.LichSuNguon = old ? JSON.parse(JSON.stringify(old.LichSuNguon)) : [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay }];
            if (old && old.SoTienVay !== contractData.SoTienVay) {
              const active = contractData.LichSuNguon.find(s => s.NgayKetThuc === null);
              if (active) active.SoTien = contractData.SoTienVay;
            }
          }
          state.contracts = state.contracts.map(c => c.MaHopDong === contractData.MaHopDong ? contractData : c);
          showNotification("Cập nhật hợp đồng thành công");
        } else {
          if (state.contracts.some(c => c.MaHopDong === contractData.MaHopDong)) return showAlert("Lỗi", "Mã HĐ đã tồn tại!");
          if (!contractData.LichSuNguon || contractData.LichSuNguon.length === 0) {
            contractData.LichSuNguon = [{ NgayBatDau: contractData.NgayVay, NgayKetThuc: null, MaNguon: contractData.MaNguon, SoTien: contractData.SoTienVay }];
          }
          state.contracts.push(contractData); showNotification("Mở hợp đồng thành công");
        }
      });
      state.editingContract = null; closeModal('contract-modal');
    }

    function handleDeleteContract(maHD) {

    }

    function handleSavePayment(e) {
      e.preventDefault(); const form = e.target;
      const loai = form.LoaiThanhToan.value;
      const c = state.contracts.find(x => x.MaHopDong === form.MaHopDong.value);
      if (!c) return showAlert("Lỗi", "Không tìm thấy hợp đồng!");

      const common = {
        MaHopDong: form.MaHopDong.value,
        NgayThanhToan: form.NgayThanhToan.value,
        TienKhuyenMai: Number(form.TienKhuyenMai ? form.TienKhuyenMai.value : 0),
        GhiChu: (form.GhiChu.value || '').trim(),
        TrangThaiThu: form.TrangThaiThu.value,
        NguoiThuHo: form.TrangThaiThu.value === 'NhanVienGiu' ? form.NguoiThuHo.value.trim() : '',
        KyLaiTu: form.KyLaiTu ? parseDateToISO(form.KyLaiTu.value) : '',
        KyLaiDen: form.KyLaiDen ? parseDateToISO(form.KyLaiDen.value) : ''
      };

      // ========== TẤT TOÁN GỐC (+ LÃI) ==========
      if (loai === 'Tất toán') {
        const calc = calculateContractInterest(c);
        const soTienGoc = Number(form.SoTienGoc ? form.SoTienGoc.value : form.SoTienTra.value);
        const soTienLai = Number(form.SoTienLai ? form.SoTienLai.value : 0);
        const cachTinhLai = (form.CachTinhLai && form.CachTinhLai.value) ? form.CachTinhLai.value : 'den_ngay_tra';
        if (soTienGoc < 0 || soTienLai < 0) return showAlert("Lỗi", "Số tiền không hợp lệ!");
        if (soTienGoc <= 0 && soTienLai <= 0) return showAlert("Lỗi", "Nhập số tiền gốc và/hoặc lãi cần thu!");

        const duNoGoc = calc.duNoGocHienTai;
        const sett = calculateSettlementInterest(c, common.NgayThanhToan, cachTinhLai);
        const laiCanDong = sett.lai;

        // Phiếu tất toán gốc
        if (soTienGoc > 0) {
          const pGoc = {
            MaThanhToan: 'TTG_' + Math.random().toString(36).substring(2, 10).toUpperCase(),
            ...common,
            SoTienTra: soTienGoc,
            LoaiThanhToan: 'Tất toán',
            CachTinhLai: cachTinhLai,
            SoTienLaiCanDong: laiCanDong,
            SoTienLaiThu: soTienLai,
            GhiChu: (common.GhiChu ? common.GhiChu + ' | ' : '') + `Tất toán gốc ${formatVND(soTienGoc)}` + (soTienLai > 0 ? ` + lãi ${formatVND(soTienLai)}` : ' (chưa thu lãi)')
          };
          state.payments.unshift(pGoc);
        }

        // Phiếu thu lãi (nếu có thu)
        if (soTienLai > 0) {
          const pLai = {
            MaThanhToan: 'TTL_' + Math.random().toString(36).substring(2, 10).toUpperCase(),
            ...common,
            SoTienTra: soTienLai,
            TienKhuyenMai: 0,
            LoaiThanhToan: 'Trả lãi',
            CachTinhLai: cachTinhLai,
            KyLaiTu: sett.ngayVaySauDaoStr || c.NgayBatDauTinhLai || c.NgayVay,
            KyLaiDen: common.NgayThanhToan,
            GhiChu: (common.GhiChu ? common.GhiChu + ' | ' : '') + `Thu lãi khi tất toán (${cachTinhLai === 'du_thang' ? 'đủ tháng' : 'đến ngày trả'})`
          };
          state.payments.unshift(pLai);
        }

        // Cập nhật trạng thái HĐ
        const gocCon = Math.max(0, duNoGoc - soTienGoc);
        const laiCon = Math.max(0, laiCanDong - soTienLai);
        let updatedC = { ...c };

        if (gocCon <= 0) {
          // Đã trả hết gốc
          updatedC.NgayTraGoc = common.NgayThanhToan;
          updatedC.LaiDongBang = true;
          updatedC.CachTinhLaiTatToan = cachTinhLai;
          if (laiCon > 0) {
            updatedC.TrangThai = 'Còn lãi';
            updatedC.laiConNo = laiCon;
            updatedC.NgayTatToan = null;
            showNotification(`Đã trả gốc. Còn lãi chưa thu: ${formatVND(laiCon)}`);
          } else {
            updatedC.TrangThai = 'Đã tất toán';
            updatedC.laiConNo = 0;
            updatedC.NgayTatToan = common.NgayThanhToan;
            showNotification("Tất toán gốc + lãi thành công!");
          }
        } else {
          // Trả một phần gốc
          updatedC.TrangThai = 'Đang vay';
          updatedC.laiConNo = laiCon > 0 ? laiCon : Number(c.laiConNo || 0);
          showNotification(`Đã thu gốc ${formatVND(soTienGoc)}. Còn dư nợ gốc ${formatVND(gocCon)}`);
        }

        state.contracts = state.contracts.map(x => x.MaHopDong === c.MaHopDong ? updatedC : x);
        saveStateOfflineAndRefresh(true);
        closeModal('payment-modal');
        setTimeout(() => { if (window.renderApp) window.renderApp(); }, 80);
        return;
      }

      // ========== TRẢ LÃI (kỳ hạn / còn lãi sau trả gốc) ==========
      const p = {
        MaThanhToan: Math.random().toString(36).substring(2, 10),
        ...common,
        SoTienTra: Number(form.SoTienTra.value),
        LoaiThanhToan: 'Trả lãi'
      };
      if (p.SoTienTra <= 0) return showAlert("Lỗi", "Số tiền đóng không hợp lệ");

      let soTienPhaiDong = 0;
      if (c.TrangThai === 'Còn lãi' || c.LaiDongBang) {
        soTienPhaiDong = Math.max(0, Number(c.laiConNo || 0));
      } else {
        const priorCount = (state.payments || []).filter(pay => pay.MaHopDong === p.MaHopDong && pay.LoaiThanhToan === 'Trả lãi').length;
        const isFirst = priorCount === 0;
        soTienPhaiDong = calculateInterestForPeriod(c, p.KyLaiTu, p.KyLaiDen, isFirst) + Number(c.laiConNo || 0);
      }

      const chenhLech = p.SoTienTra + p.TienKhuyenMai - soTienPhaiDong;
      if (chenhLech < 0) {
        const soTienThieu = Math.abs(chenhLech);
        p.soTienNoConLai = soTienThieu;
        c.laiConNo = soTienThieu;
        p.GhiChu = `Đóng thiếu - Ghi nhận nợ ${formatVND(soTienThieu)}` + (p.GhiChu ? ` (${p.GhiChu})` : '');
      } else {
        c.laiConNo = 0;
        if (chenhLech > 0 && c.TrangThai !== 'Còn lãi') {
          const radios = form.elements['luaChonThuThua'];
          let chosen = '';
          if (radios) {
            if (radios.value) chosen = radios.value;
            else { for (let r of radios) { if (r.checked) chosen = r.value; } }
          }
          if (!chosen) return showAlert("Lỗi", "Vui lòng chọn phương án xử lý số tiền thu thừa!");
          p.luaChonThuThua = chosen;
          if (chosen === 'transfer_next_month') p.soTienThuaChuyenKySau = chenhLech;
        }
      }

      state.payments.unshift(p);

      const contract = state.contracts.find(x => x.MaHopDong === p.MaHopDong);
      if (contract) {
        if (contract.TrangThai === 'Còn lãi' || contract.LaiDongBang) {
          // Thu nốt lãi còn lại sau trả gốc
          if ((contract.laiConNo || 0) <= 0) {
            const updatedC = {
              ...contract,
              TrangThai: 'Đã tất toán',
              NgayTatToan: p.NgayThanhToan,
              laiConNo: 0
            };
            state.contracts = state.contracts.map(x => x.MaHopDong === p.MaHopDong ? updatedC : x);
          } else {
            state.contracts = state.contracts.map(x => x.MaHopDong === p.MaHopDong ? { ...contract } : x);
          }
        } else if (contract.TrangThai === 'Đang vay') {
          const closeDateStr = p.KyLaiDen || p.NgayThanhToan;
          let baseDate = ymdToLocalDate(closeDateStr) || ymdToLocalDate(p.NgayThanhToan);
          if (baseDate) {
            baseDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + 30);
            const payDate = ymdToLocalDate(p.NgayThanhToan);
            while (payDate && baseDate < payDate) {
              baseDate = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + 30);
            }
            const newNgayDaoHan = localDateToYMD(baseDate);
            const updatedC = { ...contract, NgayDaoHan: newNgayDaoHan, NgayDaoHanManual: false, laiConNo: contract.laiConNo };
            state.contracts = state.contracts.map(x => x.MaHopDong === p.MaHopDong ? updatedC : x);
          }
        }
      }

      saveStateOfflineAndRefresh(true);
      showNotification("Đã lập phiếu thu thành công!");
      closeModal('payment-modal');
      setTimeout(() => { if (window.renderApp) window.renderApp(); }, 80);
    }

    function openContractModal(id=null) {
      if(window.state){ window.state.editingContract = id ? window.state.contracts.find(c=>c.MaHopDong===id) : null; }

      }

      if(window.showModal) window.showModal('contract-modal'); else { const m=document.getElementById('contract-modal'); if(m) m.classList.remove('hidden'); }

      // For new contracts: attach live listeners so preview auto-updates when user enters Số tiền vay + Ngày vay
      // No more auto-alert on open (the popup was firing because fields start empty)
      if (!id) {
        // Live preview: as user types amount and date in the new contract form, auto refresh the source split preview (silent, no alert)
        setTimeout(function() {
          const modal = document.getElementById('contract-modal');
          if (!modal) return;
          const form = modal.querySelector('form');
          if (!form) return;
          const amountEl = form.querySelector('input[name="SoTienVay"]');

          if (amountEl) amountEl.addEventListener('input', handler);
          if (dateEl) dateEl.addEventListener('input', handler);
          // If form somehow has prefilled values (rare for new), show preview
          if ((amountEl && amountEl.value && parseFloat(amountEl.value) > 0) || (dateEl && dateEl.value)) {
            window.autoAllocateForModal && window.autoAllocateForModal(false);
          }
        }, 150);
      }

      // append a detailed payment + calculation history section below the form.

        setTimeout(function() {

          if (!contentBox) return;

              }).join('');

          const calc = calculateContractInterest(contract);

          const firstNote = (contract.NgayBatDauTinhLai && contract.NgayBatDauTinhLai !== contract.NgayVay) ?

          const histHTML = `

              <h4 class="font-bold text-sm mb-1">Lịch sử chi tiết của hợp đồng</h4>

              ${firstNote}
              ${sugNow.isFirst && sugNow.amount ? `<div class="text-xs mb-1 text-emerald-700"><b>Lãi kỳ đầu (hiện tại cần đóng):</b> ${formatVND(sugNow.amount)} <span class="text-[9px]">(${sugNow.note})</span></div>` : ''}
              <div class="text-xs font-semibold mb-1">Các lần trả (lịch sử thu tiền):</div>
              <div class="max-h-36 overflow-auto bg-slate-50 p-2 rounded text-xs border">
                ${payList}
              </div>
              <div class="mt-1 text-[10px] flex flex-wrap gap-x-3">

    function handleSaveWithdrawInterest(e) {
      e.preventDefault(); const form = e.target;
      const amount = Number(form.SoTien.value);
      if (amount <= 0) return showAlert("Lỗi", "Số tiền rút không hợp lệ");
      
      const statsObj = getStats();
      const tongRutLai = (state.interestWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      const tienLaiThuc = statsObj.loiNhuanRongThucTe;
      const laiDoiTac = statsObj.laiDoiTac || 0;
      const tongLaiConThucTe = tienLaiThuc - laiDoiTac - tongRutLai;
      
      if (amount > tongLaiConThucTe) {
        return showAlert("Lỗi", "Số tiền rút vượt quá số lãi còn thực tế khả dụng!");
      }
      
      const maRut = Math.random().toString(36).substring(2, 10).toUpperCase();
      const w = {
        MaRut: maRut,
        Ngay: form.Ngay.value,
        SoTien: amount,
        KieuRut: form.KieuRut.value,
        GhiChu: form.GhiChu.value.trim()
      };
      
      if (!state.interestWithdrawals) state.interestWithdrawals = [];
      state.interestWithdrawals.unshift(w);
      
      if (w.KieuRut === 'NapVonTuCo') {
        const tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');
        if (tuCo) {
          if (!tuCo.LichSuBienDong) tuCo.LichSuBienDong = [];
          tuCo.LichSuBienDong.push({
            Ngay: w.Ngay,
            SoTien: w.SoTien,
            NoiDung: `Nạp vốn từ Tiền Lãi Thực tế (${w.GhiChu})`,
            MaRut: maRut
          });
        }
      }
      
      saveStateOfflineAndRefresh(true);
      showNotification("Đã thực hiện rút lãi thành công!");
      closeModal('withdraw-interest-modal');
    }

    function handleDeleteWithdrawInterest(maRut) {
      showConfirm("Xác nhận xóa", "Xóa giao dịch rút lãi này? Nếu là giao dịch Nạp vào Vốn Tự Có, hệ thống sẽ tự động trừ lại vốn.", () => {
        const w = state.interestWithdrawals.find(x => x.MaRut === maRut);
        if (w) {
          if (w.KieuRut === 'NapVonTuCo') {
            const tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');

          saveStateOfflineAndRefresh(true);
          showNotification("Đã xóa giao dịch rút lãi!");

      });
    }

    function onPaymentContractChange(maHD) {

      const typeSel = document.querySelector('#payment-modal select[name="LoaiThanhToan"]') || document.querySelector('select[name="LoaiThanhToan"]');
      const isLai = !typeSel || typeSel.value === 'Trả lãi';
      const i = document.getElementById('pm-SoTienTra');
      if (!c) return;

      if (!isLai) {
        // Tất toán: điền gốc + tính lãi
        const calc = calculateContractInterest(c);
        const gocEl = document.getElementById('pm-SoTienGoc');
        if (gocEl) gocEl.value = calc.duNoGocHienTai;

        // Trả lãi: số tiền thu = đúng lãi kỳ (30d / kỳ điều chỉnh) + nợ lãi cũ nếu có

    // Live update preview lãi kỳ (hỗ trợ điều chỉnh ngày, tính lại với chênh lệch ngày)
    function updatePaymentInterestPreview(forceSetAmount = false) {
      const st = window.state || state;
      const maHD = document.getElementById('pm-MaHopDong') ? document.getElementById('pm-MaHopDong').value : '';
      const c = (st.contracts || []).find(x => x.MaHopDong === maHD);
      const preview = document.getElementById('pm-interest-preview');
      const noteEl = document.getElementById('pm-first-note');
      if (!c || !preview) return;
      const tuEl = document.getElementById('pm-KyLaiTu');
      const denEl = document.getElementById('pm-KyLaiDen');
      const typeSel = document.querySelector('#payment-modal select[name="LoaiThanhToan"]') || document.querySelector('select[name="LoaiThanhToan"]');
      if (!typeSel || typeSel.value !== 'Trả lãi') {
        if (window.updatePaymentDifference) window.updatePaymentDifference();
        return;
      }

      let kyTu = (tuEl && tuEl.value) ? parseDateToISO(tuEl.value) : (c.NgayBatDauTinhLai || c.NgayVay);
      let kyDen = (denEl && denEl.value) ? parseDateToISO(denEl.value) : (c.NgayDaoHan || kyTu);

      // Nếu chưa có, set gợi ý chuẩn
      if (!kyTu || !kyDen) {
        const sug0 = getCurrentCycleInterestSuggestion(c);
        kyTu = kyTu || sug0.kyTu;
        kyDen = kyDen || sug0.kyDen;
        if (tuEl && !tuEl.value) tuEl.value = formatDate(kyTu);
        if (denEl && !denEl.value) denEl.value = formatDate(kyDen);
      }

      const priorCount = (st.payments || []).filter(p => p.MaHopDong === maHD && p.LoaiThanhToan === 'Trả lãi').length;
      const isFirst = priorCount === 0;
      const amt = calculateInterestForPeriod(c, kyTu, kyDen, isFirst);
      const debt = Number(c.laiConNo || 0);
      const totalDue = amt + debt;

      const daily = (c.SoTienVay / 1000000) * (c.LaiNgayTrenTrieu || 0);
      const std30 = Math.round(daily * 30);
      const actualDays = calculateStandardDays(kyTu, kyDen);
      const diffDays = actualDays - 30;
      const diffLai = Math.round(daily * diffDays);

      if (debt > 0) {
        preview.innerHTML = `Lãi kỳ này: <b>${formatVND(amt)}</b> + Nợ cũ: <b>${formatVND(debt)}</b> = <b>${formatVND(totalDue)}</b> (ngày: ${actualDays}${diffDays!==0 ? ' , chênh '+diffDays+'d = '+formatVND(diffLai) : ''})`;
      } else {
        preview.innerHTML = `Lãi kỳ: <b>${formatVND(amt)}</b> (ngày: ${actualDays}${diffDays!==0 ? ' , chênh '+diffDays+'d = '+formatVND(diffLai) : ''})`;
      }

      if (noteEl) {
        const ngayTL = c.NgayBatDauTinhLai || c.NgayVay;
        if (isFirst && calculateStandardDays(c.NgayVay, ngayTL) > 0) {
          noteEl.textContent = `KỲ ĐẦU: +${calculateStandardDays(c.NgayVay, ngayTL)} ngày dư từ giải ngân → tính lãi. Tổng = 30d + dư.`;
        } else {
          noteEl.textContent = isFirst ? 'Kỳ đầu' : 'Kỳ thường';
        }
      }
      // Trả lãi: luôn điền đúng số lãi kỳ (trừ khi user đã sửa tay và không force)
      const si = document.getElementById('pm-SoTienTra');
      if (si) {
        if (forceSetAmount || !si.value || si.dataset.userEdited !== '1') {
          si.value = totalDue;
          si.dataset.userEdited = '0';
        }
      }
      if (window.updatePaymentDifference) window.updatePaymentDifference();
    }
    window.updatePaymentInterestPreview = updatePaymentInterestPreview;

    function updatePaymentDifference() {
      const maHD = document.getElementById('pm-MaHopDong') ? document.getElementById('pm-MaHopDong').value : '';
      const warningEl = document.getElementById('pm-underpaid-warning');
      const overpaidEl = document.getElementById('pm-overpaid-container');
      const overpaidAmtEl = document.getElementById('pm-overpaid-amount');
      if (!maHD) {
        if (warningEl) warningEl.classList.add('hidden');
        if (overpaidEl) overpaidEl.classList.add('hidden');
        return;
      }
      const st = window.state || state;
      const c = (st.contracts || []).find(x => x.MaHopDong === maHD);
      if (!c) return;

      const typeSel = document.querySelector('#payment-modal select[name="LoaiThanhToan"]') || document.querySelector('select[name="LoaiThanhToan"]');
      const isLai = !typeSel || typeSel.value === 'Trả lãi';

      let soTienPhaiDong = 0;
      if (isLai) {
        const tuEl = document.getElementById('pm-KyLaiTu');
        const denEl = document.getElementById('pm-KyLaiDen');
        let kyTu = (tuEl && tuEl.value) ? parseDateToISO(tuEl.value) : (c.NgayBatDauTinhLai || c.NgayVay);
        let kyDen = (denEl && denEl.value) ? parseDateToISO(denEl.value) : (c.NgayDaoHan || kyTu);
        const priorCount = (st.payments || []).filter(p => p.MaHopDong === maHD && p.LoaiThanhToan === 'Trả lãi').length;
        const isFirst = priorCount === 0;
        soTienPhaiDong = calculateInterestForPeriod(c, kyTu, kyDen, isFirst) + Number(c.laiConNo || 0);
      } else {
        const calc = calculateContractInterest(c);
        soTienPhaiDong = (calc.duNoGocHienTai || c.SoTienVay) + Number(c.laiConNo || 0);
      }

      const soTienThuThucTe = Number(document.getElementById('pm-SoTienTra').value || 0);
      const soTienGiamTru = Number(document.getElementById('pm-TienKhuyenMai') ? document.getElementById('pm-TienKhuyenMai').value : 0);
      
      const chenhLech = soTienThuThucTe + soTienGiamTru - soTienPhaiDong;

      if (chenhLech < 0) {
        if (warningEl) {
          warningEl.innerHTML = `⚠️ Khách còn thiếu <b>${formatVND(Math.abs(chenhLech))}</b> VNĐ. Số tiền này sẽ được lưu vào công nợ để thu bổ sung sau.`;
          warningEl.classList.remove('hidden');
        }
        if (overpaidEl) overpaidEl.classList.add('hidden');
      } else if (chenhLech > 0) {
        if (overpaidAmtEl) overpaidAmtEl.textContent = formatVND(chenhLech);
        if (overpaidEl) overpaidEl.classList.remove('hidden');
        if (warningEl) warningEl.classList.add('hidden');
      } else {
        if (warningEl) warningEl.classList.add('hidden');
        if (overpaidEl) overpaidEl.classList.add('hidden');
      }
    }
    window.updatePaymentDifference = updatePaymentDifference;

    function handleExportJSON() {
      if (!state.password) {
        return showAlert("Lỗi", "Chưa thiết lập mật mã bảo mật!");
      }
      const rawData = JSON.stringify({
        customers: state.customers,
        contracts: state.contracts,
        payments: state.payments,
        capitalSources: state.capitalSources,
        interestWithdrawals: state.interestWithdrawals,
        partnerWithdrawals: state.partnerWithdrawals || [],
        paidSourceInterests: state.paidSourceInterests || [],
        businessInterestTransfers: state.businessInterestTransfers || [],
        customBaseTongLaiThucThu: state.customBaseTongLaiThucThu !== undefined ? state.customBaseTongLaiThucThu : 3763899
      });
      const encrypted = encrypt(state.password, rawData);
      const backupObj = {
        type: "loan_manager_encrypted_backup",
        payload: encrypted
      };
      
      const a = document.createElement('a');
      a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupObj));
      a.download = `SaoLuu_BaoMat_ChoVay_${new Date().toISOString().split('T')[0]}.json`;

      showNotification("Đã tải tệp sao lưu mã hóa bảo mật!");
    }

    function handleImportJSON(e) {
      const r = new FileReader(); r.readAsText(e.target.files[0], "UTF-8");
      r.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          if (d.type === "loan_manager_encrypted_backup" && d.payload) {
            localStorage.setItem('loan_data_encrypted', d.payload);
            showNotification("Đã nhập tệp sao lưu. Vui lòng nhập mã PIN để mở khóa!");
            state.isUnlocked = false;
            renderLockScreen();
          } else if (d.customers && d.contracts && d.payments) {
            if (!state.password) {
              return showAlert("Lỗi", "Vui lòng thiết lập mã PIN bảo mật trước khi nhập dữ liệu!");
            }
            state.customers = d.customers;
            state.contracts = d.contracts;
            state.payments = d.payments;
            state.capitalSources = d.capitalSources || DEFAULT_CAPITAL_SOURCES;
            state.interestWithdrawals = d.interestWithdrawals || [];
            state.partnerWithdrawals = d.partnerWithdrawals || [];
            state.paidSourceInterests = d.paidSourceInterests || [];
            state.businessInterestTransfers = d.businessInterestTransfers || [];
            if (d.customBaseTongLaiThucThu !== undefined) state.customBaseTongLaiThucThu = d.customBaseTongLaiThucThu;
            normalizeAllMaHopDong();
            recalculateAllDueDates();
            saveStateOfflineAndRefresh(true);
            showNotification("Đồng bộ dữ liệu thô thành công!");
          } else {
            showAlert("Lỗi", "Tệp sao lưu không đúng định dạng!");
          }
        } catch (err) {
          showAlert("Lỗi", "Định dạng file không tương thích!");
        }
      };
    }

    // Giữ vị trí cuộn khi re-render cùng tab (tránh nhảy về đầu trang)
    let _lastRenderActiveTab = null;
    function renderApp(opts = {}) {
      const container = document.getElementById('app-container');
      if (!container) return;
      const keepScroll = opts.keepScroll !== false && state.activeTab === _lastRenderActiveTab;
      const savedScrollY = keepScroll ? (window.scrollY || document.documentElement.scrollTop || 0) : 0;
      _lastRenderActiveTab = state.activeTab;
      try {
      const statsObj = getStats();
      const tongRutLai = (state.interestWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
      const tienLaiThuc = statsObj.loiNhuanRongThucTe;
      const laiDoiTac = statsObj.laiDoiTac || 0;
      const tongLaiConThucTe = tienLaiThuc - laiDoiTac - tongRutLai;
      const staffPending = state.payments.filter(p => p.TrangThaiThu === 'NhanVienGiu');

      let warningHTML = '';
      if (isLocalStorageBlocked) {
        warningHTML = `<div class="bg-rose-100 text-rose-800 p-4 mb-4 rounded-xl text-sm font-bold border border-rose-300">⚠️ CHÚ Ý: Bộ nhớ cục bộ bị trình duyệt chặn (privacy). Dữ liệu vẫn lưu nếu bạn cho phép, hoặc dùng Import/Export JSON để backup thủ công.</div>`;
      }

      let sidebarHTML = "";
      let headerHTML = "";
      let mainContentHTML = '';

      if (state.activeTab === 'dashboard') {
        const tongRutLai = (state.interestWithdrawals || []).reduce((sum, w) => sum + Number(w.SoTien || 0), 0);
        const tienLaiThuc = statsObj.loiNhuanRongThucTe;
        const laiDoiTac = statsObj.laiDoiTac || 0;
        const tongLaiConThucTe = tienLaiThuc - laiDoiTac - tongRutLai;
        const laiThucConLai = (statsObj.laiThucConLai != null)
          ? statsObj.laiThucConLai
          : Math.max(0, (statsObj.poolLaiSauChuyenKD != null ? statsObj.poolLaiSauChuyenKD : (tienLaiThuc - (statsObj.soLaiChuyenKD || 0))) - statsObj.soLaiDoiTacDaRut - statsObj.soLaiOwnerDaRut);

        // Calendar: lịch trả lãi theo NgayDaoHan (chuẩn hóa local YYYY-MM-DD)
        const calSection = (() => {
            const dueMap = {};
            let totalActiveWithDue = 0;
            state.contracts.forEach(c => {
              if (c.TrangThai !== 'Đang vay') return;
              // Ưu tiên ngày đáo hạn; fallback kỳ lãi đến từ gợi ý
              const sug = getCurrentCycleInterestSuggestion(c);
              const key = toInputDate(c.NgayDaoHan) || toInputDate(sug.kyDen) || '';
              if (!key || !/^\d{4}-\d{2}-\d{2}$/.test(key)) return;
              totalActiveWithDue++;
              if (!dueMap[key]) dueMap[key] = { count: 0, totalVay: 0, totalLai: 0, maList: [] };
              const lai = sug.amount || Math.round((Number(c.SoTienVay || 0) / 1000000) * (c.LaiNgayTrenTrieu || 0) * 30);
              const calc = calculateContractInterest(c);
              dueMap[key].count++;
              dueMap[key].totalVay += (calc.duNoGocHienTai || c.SoTienVay || 0);
              dueMap[key].totalLai += lai;
              dueMap[key].maList.push(c.MaHopDong);
            });

            const monthStats = {};
            Object.keys(dueMap).forEach(k => {
              const mkey = k.substring(0, 7);
              if (!monthStats[mkey]) monthStats[mkey] = { count: 0 };
              monthStats[mkey].count += dueMap[k].count;
            });
            // Dải tháng: từ tháng có HĐ đến tháng hiện tại + 1 (để lướt đủ)
            const todayYM = todayYMD().substring(0, 7);
            let sortedMonths = Object.keys(monthStats).sort();
            if (!sortedMonths.includes(todayYM)) sortedMonths.push(todayYM);
            sortedMonths = Array.from(new Set(sortedMonths)).sort();
            // Mở rộng ±1 tháng quanh biên
            const expandMonths = (ym, delta) => {
              const [y, m] = ym.split('-').map(Number);
              const d = new Date(y, m - 1 + delta, 1);
              return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            };
            if (sortedMonths.length) {
              const first = expandMonths(sortedMonths[0], -1);
              const last = expandMonths(sortedMonths[sortedMonths.length - 1], 1);
              if (!sortedMonths.includes(first)) sortedMonths.unshift(first);
              if (!sortedMonths.includes(last)) sortedMonths.push(last);
              sortedMonths = Array.from(new Set(sortedMonths)).sort();
            } else {
              sortedMonths = [todayYM];
            }

            let selectedMonth = state.dashboardDueCalendarMonth || todayYM;
            if (!sortedMonths.includes(selectedMonth)) {
              selectedMonth = sortedMonths.includes(todayYM) ? todayYM : sortedMonths[sortedMonths.length - 1];
            }
            state.dashboardDueCalendarMonth = selectedMonth;

            const currentIdx = sortedMonths.indexOf(selectedMonth);
            const prevM = currentIdx > 0 ? sortedMonths[currentIdx - 1] : null;
            const nextM = currentIdx < sortedMonths.length - 1 ? sortedMonths[currentIdx + 1] : null;

            const [yStr, mStr] = selectedMonth.split('-');
            const calYear = parseInt(yStr, 10);
            const calMonth = parseInt(mStr, 10) - 1;
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const firstDow = new Date(calYear, calMonth, 1).getDay();
            const leadingEmpty = (firstDow + 6) % 7;

            // Đếm HĐ trong tháng đang xem
            let monthHdCount = 0;
            Object.keys(dueMap).forEach(k => {
              if (k.startsWith(selectedMonth)) monthHdCount += dueMap[k].count;
            });

            const dayHeaders = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
            let grid = dayHeaders.map(h => `<div class="text-center font-bold bg-slate-100 text-[10px] py-1 border-r border-b border-slate-200">${h}</div>`).join('');
            for (let i = 0; i < leadingEmpty; i++) grid += `<div class="bg-slate-50 border-r border-b border-slate-200"></div>`;

            const fmtShort = (n) => {
              n = Number(n) || 0;
              if (n >= 1e9) return (n / 1e9).toFixed(1) + 'T';
              if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
              if (n >= 1e3) return Math.round(n / 1e3) + 'k';
              return String(n);
            };

            for (let d = 1; d <= daysInMonth; d++) {
              const ds = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
              const info = dueMap[ds] || { count: 0, totalVay: 0, totalLai: 0 };
              const cellD = new Date(calYear, calMonth, d);
              const dow = cellD.getDay();
              const weekend = dow === 0 || dow === 6;
              const has = info.count > 0;
              const bg = has ? 'bg-amber-50' : (weekend ? 'bg-rose-50/30' : 'bg-white');
              const txt = weekend && !has ? 'text-rose-600' : (has ? 'text-slate-900' : 'text-slate-350');
              const tip = has ? ` title="${(info.maList || []).join(', ')}"` : '';
              let inner = `<div class="text-[11px] font-black">${d}</div>`;
              if (has) {
                inner += `<div class="text-[8px] leading-tight font-extrabold mt-0.5">
                  <div class="text-amber-800">${info.count} HĐ</div>
                  <div class="text-slate-500">${fmtShort(info.totalVay)}</div>
                  <div class="text-emerald-700 font-black">${fmtShort(info.totalLai)}</div>
                </div>`;
              }
              grid += `<div class="p-0.5 border-r border-b border-slate-200 text-center min-h-[44px] flex flex-col justify-center ${bg} ${txt}"${tip}>${inner}</div>`;
            }

            return `

    // Helper to build rows HTML for customers (used by both full render and targeted update)
    function buildCustomersRowsHTML(term = '') {
      term = (term || '').toLowerCase().trim();
      const filtered = state.customers.filter(c => 
        (c.TenKhachHang || '').toLowerCase().includes(term) || 
        (c.MaKH || '').toLowerCase().includes(term) ||
        (c.SoDienThoai || '').toLowerCase().includes(term) ||
        (c.DiaChi || '').toLowerCase().includes(term)
      );
      let rows = '';
      filtered.forEach(cust => {
        // Aggregate financials for this customer
        const custContracts = state.contracts.filter(c => c.MaKH === cust.MaKH && c.TrangThai === 'Đang vay');
        let tongVay = 0;
        let tongLaiThang = 0;
        custContracts.forEach(contract => {
          const calc = calculateContractInterest(contract);
          tongVay += calc.duNoGocHienTai || 0;
          const sug = getCurrentCycleInterestSuggestion(contract);
          tongLaiThang += sug.amount || Math.round((contract.SoTienVay / 1000000) * contract.LaiNgayTrenTrieu * 30);
        });
        const custPays = state.payments.filter(p => {
          const c = state.contracts.find(cc => cc.MaHopDong === p.MaHopDong);
          return c && c.MaKH === cust.MaKH && p.LoaiThanhToan === 'Trả lãi';
        });
        let tongLaiDaDong = custPays.reduce((sum, p) => sum + Number(p.SoTienTra || 0) + Number(p.TienKhuyenMai || 0), 0);
        const risk = calculateCustomerRisk(cust);

        rows += `<tr class="border-t hover:bg-slate-50">
          <td class="p-4 font-bold text-slate-700">${cust.MaKH}</td>
          <td class="p-4 font-semibold text-slate-900 flex items-center gap-2">${cust.TenKhachHang} ${risk.badge}</td>
          <td class="p-4 text-slate-600">${cust.SoDienThoai}</td>
          <td class="p-4 text-slate-500">${cust.DiaChi}</td>
          <td class="p-4 text-right font-bold">${formatVND(tongVay)}</td>
          <td class="p-4 text-right font-bold text-emerald-700">${formatVND(tongLaiThang)}</td>
          <td class="p-4 text-right font-bold text-amber-700">${formatVND(tongLaiDaDong)}</td>
          <td class="p-4 text-center"><button onclick="window.openCustomerModal && window.openCustomerModal('${cust.MaKH}')" class="text-indigo-600 hover:text-indigo-800 font-semibold px-2">Sửa</button><button onclick="window.handleDeleteCustomer && window.handleDeleteCustomer('${cust.MaKH}')" class="text-rose-600 hover:text-rose-800 font-semibold px-2">Xóa</button></td>
        </tr>`;
      });
      return rows;
    }

    function handleSaveSourcePaid(e) {
      e.preventDefault();
      const form = e.target;
      const amount = Number(form.SoTien.value);
      const maNguon = form.MaNguon.value;
      const ngay = form.Ngay.value;
      const ghiChu = (form.GhiChu.value || '').trim();

      if (!amount || amount <= 0) return showAlert("Lỗi", "Số tiền thanh toán không hợp lệ!");
      if (!maNguon) return showAlert("Lỗi", "Vui lòng chọn nguồn vốn đã trả lãi!");
      if (!ngay) return showAlert("Lỗi", "Vui lòng chọn ngày thanh toán!");

      const src = state.capitalSources.find(s => s.MaNguon === maNguon);
      const tenNguon = maNguon === 'TONG_HOP' ? 'Tổng hợp / Nhiều nguồn' : (src ? src.TenNguon : maNguon);

      const record = {
        MaTra: 'SPI_' + Math.random().toString(36).substring(2, 10).toUpperCase(),
        MaNguon: maNguon,
        TenNguon: tenNguon,
        Ngay: ngay,
        SoTien: amount,
        GhiChu: ghiChu
      };

      if (!state.paidSourceInterests) state.paidSourceInterests = [];
      state.paidSourceInterests.unshift(record);
      saveStateOfflineAndRefresh(true);
      closeModal('source-paid-modal');
      showNotification(`Đã ghi nhận trả lãi nguồn vốn: ${formatVND(amount)}`);
    }
    window.handleSaveSourcePaid = handleSaveSourcePaid;

    function handleSavePartnerWithdrawal(e) {
      e.preventDefault(); const form = e.target;
      const statsObj = getStats();
      const amount = Number(form.SoTien.value);
      const kieuRut = form.KieuRut.value;
      const date = form.Ngay.value;
      const ghiChu = form.GhiChu.value.trim();

      if (!amount || amount <= 0) return showAlert("Lỗi", "Số tiền rút không hợp lệ!");
      if (amount > statsObj.soLaiDoiTacConLai) {
        return showAlert("Lỗi rút tiền", `Số tiền rút vượt quá Số Lãi Còn Lại Của Đối Tác (${formatVND(statsObj.soLaiDoiTacConLai)})!`);
      }

      const record = {
        MaRut: 'PW_' + Math.random().toString(36).substring(2, 10).toUpperCase(),
        Ngay: date,
        SoTien: amount,
        KieuRut: kieuRut,
        GhiChu: ghiChu
      };

      if (!state.partnerWithdrawals) state.partnerWithdrawals = [];
      state.partnerWithdrawals.push(record);

      if (kieuRut === 'NapVaoHeThong') {
        let src = state.capitalSources.find(s => s.MaNguon === 'TIEN_DOI_TAC');
        if (!src) {
          src = {
            MaNguon: 'TIEN_DOI_TAC',
            TenNguon: 'Vốn Tiền Đối Tác',
            LaiSuatThang: 0,
            GhiChu: 'Nguồn vốn tái đầu tư từ Lãi Đối Tác',
            LichSuBienDong: [{ Ngay: date, SoTien: amount, NoiDung: `Nạp vốn từ Lãi Đối Tác (${ghiChu || 'Chuyển vốn vào hệ thống'})` }]
          };
          state.capitalSources.push(src);
        } else {
          if (!src.LichSuBienDong) src.LichSuBienDong = [];
          src.LichSuBienDong.push({ Ngay: date, SoTien: amount, NoiDung: `Nạp vốn từ Lãi Đối Tác (${ghiChu || 'Chuyển vốn vào hệ thống'})` });
        }
      }

    function handleDeletePartnerWithdrawal(maRut) {
      if (!confirm("Bạn có chắc chắn muốn xóa / hoàn tác giao dịch rút lãi đối tác này?")) return;
      const idx = (state.partnerWithdrawals || []).findIndex(w => w.MaRut === maRut);
      if (idx !== -1) {
        const item = state.partnerWithdrawals[idx];
        if (item.KieuRut === 'NapVaoHeThong') {
          const src = state.capitalSources.find(s => s.MaNguon === 'TIEN_DOI_TAC');
          if (src && src.LichSuBienDong) {
            src.LichSuBienDong = src.LichSuBienDong.filter(tx => !(tx.SoTien === item.SoTien && tx.Ngay === item.Ngay));
          }
        }
        state.partnerWithdrawals.splice(idx, 1);
        saveStateOfflineAndRefresh(true);
        showNotification("Đã hoàn tác giao dịch rút lãi đối tác!");
      }

    function exportDataToExcel(filename, sheetName, headers, rows) {
      let tableHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
      <head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>${sheetName}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
      <body>
        <table border="1">
          <thead>
            <tr style="background-color:#1e293b;color:#ffffff;font-weight:bold;">
              ${headers.map(h => `<th style="padding:8px;border:1px solid #cbd5e1;">${h}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => `<tr>${row.map(cell => `<td style="padding:6px;border:1px solid #e2e8f0;">${cell !== null && cell !== undefined ? cell : ''}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </body>
      </html>`;

      const blob = new Blob(['\uFEFF' + tableHTML], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename.endsWith('.xls') ? filename : filename + '.xls';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportContractsReport(filterType = 'All', filterStatus = 'All', startDate = '', endDate = '') {

    function handleSaveBusinessTransfer(e) {
      e.preventDefault();
      const form = e.target;
      const loai = form.Loai.value;
      const amount = Number(form.SoTien.value);
      const ngay = form.Ngay.value;
      const ghiChu = (form.GhiChu.value || '').trim();
      if (!amount || amount <= 0) return showAlert('Lỗi', 'Số tiền không hợp lệ!');
      if (!ngay) return showAlert('Lỗi', 'Vui lòng chọn ngày!');

      const statsObj = getStats();
      const maxRut = Math.max(0, Number(statsObj.laiThucConLai != null ? statsObj.laiThucConLai : ((statsObj.soLaiOwnerConLai || 0) + (statsObj.soLaiDoiTacConLai || 0))));
      if (loai === 'RutSangKD') {
        if (amount > maxRut) {
          return showAlert('Lỗi', `Số tiền vượt quá Lãi Thực Còn Lại (${formatVND(maxRut)})!`);
        }
      } else {
        if (amount > (statsObj.soLaiChuyenKD || 0)) {
          return showAlert('Lỗi', `Số trả lại vượt quá tiền đang ở KD khác (${formatVND(statsObj.soLaiChuyenKD)})!`);
        }
      }

      const ma = 'BIZ_' + Math.random().toString(36).substring(2, 10).toUpperCase();
      const rec = { MaGiaoDich: ma, Loai: loai, SoTien: amount, Ngay: ngay, GhiChu: ghiChu };
      if (!state.businessInterestTransfers) state.businessInterestTransfers = [];
      state.businessInterestTransfers.unshift(rec);

      const src = ensureBusinessCapitalSource();
      if (!src.LichSuBienDong) src.LichSuBienDong = [];
      if (loai === 'RutSangKD') {
        src.LichSuBienDong.push({
          Ngay: ngay,
          SoTien: amount,
          NoiDung: `Rút lãi sang KD khác (${ghiChu || 'Chuyển sang kinh doanh ngoài hệ thống'})`,
          MaGiaoDich: ma
        });
      } else {
        src.LichSuBienDong.push({
          Ngay: ngay,
          SoTien: -amount,
          NoiDung: `Trả lại lãi vào hệ thống (${ghiChu || 'Hoàn lãi thực còn lại'})`,
          MaGiaoDich: ma
        });
      }

      saveStateOfflineAndRefresh(true);
      closeModal('business-transfer-modal');
      showNotification(loai === 'RutSangKD'
        ? `Đã rút ${formatVND(amount)} sang kinh doanh khác (không tính cho vay)`
        : `Đã trả ${formatVND(amount)} về Lãi thực còn lại`);
    }
    window.handleSaveBusinessTransfer = handleSaveBusinessTransfer;

    function handleDeleteBusinessTransfer(ma) {
      showConfirm('Hoàn tác giao dịch?', 'Xóa giao dịch này và điều chỉnh lại nguồn Tiền KD khác + Lãi thực còn lại.', () => {
        const t = (state.businessInterestTransfers || []).find(x => x.MaGiaoDich === ma);
        if (!t) return;
        const src = state.capitalSources.find(s => s.MaNguon === MA_NGUON_KD_KHAC);
        if (src && src.LichSuBienDong) {
          src.LichSuBienDong = src.LichSuBienDong.filter(tx => tx.MaGiaoDich !== ma);
        }
        state.businessInterestTransfers = state.businessInterestTransfers.filter(x => x.MaGiaoDich !== ma);
        saveStateOfflineAndRefresh(true);
        showNotification('Đã hoàn tác giao dịch lãi chuyển KD khác!');
      });
    }

    function handleSaveOwnerWithdrawal(e) {
      e.preventDefault();
      const form = e.target;
      const amount = Number(form.SoTien.value);
      const kieuRut = form.KieuRut.value;
      const date = form.Ngay.value;
      const ghiChu = (form.GhiChu.value || '').trim();

      if (!amount || amount <= 0) return showAlert("Lỗi", "Số tiền không hợp lệ!");
      if (!date) return showAlert("Lỗi", "Vui lòng chọn ngày!");

      const statsObj = getStats();
      if (amount > (statsObj.soLaiOwnerConLai || 0)) {
        return showAlert("Lỗi", `Số tiền vượt quá Lãi Thực Tế khả dụng (${formatVND(statsObj.soLaiOwnerConLai)})!`);
      }

      const maRut = 'OW_' + Math.random().toString(36).substring(2, 10).toUpperCase();
      const w = {
        MaRut: maRut,
        Ngay: date,
        SoTien: amount,
        KieuRut: kieuRut,
        GhiChu: ghiChu
      };

      if (!state.interestWithdrawals) state.interestWithdrawals = [];
      state.interestWithdrawals.unshift(w);

      if (kieuRut === 'NapVonTuCo') {
        let tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');
        if (!tuCo) {
          tuCo = {
            MaNguon: 'NGUON_TU_CO',

    function handleDeleteOwnerWithdrawal(maRut) {
      showConfirm("Xác nhận xóa", "Xóa / hoàn tác giao dịch rút lãi thực tế này? Nếu là Nạp vào Vốn Tự Có, hệ thống sẽ tự trừ lại vốn.", () => {

        if (!w) return;
        if (w.KieuRut === 'NapVonTuCo') {
          const tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');
          if (tuCo && tuCo.LichSuBienDong) {
            tuCo.LichSuBienDong = tuCo.LichSuBienDong.filter(tx => tx.MaRut !== maRut);
          }
        }
        state.interestWithdrawals = state.interestWithdrawals.filter(x => x.MaRut !== maRut);
        saveStateOfflineAndRefresh(true);
        showNotification("Đã hoàn tác giao dịch rút lãi thực tế!");

    function quickAddKH(e) {
      e.preventDefault();
      const f = e.target;
      const kh = {
        MaKH: (f.MaKH.value || 'KH' + (state.customers.length+1)).toUpperCase().trim(),
        TenKhachHang: f.TenKhachHang.value.trim(),
        SoDienThoai: (f.SoDienThoai.value || '').trim(),
        DiaChi: (f.DiaChi.value || '').trim(),
        GhiChu: ''
      };
      if (!kh.TenKhachHang) return showAlert('Lỗi', 'Tên khách không được trống');
      if (state.customers.some(c => c.MaKH === kh.MaKH)) return showAlert('Lỗi', 'Mã KH đã tồn tại');
      state.customers.push(kh);
      saveStateOfflineAndRefresh(true);
      showNotification('Đã thêm KH ' + kh.MaKH);
      f.reset();
    }

    function quickAddHD(e) {
      e.preventDefault();
      const f = e.target;
      const hd = {
        MaHopDong: (f.MaHopDong.value || '').toUpperCase().trim() || getNextHopDongMa(),
        MaKH: f.MaKH.value,
        SoTienVay: Number(f.SoTienVay.value),
        LaiNgayTrenTrieu: Number(f.LaiNgayTrenTrieu.value),
        NgayVay: parseDateToISO(f.NgayVay.value),
        NgayDaoHan: '', // will compute +30
        HinhThucLai: 'Lãi cố định',
        TrangThai: 'Đang vay',
        GhiChu: (f.GhiChu ? f.GhiChu.value.trim() : ''),
        MaNguon: f.MaNguon.value || 'NGUON_TU_CO',
        LoaiTaiSan: '',
        TenTaiSan: '',
        BienSo: '',
        SoKhung: '',
        SoMay: '',
        LichSuNguon: []
      };
      if (!hd.MaHopDong || !hd.MaKH || hd.SoTienVay <= 0) return showAlert('Lỗi', 'Mã HĐ, KH, và số tiền hợp lệ là bắt buộc');
      if (state.contracts.some(c => c.MaHopDong === hd.MaHopDong)) return showAlert('Lỗi', 'Mã HĐ đã tồn tại');

      // Check capital sufficiency
      const qAlloc = autoAllocateSources(hd.SoTienVay, hd.NgayVay);
      const usedAutoAlloc = qAlloc && qAlloc.length > 0;
      
      if (usedAutoAlloc) {
        const totalAvailable = calculateAvailableCapital(null, null);
        if (hd.SoTienVay > totalAvailable) {
          return showAlert("Lỗi nguồn vốn", `Tổng nguồn vốn thực tế không đủ để lập hợp đồng này!\nTổng nguồn vốn còn dư: ${formatVND(totalAvailable)}\nSố tiền yêu cầu: ${formatVND(hd.SoTienVay)}`);
        }
      } else {
        const targetSourceId = hd.MaNguon || 'NGUON_TU_CO';
        const sourceAvailable = calculateAvailableCapital(targetSourceId, null);
        const srcObj = state.capitalSources.find(s => s.MaNguon === targetSourceId);
        const sourceName = srcObj ? srcObj.TenNguon : targetSourceId;
        
        if (hd.SoTienVay > sourceAvailable) {
          return showAlert("Lỗi nguồn vốn", `Nguồn vốn "${sourceName}" không đủ tiền mặt khả dụng!\nSố tiền còn dư của nguồn: ${formatVND(sourceAvailable)}\nSố tiền yêu cầu: ${formatVND(hd.SoTienVay)}`);
        }
      }

      // NgayDaoHan = +30 days
      const d = new Date(hd.NgayVay);
      d.setDate(d.getDate() + 30);
      hd.NgayDaoHan = d.toISOString().split('T')[0];
      hd.LichSuNguon = buildLichSuNguonFromAllocation(qAlloc.length ? qAlloc : [{MaNguon: hd.MaNguon, SoTien: hd.SoTienVay}], hd.NgayVay);
      if (qAlloc.length) hd.MaNguon = qAlloc[0].MaNguon;
      state.contracts.push(hd);
      saveStateOfflineAndRefresh(true);
      showNotification('Đã lập HĐ mới ' + hd.MaHopDong + ' (chưa có thu lãi - đúng bản chuẩn)');
      f.reset();
    }

    // override window handleReset if needed
    window.resetToExcelData = resetToExcelData;
    window.resetToEmpty = resetToEmpty;
    window.quickAddKH = quickAddKH;
    window.quickAddHD = quickAddHD;


    // Auto override local data with exact Excel if it looks like old/tiny sample (<15 KH)
    try {
      if (typeof EXACT_DATA !== 'undefined' && EXACT_DATA.customers && (state.customers || []).length < 15) {
        state.customers = JSON.parse(JSON.stringify(EXACT_DATA.customers));
        state.contracts = JSON.parse(JSON.stringify(EXACT_DATA.contracts));
        state.payments = JSON.parse(JSON.stringify(EXACT_DATA.payments || []));
        state.capitalSources = JSON.parse(JSON.stringify(EXACT_DATA.capitalSources));
        // re-normalize
        state.contracts.forEach(c => { if(!c.MaNguon) c.MaNguon='NGUON_TU_CO'; if(!c.LichSuNguon||!c.LichSuNguon.length) c.LichSuNguon=[{NgayBatDau:c.NgayVay,NgayKetThuc:null,MaNguon:c.MaNguon,SoTien:c.SoTienVay}]; if(c.TrangThai==='Dang vay')c.TrangThai='Đang vay'; });
        saveStateOfflineAndRefresh(false);
        console.log('Auto-loaded exact Excel data (23 KH, 20 HD, 4 NV, 0 payments)');
      }
    } catch(e){ console.warn('Auto exact data load skipped:', e); }

    // Chuẩn hóa mã HĐ & Tính toán sửa lỗi ngày đáo hạn bị treo (chạy sau mọi lần load data)
    try {
      normalizeAllMaHopDong();
      sanitizeDuplicateKmPayments();
      recalculateAllDueDates();
      // nếu có thay đổi thì save lại (idempotent nên an toàn)
      saveStateOfflineAndRefresh(false);
    } catch(e){}

    // Auto re-allocate if contracts are assigned to Vốn Tự Có (0 capital) while banks have money - fixes the "vốn tự có không có tiền sao chia" issue
    try {
      const tuCo = state.capitalSources.find(s => s.MaNguon === 'NGUON_TU_CO');
      if (tuCo) {
        const details = calculateCapitalSourceDetails(tuCo);
        const allocatedToTu = state.contracts.reduce((sum, c) => {
          if (c.TrangThai !== 'Đang vay') return sum;
          const seg = (c.LichSuNguon || []).find(s => s.NgayKetThuc === null && s.MaNguon === 'NGUON_TU_CO');
          return sum + (seg ? seg.SoTien : 0);
        }, 0);
        if (details.tongVonHienTai < 1000000 && allocatedToTu > 1000000) {
          let changed = 0;
          state.contracts.forEach(c => {
            if (c.TrangThai !== 'Đang vay') return;
            const alloc = autoAllocateSources(c.SoTienVay, c.NgayVay);
            if (alloc.length && alloc[0].MaNguon !== 'NGUON_TU_CO') {
              c.LichSuNguon = buildLichSuNguonFromAllocation(alloc, c.NgayVay);
              c.MaNguon = alloc[0].MaNguon;
              changed++;
            }
          });
          if (changed > 0) {
            saveStateOfflineAndRefresh(false);
            console.log('Auto re-allocated ' + changed + ' contracts to proper low-rate sources with capital');
          }
        }
      }
    } catch(e){}

    function optimizeAllContractsSources() {
      showConfirm('Tối ưu nguồn vốn?', 'Sẽ tính lại Timeline nguồn vốn cho TẤT CẢ hợp đồng đang vay, ưu tiên nguồn lãi suất thấp nhất trước, tự chia nếu một nguồn không đủ vốn rảnh. Tiếp tục?', () => {
        let changed = 0;
        state.contracts.forEach(c => {
          if (c.TrangThai !== 'Đang vay') return;
          const alloc = autoAllocateSources(c.SoTienVay, c.NgayVay);
          if (alloc.length) {
            c.LichSuNguon = buildLichSuNguonFromAllocation(alloc, c.NgayVay);
            c.MaNguon = alloc[0].MaNguon;
            changed++;
          }
        });
        if (changed) {
          saveStateOfflineAndRefresh(true);
          showNotification('Đã tối ưu nguồn vốn cho ' + changed + ' HĐ. Timeline sẽ ưu tiên lãi thấp.');
        } else {
          showNotification('Không có HĐ nào cần thay đổi.');
        }
      });
    }
    window.optimizeAllContractsSources = optimizeAllContractsSources;
    window.autoAllocateSources = autoAllocateSources;

    // === Hỗ trợ modal Hợp đồng: tự động phân bổ + preview ===
    window._pendingContractAllocation = null;
    function autoAllocateForModal(fromButton = false) {
      // find the open contract modal form
      const modal = document.getElementById('contract-modal');
      if (!modal || modal.classList.contains('hidden')) return;
      const form = modal.querySelector('form');
      if (!form) return;
      const soTien = Number(form.SoTienVay ? form.SoTienVay.value : 0) || 0;
      const ngayVay = form.NgayVay ? form.NgayVay.value : '';
      if (soTien <= 0 || !ngayVay) {
        const preview = document.getElementById('alloc-preview');
        if (preview) preview.innerHTML = '';
        if (fromButton) {
          return showAlert('Cần dữ liệu', 'Nhập Số tiền vay và Ngày vay trước khi phân bổ.');
        }
        return;
      }
      const alloc = autoAllocateSources(soTien, ngayVay);
      const isEditModal = !!(window.state && window.state.editingContract);
      const preview = document.getElementById('alloc-preview');
      if (isEditModal && (!alloc || alloc.length === 0)) {
        // Edit only (date change etc): do not force re-alloc or show scary warning. Keep existing LichSuNguon.
        if (preview) preview.innerHTML = '<div class="text-[10px] text-emerald-600 mt-1">Giữ nguyên nguồn vốn hiện tại (chỉnh ngày tính lãi / đáo hạn không tiêu tốn vốn mới).</div>';
        window._pendingContractAllocation = null; // do not apply empty
        if (fromButton) showNotification('Chỉnh ngày không cần phân bổ lại nguồn vốn.');
        return;
      }
      window._pendingContractAllocation = alloc;
      // update preview div if present
      if (preview) {
        if (!alloc.length) {
          preview.innerHTML = '<div class="text-[10px] text-rose-600 mt-1">Không thể phân bổ (kiểm tra nguồn vốn).</div>';
          return;
        }
        let h = '<div class="mt-2 p-2 bg-indigo-50 rounded text-[10px]"><b>Phân bổ tự động (lãi thấp → cao):</b><br>';
        alloc.forEach(a => {
          const s = state.capitalSources.find(x => x.MaNguon === a.MaNguon);
          h += `• ${s ? s.TenNguon : a.MaNguon} : <b>${formatVND(a.SoTien)}</b><br>`;
        });
        h += '</div>';
        preview.innerHTML = h;
      }
      if (fromButton) {
        showNotification('Đã tính phân bổ tự động. Lưu để áp dụng.');
      }
    }
    window.autoAllocateForModal = autoAllocateForModal;

    // ĐĂNG KÝ PHƯƠNG THỨC LÊN PHẠM VI TOÀN CỤC CHỐNG LỖI NOT DEFINED (defensive)
    window.state = state;
    window.renderApp = renderApp;
    window.openCustomerModal = openCustomerModal;
    window.openContractModal = openContractModal;
    window.openCapitalSourceModal = openCapitalSourceModal;
    window.openCapitalAdjustmentModal = openCapitalAdjustmentModal;
    window.openPaymentModal = openPaymentModal;
    window.openWithdrawInterestModal = openWithdrawInterestModal;
    window.handleSaveWithdrawInterest = handleSaveWithdrawInterest;
    window.handleDeleteWithdrawInterest = handleDeleteWithdrawInterest;
    window.closeModal = closeModal;
    window.handleSaveCustomer = handleSaveCustomer;
    window.handleSaveCapitalSource = handleSaveCapitalSource;
    window.handleSaveContract = handleSaveContract;
    window.handleSavePayment = handleSavePayment;
    window.handleDeleteCustomer = handleDeleteCustomer;
    window.handleDeleteCapitalSource = handleDeleteCapitalSource;
    window.handleDeleteContract = handleDeleteContract;
    window.handleDeletePayment = handleDeletePayment;
    window.handleConfirmStaffPaymentNopQuy = (typeof handleConfirmStaffPaymentNopQuy === 'function' ? handleConfirmStaffPaymentNopQuy : null);
    window.handleDeleteCapitalAdjustment = handleDeleteCapitalAdjustment;
    window.handleAddCapitalAdjustment = handleAddCapitalAdjustment;
    window.handleResetSystem = handleResetSystem;
    window.handleExportJSON = handleExportJSON;
    window.handleImportJSON = handleImportJSON;
    window.onPaymentContractChange = onPaymentContractChange;
    window.onPaymentTypeChange = onPaymentTypeChange;
    window.onTrangThaiThuChange = onTrangThaiThuChange;
    window.updatePaymentInterestPreview = (typeof updatePaymentInterestPreview === 'function' ? updatePaymentInterestPreview : null);
    window.handleDisconnectCloud = function(){};
    window.handleSaveUserFirebaseConfig = null;
    window.renderSetupScreen = renderSetupScreen;
    window.renderLoginScreen = null;
    window.handleLogin = null;
    window.handleRegister = null;
    window.handleLogout = null;
    window.getIconSVG = getIconSVG;
    window.showNotification = (typeof showNotification === 'function' ? showNotification : console.log.bind(console));
    window.showAlert = (typeof showAlert === 'function' ? showAlert : function(t,m){ try{alert(t+': '+m);}catch(e){} });
    window.showConfirm = (typeof showConfirm === 'function' ? showConfirm : function(t,m,a){ try{ if(a && confirm(t+'\\n'+m)) a(); }catch(e){} });
    window.showModal = showModal;

    function openAdjustTotalInterestModal() {
      const current = state.customBaseTongLaiThucThu !== undefined ? state.customBaseTongLaiThucThu : 3763899;
      const input = prompt("Nhập số Tổng lãi đã thu GỐC (trước khi trừ điều chỉnh lãi kỳ đầu " + formatVND(LAI_KY_DAU_DIEU_CHINH) + "):", current);
      if (input !== null && input !== "") {
        const val = Number(input.replace(/[^0-9]/g, ''));
        if (!isNaN(val) && val >= 0) {
          state.customBaseTongLaiThucThu = val;
          saveStateOfflineAndRefresh(true);
          const hienThi = Math.max(0, val - LAI_KY_DAU_DIEU_CHINH);
          showNotification(`Đã lưu gốc ${formatVND(val)} → hiển thị sau điều chỉnh: ${formatVND(hienThi)}`);
        } else {
          showAlert("Lỗi", "Số tiền không hợp lệ!");
        }
      }
    }
    window.openAdjustTotalInterestModal = openAdjustTotalInterestModal;

    function handleClearOldWithdrawals() {
      state.interestWithdrawals = [];
      saveStateOfflineAndRefresh(true);
      showNotification("Đã đặt lại 'Tổng lãi còn thực tế' về bằng đúng 'Tiền Lãi Thực'!");
    }
    window.handleClearOldWithdrawals = handleClearOldWithdrawals;

    window.initSecurityAndLoad = initSecurityAndLoad;
    window.handleUnlock = handleUnlock;
    window.handleSetupPIN = handleSetupPIN;
    window.pressPinNumber = pressPinNumber;
    window.clearPinNumber = clearPinNumber;
    window.openChangePINModal = openChangePINModal;
    window.handleSaveChangePIN = handleSaveChangePIN;
    window.registerBiometrics = registerBiometrics;
    window.loginWithBiometrics = loginWithBiometrics;
    window.deactivateBiometrics = deactivateBiometrics;
    window.initGoogleAuth = initGoogleAuth;
    window.connectGoogleDrive = connectGoogleDrive;
    window.disconnectGoogleDrive = disconnectGoogleDrive;
    window.backupToGoogleDrive = backupToGoogleDrive;
    window.restoreFromGoogleDrive = restoreFromGoogleDrive;
    window.autoSyncOnAppEnter = autoSyncOnAppEnter;
    window.autoBackupOnAppLeave = autoBackupOnAppLeave;
    window.autoBackupAllConnected = autoBackupAllConnected;
    window.isAutoGDriveSyncEnabled = isAutoGDriveSyncEnabled;


    // KHỞI ĐỘNG CHẠY NGAY - BẢN CHUẨN OFFLINE (bỏ cloud/login hoàn toàn)
    try {
      initSecurityAndLoad();
    } catch (e) {
      const c = document.getElementById('app-container');
      if (c) c.innerHTML = `<div style="padding:20px;color:red;font-weight:bold;">Lỗi nạp cục bản: ${e.message}</div>`;
    }

    // Service Worker Auto-Update & Cache Purge for iOS/Safari
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          reg.onupdatefound = function() {
            var installingWorker = reg.installing;
            if (installingWorker) {
              installingWorker.onstatechange = function() {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('New SW version installed, reloading page...');
                  window.location.reload();
                }
              };
            }
          };
        }).catch(function(e){ console.log('SW Reg error:', e); });
      });
    }

    // Safety net for stuck loader (pure offline) - multiple attempts + broad detection
    function forceStartIfStuck() {
      try {
        var c = document.getElementById('app-container');
        if (!c) return;
        var html = c.innerHTML || '';
        var looksStuck = html.indexOf('Đang khởi tạo không gian làm việc') !== -1 ||
                         html.indexOf('spin 1s linear infinite') !== -1 ||
                         html.indexOf('Hệ thống đang nạp dữ liệu an toàn offline') !== -1;
        if (looksStuck) {
          if (typeof renderApp === 'function') {
            try { renderApp(); } catch(e) { initSecurityAndLoad(); }
          } else {
            initSecurityAndLoad();
          }
        }
      } catch(err) {}
    }
    setTimeout(forceStartIfStuck, 600);
    setTimeout(forceStartIfStuck, 1500);
    setTimeout(forceStartIfStuck, 3000);
  </script>
